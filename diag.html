<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BaseAI · 系统诊断</title>
<style>
  body { font-family: 'Space Grotesk', system-ui; max-width: 600px; margin: 40px auto; padding: 20px; background: #0a0a1a; color: #e0e0e0; }
  h1 { color: #00ff88; font-size: 24px; }
  .diag { background: #111; border: 1px solid #333; border-radius: 12px; padding: 20px; margin: 16px 0; }
  .ok { color: #00ff88; }
  .fail { color: #ff4757; }
  .warn { color: #ffa502; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
  .row:last-child { border: none; }
  button { background: #00ff88; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  pre { background: #1a1a2e; padding: 12px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; max-height: 200px; }
</style>
</head>
<body>
<h1>⚙️ BaseAI 系统诊断</h1>
<div class="diag" id="results">
  <div class="row"><span>检查中...</span></div>
</div>
<button onclick="runDiag()">🔄 重新诊断</button>
<script>
var steps = [];
function log(label, status, detail) {
  steps.push({label, status, detail});
  render();
}
function render() {
  var html = '';
  steps.forEach(function(s) {
    var icon = s.status === 'ok' ? '✅' : s.status === 'fail' ? '❌' : '⚠️';
    var cls = s.status === 'ok' ? 'ok' : s.status === 'fail' ? 'fail' : 'warn';
    html += '<div class="row"><span>' + icon + ' ' + s.label + '</span><span class="' + cls + '">' + s.status.toUpperCase() + '</span></div>';
    if (s.detail) html += '<pre style="margin:4px 0 12px">' + s.detail + '</pre>';
  });
  document.getElementById('results').innerHTML = html || '<div class="row"><span>无结果</span></div>';
}

function runDiag() {
  steps = [];
  render();

  // 1. Check Firebase SDK
  log('Firebase SDK 加载', typeof firebase !== 'undefined' && typeof firebase.app !== 'undefined' ? 'ok' : 'fail',
    typeof firebase === 'undefined' ? 'firebase namespace 不存在' : JSON.stringify(Object.keys(firebase)));

  // 2. Check FirebaseService
  log('FirebaseService 定义', typeof FirebaseService !== 'undefined' ? 'ok' : 'fail',
    typeof FirebaseService === 'undefined' ? 'window.FirebaseService 未定义' : '已定义');

  // 3. Check DB
  log('DB 定义', typeof DB !== 'undefined' ? 'ok' : 'fail',
    typeof DB === 'undefined' ? 'window.DB 未定义' : '已定义');

  // 4. Try init Firebase
  if (typeof FirebaseService !== 'undefined') {
    FirebaseService.init(function(ok) {
      log('Firebase 连接状态', ok ? 'ok' : 'fail',
        FirebaseService.isConfigured ? 'isConfigured=true, db=' + (FirebaseService.db ? 'OK' : 'null') : 'isConfigured=false');

      // 5. Try read players
      if (ok && FirebaseService.isConfigured && FirebaseService.db) {
        FirebaseService.db.ref('players').limitToFirst(3).once('value').then(function(snap) {
          var data = [];
          snap.forEach(function(c) { data.push({key: c.key, name: c.val().name}); });
          log('Firebase 读球员测试', 'ok', JSON.stringify(data, null, 2));
        }).catch(function(e) {
          log('Firebase 读球员测试', 'fail', e.message);
        });
      } else {
        log('Firebase 读球员测试', 'fail', 'Firebase 未连接，跳过');
      }
    });
  } else {
    log('Firebase 连接状态', 'fail', 'FirebaseService 未定义');
  }

  // 6. Check localStorage
  try {
    var ls = localStorage.getItem('baseai_players') || '[]';
    var parsed = JSON.parse(ls);
    log('localStorage 球员', parsed.length > 0 ? 'ok' : 'warn', parsed.length + ' 条记录');
  } catch(e) {
    log('localStorage 球员', 'fail', e.message);
  }
}

runDiag();
</script>
</body>
</html>
