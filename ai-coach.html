<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模块7 · AI 教练 — BaseAI</title>
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/design-system.css">
  <style>
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-header h2 { font-size:22px; font-weight:800; }
    .page-header p { font-size:13px; color:var(--text-muted); margin-top:2px; }
    .page-actions { display:flex; gap:8px; flex-wrap:wrap; }

    /* Tab 切换 */
    .tab-bar {
      display: flex;
      gap: 6px;
      background: var(--bg-card);
      padding: 6px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--orange), #ea580c);
      color: #fff;
      box-shadow: 0 4px 12px rgba(249,115,22,0.3);
    }
    .tab-btn:not(.active):hover { background: var(--bg-secondary); color: var(--text-primary); }

    /* 上传区 */
    .upload-zone {
      background: var(--bg-card);
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    .upload-zone:hover { border-color: var(--orange); background: var(--bg-secondary); }
    .upload-zone.dragover { border-color: var(--orange); background: rgba(249,115,22,0.05); }
    .upload-zone .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.6; }
    .upload-zone .title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .upload-zone .desc { font-size: 13px; color: var(--text-muted); }
    .upload-zone .file-info {
      margin-top: 12px;
      padding: 8px 14px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      display: inline-block;
      font-size: 13px;
      color: var(--text-primary);
    }
    .upload-zone.has-file {
      border-style: solid;
      border-color: var(--orange);
      background: rgba(249,115,22,0.05);
    }

    /* 表单 */
    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .form-group { flex: 1; min-width: 180px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group select, .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius-md);
      font-size: 14px;
    }

    /* 按钮 */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--orange), #ea580c);
      color: #fff;
      box-shadow: 0 4px 12px rgba(249,115,22,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-card); border-color: var(--orange); }
    .btn-lg { padding: 14px 32px; font-size: 15px; }

    /* 卡片 */
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
    }
    .section h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 指标卡 */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      border-left: 3px solid var(--border-light);
    }
    .metric-card.good { border-left-color: #10b981; }
    .metric-card.ok { border-left-color: #f59e0b; }
    .metric-card.low { border-left-color: #ef4444; }
    .metric-card .label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .metric-card .value {
      font-size: 24px;
      font-weight: 800;
      font-family: var(--font-mono);
    }
    .metric-card .sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .metric-card .level {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      margin-top: 6px;
    }
    .metric-card.good .level { background: rgba(16,185,129,0.2); color: #34d399; }
    .metric-card.ok .level { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .metric-card.low .level { background: rgba(239,68,68,0.2); color: #f87171; }

    /* AI 建议区 */
    .ai-result {
      background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.08));
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-top: 20px;
    }
    .ai-result .ai-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }
    .ai-result .ai-icon {
      font-size: 28px;
    }
    .ai-result .ai-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .ai-result .ai-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }
    .ai-content {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-primary);
      white-space: pre-wrap;
    }
    .ai-content strong { color: var(--orange); }
    .ai-loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .ai-loading .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 趋势图 */
    .chart-wrap {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 20px;
    }
    .chart-wrap h4 {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .chart-svg { width: 100%; height: 240px; }

    /* 历史记录 */
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .history-item:hover { background: var(--bg-card); }
    .history-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      min-width: 100px;
    }
    .history-meta {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
    }
    .history-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
    }
    .history-badge.pitching { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .history-badge.hitting { background: rgba(239,68,68,0.15); color: #f87171; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty .icon { font-size: 56px; margin-bottom: 12px; opacity: 0.3; }
    .empty h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 8px; }
    .empty p { font-size: 13px; line-height: 1.6; }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <script src="assets/nav.js"></script>
  <div class="main">
    <div id="app">
      <div class="page-header">
        <div>
          <h2>AI 教练 · 数据对接版</h2>
          <p>Module 07 · Rapsodo (投手) + Blast Motion (打击) · 接入大模型分析</p>
        </div>
      </div>

      <!-- Tab 切换 -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="pitching">🥎 投手分析（Rapsodo）</button>
        <button class="tab-btn" data-tab="hitting">🏏 打击分析（Blast）</button>
        <button class="tab-btn" data-tab="history">📊 历史记录</button>
      </div>

      <!-- 投手 Tab -->
      <div class="tab-content" id="tab-pitching">
        <div class="form-row">
          <div class="form-group">
            <label>选择球员</label>
            <select id="pitching-player"><option value="">加载中...</option></select>
          </div>
          <div class="form-group">
            <label>训练日期</label>
            <input type="date" id="pitching-date">
          </div>
        </div>

        <div class="upload-zone" id="pitching-upload">
          <div class="icon">📂</div>
          <div class="title">上传 Rapsodo 投手数据 CSV</div>
          <div class="desc">从 Rapsodo APP 导出 Session CSV · 拖入或点击选择</div>
          <div class="file-info" id="pitching-file-info" style="display:none;"></div>
        </div>
        <input type="file" id="pitching-file" accept=".csv" style="display:none;">

        <div id="pitching-result"></div>
      </div>

      <!-- 打击 Tab -->
      <div class="tab-content" id="tab-hitting" style="display:none;">
        <div class="form-row">
          <div class="form-group">
            <label>选择球员</label>
            <select id="hitting-player"><option value="">加载中...</option></select>
          </div>
          <div class="form-group">
            <label>训练日期</label>
            <input type="date" id="hitting-date">
          </div>
        </div>

        <div class="upload-zone" id="hitting-upload">
          <div class="icon">📂</div>
          <div class="title">上传 Blast Motion 打击数据 CSV</div>
          <div class="desc">从 Blast Motion APP 导出 Session CSV · 拖入或点击选择</div>
          <div class="file-info" id="hitting-file-info" style="display:none;"></div>
        </div>
        <input type="file" id="hitting-file" accept=".csv" style="display:none;">

        <div id="hitting-result"></div>
      </div>

      <!-- 历史 Tab -->
      <div class="tab-content" id="tab-history" style="display:none;">
        <div class="form-group" style="margin-bottom:16px;">
          <label>选择球员查看历史</label>
          <select id="history-player"><option value="">加载中...</option></select>
        </div>
        <div id="history-content">
          <div class="empty">
            <div class="icon">📈</div>
            <h3>选择球员查看历史分析</h3>
            <p>投手 + 打击的趋势曲线和完整分析记录</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="firebase-service.js"></script>
  <script src="db.js"></script>
  <script src="attendance.js"></script>
  <script src="ai-coach.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      initNav({ title:'AI 教练', subtitle:'Module 07 · Rapsodo + Blast Motion 对接' });

      // 默认日期 = 今天
      var today = new Date().toISOString().slice(0, 10);
      document.getElementById('pitching-date').value = today;
      document.getElementById('hitting-date').value = today;

      // Tab 切换
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          var tab = btn.getAttribute('data-tab');
          document.querySelectorAll('.tab-content').forEach(function(c) { c.style.display = 'none'; });
          document.getElementById('tab-' + tab).style.display = 'block';
        });
      });

      // 加载球员
      await loadPlayers();

      // 上传区交互
      setupUpload('pitching');
      setupUpload('hitting');
    });

    async function loadPlayers() {
      if (typeof firebase === 'undefined' || !firebase.database) {
        var opts = '<option value="">Firebase 未连接</option>';
        document.getElementById('pitching-player').innerHTML = opts;
        document.getElementById('hitting-player').innerHTML = opts;
        document.getElementById('history-player').innerHTML = opts;
        return;
      }
      var db = firebase.database();
      var snap = await db.ref('players').once('value');
      var all = snap.val() || {};
      var list = [];
      Object.keys(all).forEach(function(id) {
        var p = all[id];
        if (p.status === 'active') {
          list.push(Object.assign({id: id}, p));
        }
      });
      list.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
      var html = '<option value="">请选择球员</option>';
      list.forEach(function(p) {
        var label = p.name + ' (' + p.id + ')' + (p.team ? ' · ' + p.team : '');
        html += '<option value="' + p.id + '">' + label + '</option>';
      });
      document.getElementById('pitching-player').innerHTML = html;
      document.getElementById('hitting-player').innerHTML = html;
      document.getElementById('history-player').innerHTML = html;

      // 历史球员切换
      document.getElementById('history-player').addEventListener('change', function() {
        var pid = this.value;
        if (pid) loadHistory(pid);
      });
    }

    function setupUpload(type) {
      var zone = document.getElementById(type + '-upload');
      var input = document.getElementById(type + '-file');
      var info = document.getElementById(type + '-file-info');

      zone.addEventListener('click', function() { input.click(); });
      zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
      zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) handleFile(type, e.dataTransfer.files[0]);
      });
      input.addEventListener('change', function() {
        if (input.files.length > 0) handleFile(type, input.files[0]);
      });
    }

    function handleFile(type, file) {
      var zone = document.getElementById(type + '-upload');
      var info = document.getElementById(type + '-file-info');
      zone.classList.add('has-file');
      info.style.display = 'inline-block';
      info.innerHTML = '✓ ' + file.name + ' (' + AICoachModule.round(file.size / 1024, 1) + ' KB)';

      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var text = e.target.result;
          var parsed;
          if (type === 'pitching') {
            parsed = AICoachModule.parseRapsodo(text);
          } else {
            parsed = AICoachModule.parseBlast(text);
          }
          window['__' + type + '_parsed'] = parsed;
          info.innerHTML += ' · ✓ 已识别 ' + parsed.pitches.length + ' 个记录';
          AttendanceModule.toast('解析成功：' + parsed.pitches.length + ' 个采样', 'success');
        } catch (err) {
          zone.classList.remove('has-file');
          info.style.display = 'none';
          AttendanceModule.toast('解析失败：' + err.message, 'error');
        }
      };
      reader.readAsText(file);
    }

    /* ===== 投手分析 ===== */
    async function analyzePitching() {
      var pid = document.getElementById('pitching-player').value;
      var date = document.getElementById('pitching-date').value;
      var parsed = window.__pitching_parsed;
      if (!pid) { AttendanceModule.toast('请选择球员', 'warning'); return; }
      if (!parsed) { AttendanceModule.toast('请先上传 CSV', 'warning'); return; }

      var summary = AICoachModule.summarizePitching(parsed);
      var ratings = AICoachModule.ratePitching(summary);
      var player = await getPlayer(pid);
      var name = player ? player.name : '未命名';

      // 渲染指标
      var resultEl = document.getElementById('pitching-result');
      resultEl.innerHTML = renderAnalysisResult('pitching', name, summary, ratings);

      // 调 AI
      await callAIForAnalysis('pitching', pid, parsed, summary, ratings, name, date);
    }

    /* ===== 打击分析 ===== */
    async function analyzeHitting() {
      var pid = document.getElementById('hitting-player').value;
      var date = document.getElementById('hitting-date').value;
      var parsed = window.__hitting_parsed;
      if (!pid) { AttendanceModule.toast('请选择球员', 'warning'); return; }
      if (!parsed) { AttendanceModule.toast('请先上传 CSV', 'warning'); return; }

      var summary = AICoachModule.summarizeHitting(parsed);
      var ratings = AICoachModule.rateHitting(summary);
      var player = await getPlayer(pid);
      var name = player ? player.name : '未命名';

      var resultEl = document.getElementById('hitting-result');
      resultEl.innerHTML = renderAnalysisResult('hitting', name, summary, ratings);

      await callAIForAnalysis('hitting', pid, parsed, summary, ratings, name, date);
    }

    function renderAnalysisResult(type, name, summary, ratings) {
      var typeLabel = type === 'pitching' ? '投手' : '打击';
      var title = type === 'pitching' ? '🥎 投手分析报告' : '🏏 打击分析报告';
      var dataLabel = type === 'pitching' ? '球数' : '挥棒数';
      var dataCount = type === 'pitching' ? summary.count : summary.count;

      var metricsHtml = '<div class="metrics-grid">';
      ratings.forEach(function(r) {
        metricsHtml +=
          '<div class="metric-card ' + r.level + '">' +
            '<div class="label">' + r.label + '</div>' +
            '<div class="value">' + r.avg + ' <span style="font-size:13px;color:var(--text-muted);">' + r.unit + '</span></div>' +
            '<div class="sub">最低 ' + summary.fields[r.key].min + ' · 最高 ' + summary.fields[r.key].max + '</div>' +
            '<span class="level">' + r.levelLabel + '</span>' +
          '</div>';
      });
      metricsHtml += '</div>';

      var html =
        '<div class="section">' +
          '<h3>' + title + ' · ' + name + ' · 共 ' + dataCount + ' ' + dataLabel + '</h3>' +
          metricsHtml +
          '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">' +
            '<button class="btn btn-primary" onclick="' + (type === 'pitching' ? 'runAI' : 'runAI') + '(\'' + type + '\')">🤖 调 AI 出建议</button>' +
            '<button class="btn btn-secondary" onclick="saveToHistory(\'' + type + '\')">💾 保存到历史</button>' +
            '<button class="btn btn-secondary" onclick="window[\'__' + type + '_parsed\']=null;document.getElementById(\'' + type + '-result\').innerHTML=\'\';document.getElementById(\'' + type + '-upload\').classList.remove(\'has-file\');document.getElementById(\'' + type + '-file-info\').style.display=\'none\';">🔄 重置</button>' +
          '</div>' +
        '</div>';

      return html;
    }

    async function callAIForAnalysis(type, pid, parsed, summary, ratings, name, date) {
      // 第一次进入就自动调 AI
      runAI(type);
    }

    async function runAI(type) {
      var pid = type === 'pitching'
        ? document.getElementById('pitching-player').value
        : document.getElementById('hitting-player').value;
      var parsed = window['__' + type + '_parsed'];
      if (!pid || !parsed) return;

      var summary = type === 'pitching'
        ? AICoachModule.summarizePitching(parsed)
        : AICoachModule.summarizeHitting(parsed);
      var ratings = type === 'pitching'
        ? AICoachModule.ratePitching(summary)
        : AICoachModule.rateHitting(summary);
      var player = await getPlayer(pid);
      var name = player ? player.name : '未命名';

      // 显示 loading
      var aiBox = document.getElementById(type + '-ai-result');
      if (!aiBox) {
        var div = document.createElement('div');
        div.id = type + '-ai-result';
        div.className = 'ai-result';
        document.getElementById(type + '-result').appendChild(div);
        aiBox = div;
      }
      aiBox.innerHTML =
        '<div class="ai-header">' +
          '<div class="ai-icon">🤖</div>' +
          '<div><div class="ai-title">AI 教练分析中...</div><div class="ai-subtitle">大模型正在解读数据</div></div>' +
        '</div>' +
        '<div class="ai-loading"><div class="spinner"></div><p style="margin-top:12px;">正在生成建议，预计 5-15 秒...</p></div>';

      var prompt = type === 'pitching'
        ? AICoachModule.buildPitchingPrompt(name, summary, ratings, summary.count)
        : AICoachModule.buildHittingPrompt(name, summary, ratings, summary.count);

      try {
        var content = await AICoachModule.callAI(prompt);
        // 简单 markdown 加粗处理
        var formatted = content
          .replace(/###\s*(.*?)(?=\n|$)/g, '<strong>$1</strong>')
          .replace(/##\s*(.*?)(?=\n|$)/g, '<strong>$1</strong>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/(\d+)\.\s/g, '<br>$1. ');
        aiBox.innerHTML =
          '<div class="ai-header">' +
            '<div class="ai-icon">🤖</div>' +
            '<div><div class="ai-title">AI 教练建议</div><div class="ai-subtitle">' + name + ' · ' + (type === 'pitching' ? '投手' : '打击') + ' · 基于 ' + summary.count + ' 个采样</div></div>' +
          '</div>' +
          '<div class="ai-content">' + formatted + '</div>';
      } catch (err) {
        aiBox.innerHTML =
          '<div class="ai-header">' +
            '<div class="ai-icon">⚠️</div>' +
            '<div><div class="ai-title">AI 接口未配置</div><div class="ai-subtitle">数据已就绪，建议如下</div></div>' +
          '</div>' +
          '<div class="ai-content"><strong>📊 基础数据已就绪（' + summary.count + ' 个采样）</strong>\n\n' +
          ratings.map(function(r) {
            var emoji = r.level === 'good' ? '✅' : (r.level === 'ok' ? '⚠️' : '❌');
            return emoji + ' ' + r.label + '：' + r.avg + ' ' + r.unit + ' (' + r.levelLabel + ')';
          }).join('\n') +
          '\n\n<strong>💡 提示：</strong>\n' +
          'AI 接口暂未配置，请在 window.AI_CONFIG 中设置 endpoint。\n' +
          '可参考每个指标的"优秀/合格/待加强"评级作为改进方向。' +
          '</div>' +
          '<div class="error-box">⚠️ ' + err.message + '</div>';
      }
    }

    async function saveToHistory(type) {
      var pid = type === 'pitching'
        ? document.getElementById('pitching-player').value
        : document.getElementById('hitting-player').value;
      var date = type === 'pitching'
        ? document.getElementById('pitching-date').value
        : document.getElementById('hitting-date').value;
      var parsed = window['__' + type + '_parsed'];
      if (!pid || !parsed) return;

      var summary = type === 'pitching'
        ? AICoachModule.summarizePitching(parsed)
        : AICoachModule.summarizeHitting(parsed);
      var ratings = type === 'pitching'
        ? AICoachModule.ratePitching(summary)
        : AICoachModule.rateHitting(summary);

      try {
        await AICoachModule.saveAnalysis(pid, type, {
          date: date,
          count: summary.count,
          summary: summary,
          ratings: ratings,
          source: parsed.source
        });
        AttendanceModule.toast('已保存到历史记录', 'success');
      } catch (err) {
        AttendanceModule.toast('保存失败：' + err.message, 'error');
      }
    }

    /* ===== 历史记录 ===== */
    async function loadHistory(pid) {
      var el = document.getElementById('history-content');
      el.innerHTML = '<div class="empty"><div class="spinner" style="display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;"></div><p style="margin-top:12px;">加载中...</p></div>';

      try {
        var pitchHistory = await AICoachModule.getPlayerHistory(pid, 'pitching', 20);
        var hitHistory = await AICoachModule.getPlayerHistory(pid, 'hitting', 20);
        var player = await getPlayer(pid);
        var name = player ? player.name : '未命名';

        var all = [];
        pitchHistory.forEach(function(h) { all.push(Object.assign({type: 'pitching'}, h)); });
        hitHistory.forEach(function(h) { all.push(Object.assign({type: 'hitting'}, h)); });
        all.sort(function(a, b) { return (b.uploadedAt || '').localeCompare(a.uploadedAt || ''); });

        if (all.length === 0) {
          el.innerHTML = '<div class="empty"><div class="icon">📭</div><h3>暂无历史记录</h3><p>上传数据后会显示在这里</p></div>';
          return;
        }

        // 趋势图（投手球速）
        var trendSvg = '';
        if (pitchHistory.length >= 2) {
          trendSvg = renderTrendChart('投手球速趋势 (mph)', pitchHistory.reverse().map(function(h) {
            return { date: h.date, value: h.summary.fields.velocity ? h.summary.fields.velocity.avg : 0 };
          }), 60, 85);
        }

        var listHtml = '<div class="history-item" style="background:rgba(59,130,246,0.05);cursor:default;"><div class="history-date">总记录</div><div class="history-meta">投手 ' + pitchHistory.length + ' 次 / 打击 ' + hitHistory.length + ' 次</div></div>';
        all.forEach(function(h) {
          var count = h.summary.count;
          var mainField = h.type === 'pitching' ? h.summary.fields.velocity : h.summary.fields.batSpeed;
          var mainLabel = h.type === 'pitching' ? '球速' : '挥棒';
          var mainValue = mainField ? mainField.avg : '—';
          var mainUnit = h.type === 'pitching' ? 'mph' : 'mph';
          listHtml +=
            '<div class="history-item">' +
              '<div class="history-date">' + h.date + '</div>' +
              '<span class="history-badge ' + h.type + '">' + (h.type === 'pitching' ? '投手' : '打击') + '</span>' +
              '<div class="history-meta">' + count + ' 个采样 · ' + mainLabel + ' ' + mainValue + ' ' + mainUnit + '</div>' +
            '</div>';
        });

        el.innerHTML =
          (trendSvg ? '<div class="chart-wrap">' + trendSvg + '</div>' : '') +
          '<div class="section"><h3>📋 分析记录</h3>' + listHtml + '</div>';
      } catch (err) {
        el.innerHTML = '<div class="error-box">加载失败：' + err.message + '</div>';
      }
    }

    function renderTrendChart(title, points, minY, maxY) {
      if (points.length < 2) return '';
      var w = 600, h = 200, pad = 30;
      var xs = points.map(function(_, i) { return pad + (w - 2 * pad) * (i / (points.length - 1)); });
      var ys = points.map(function(p) { return h - pad - (h - 2 * pad) * ((p.value - minY) / (maxY - minY)); });
      var linePath = xs.map(function(x, i) { return (i === 0 ? 'M' : 'L') + x + ',' + ys[i]; }).join(' ');
      var areaPath = linePath + ' L' + xs[xs.length - 1] + ',' + (h - pad) + ' L' + xs[0] + ',' + (h - pad) + ' Z';
      var dots = points.map(function(p, i) {
        return '<circle cx="' + xs[i] + '" cy="' + ys[i] + '" r="4" fill="#f97316" />' +
               '<text x="' + xs[i] + '" y="' + (ys[i] - 8) + '" text-anchor="middle" font-size="10" fill="#94a3b8">' + p.value + '</text>';
      }).join('');
      var labels = points.map(function(p, i) {
        return '<text x="' + xs[i] + '" y="' + (h - 10) + '" text-anchor="middle" font-size="10" fill="#64748b">' + p.date.slice(5) + '</text>';
      }).join('');
      return '<h4>' + title + '</h4>' +
        '<svg class="chart-svg" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet">' +
          '<defs><linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f97316" stop-opacity="0.4"/><stop offset="100%" stop-color="#f97316" stop-opacity="0"/></linearGradient></defs>' +
          '<path d="' + areaPath + '" fill="url(#trendGrad)" />' +
          '<path d="' + linePath + '" fill="none" stroke="#f97316" stroke-width="2" />' +
          dots + labels +
        '</svg>';
    }

    function getPlayer(pid) {
      if (typeof firebase === 'undefined' || !firebase.database) return Promise.resolve(null);
      return firebase.database().ref('players/' + pid).once('value').then(function(s) { return s.val(); });
    }

    /* ===== 把按钮注入到上传区下方 ===== */
    setTimeout(function() {
      var pUpload = document.getElementById('pitching-upload');
      if (pUpload && !document.getElementById('btn-analyze-pitching')) {
        var btn = document.createElement('button');
        btn.id = 'btn-analyze-pitching';
        btn.className = 'btn btn-primary btn-lg';
        btn.style.width = '100%';
        btn.style.marginTop = '12px';
        btn.textContent = '🥎 开始投手分析';
        btn.onclick = analyzePitching;
        pUpload.parentNode.insertBefore(btn, pUpload.nextSibling);
      }
      var hUpload = document.getElementById('hitting-upload');
      if (hUpload && !document.getElementById('btn-analyze-hitting')) {
        var btn2 = document.createElement('button');
        btn2.id = 'btn-analyze-hitting';
        btn2.className = 'btn btn-primary btn-lg';
        btn2.style.width = '100%';
        btn2.style.marginTop = '12px';
        btn2.textContent = '🏏 开始打击分析';
        btn2.onclick = analyzeHitting;
        hUpload.parentNode.insertBefore(btn2, hUpload.nextSibling);
      }
    }, 100);
  </script>
</body>
</html>
