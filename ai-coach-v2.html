<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模块6 · AI 专属教练 — BaseAI</title>
<link rel="stylesheet" href="assets/design-system.css">
<style>
  body { background: #080c18; }

  .hero-section {
    background: linear-gradient(135deg, #0a1628 0%, #1a2d4a 50%, #0f1f3a 100%);
    padding: 32px 28px;
    text-align: center;
    border-bottom: 1px solid rgba(249,115,22,0.15);
    position: relative;
    overflow: hidden;
  }
  .hero-section::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(249,115,22,0.06) 0%, transparent 60%);
    animation: rotate-bg 20s linear infinite;
  }
  @keyframes rotate-bg { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .hero-title {
    font-size: 36px; font-weight: 900;
    background: linear-gradient(135deg, #fff 30%, #f97316);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; position: relative;
  }
  .hero-sub { font-size: 14px; color: #64748b; position: relative; }
  .ai-badge {
    display: inline-flex; align-items: center; gap: 8px;
    margin: 16px auto 0; padding: 8px 20px;
    background: linear-gradient(90deg, rgba(249,115,22,0.15), rgba(59,130,246,0.15));
    border: 1px solid rgba(249,115,22,0.2);
    border-radius: 24px;
    font-size: 13px; color: #f97316; font-weight: 600; position: relative;
  }
  .ai-badge::before {
    content: '●';
    animation: blink-dot 1.5s infinite;
    color: #f97316;
  }
  @keyframes blink-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .page-content { padding: 28px; max-width: 1100px; margin: 0 auto; }

  /* Steps */
  .steps-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 0; margin-bottom: 32px;
  }
  .step-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    color: #475569;
    font-size: 13px; font-weight: 600;
    transition: all 0.2s;
  }
  .step-item.active { color: #f97316; }
  .step-item.done { color: #10b981; }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
    border: 2px solid currentColor;
    transition: all 0.2s;
  }
  .step-item.active .step-num { background: #f97316; border-color: #f97316; color: white; }
  .step-item.done .step-num { background: #10b981; border-color: #10b981; color: white; }
  .step-arrow { color: #334155; font-size: 18px; margin: 0 4px; }

  /* Panels */
  .panel {
    background: rgba(26,34,53,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    margin-bottom: 24px; overflow: hidden;
    backdrop-filter: blur(8px);
  }
  .panel-header {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 12px;
  }
  .panel-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
  .panel-body { padding: 24px; }

  /* Step 1: Player + Type Selection */
  .setup-row {
    display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .form-group { flex: 1; min-width: 200px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 700;
    color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group select, .form-group input {
    width: 100%; padding: 12px 14px; font-size: 14px;
    background: rgba(20,26,46,0.9); border: 1px solid rgba(249,115,22,0.3);
    color: #f1f5f9; border-radius: 10px; box-sizing: border-box;
    outline: none; transition: border-color 0.15s;
  }
  .form-group select:focus, .form-group input:focus { border-color: #f97316; }
  .form-group select option { background: #1a2235; }
  .pdi-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.1s; }
  .pdi-item:last-child { border-bottom: none; }
  .pdi-item:hover { background: rgba(249,115,22,0.15); }

  /* Video Type Selector */
  .type-cards {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
  }
  .type-card {
    background: rgba(20,26,46,0.9);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 24px; text-align: center;
    cursor: pointer; transition: all 0.2s;
  }
  .type-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-2px); }
  .type-card.selected { border-color: #f97316; background: rgba(249,115,22,0.08); }
  .type-card .icon { font-size: 48px; margin-bottom: 12px; }
  .type-card .type-name { font-size: 18px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; }
  .type-card .type-desc { font-size: 12px; color: #64748b; }
  .type-card.selected .type-name { color: #f97316; }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed rgba(249,115,22,0.3);
    border-radius: 16px;
    padding: 48px 32px; text-align: center;
    cursor: pointer; transition: all 0.2s;
    background: rgba(20,26,46,0.5);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: #f97316;
    background: rgba(249,115,22,0.05);
  }
  .upload-zone .icon { font-size: 56px; margin-bottom: 16px; }
  .upload-zone .title { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 8px; }
  .upload-zone .sub { font-size: 13px; color: #64748b; line-height: 1.6; }
  .upload-zone .formats { margin-top: 12px; font-size: 12px; color: #475569; }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  /* Video Preview */
  .video-preview-wrap {
    border-radius: 14px; overflow: hidden;
    background: #000; margin-bottom: 16px;
    position: relative;
  }
  .video-preview-wrap video {
    width: 100%; max-height: 400px; display: block;
  }
  .video-badge {
    position: absolute; top: 12px; left: 12px;
    padding: 4px 12px; border-radius: 8px;
    font-size: 11px; font-weight: 700;
    background: rgba(0,0,0,0.6); color: white;
    backdrop-filter: blur(4px);
  }
  .video-type-badge { position: absolute; top: 12px; right: 12px; }

  /* Analysis Button */
  .btn-ai {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white; border: none; padding: 14px 32px;
    border-radius: 12px; font-size: 15px; font-weight: 800;
    cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(249,115,22,0.35);
    transition: all 0.15s;
    width: 100%; justify-content: center;
  }
  .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(249,115,22,0.45); }
  .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* AI Loading */
  .ai-loading {
    text-align: center; padding: 60px 20px;
  }
  .ai-loading .spinner {
    width: 64px; height: 64px; margin: 0 auto 24px;
    border: 4px solid rgba(249,115,22,0.2);
    border-top-color: #f97316;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg);} }
  .ai-loading .msg { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
  .ai-loading .sub { font-size: 13px; color: #64748b; }
  .ai-loading .progress-bar {
    width: 300px; max-width: 100%; height: 6px;
    background: rgba(255,255,255,0.08); border-radius: 3px;
    margin: 20px auto 0; overflow: hidden;
  }
  .ai-loading .progress-fill {
    height: 100%; background: linear-gradient(90deg, #f97316, #fb923c);
    border-radius: 3px; transition: width 0.3s;
  }
  .ai-loading .steps-list {
    margin-top: 24px; text-align: left; max-width: 320px; margin: 24px auto 0;
  }
  .ai-loading .step-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; font-size: 13px; color: #475569;
  }
  .ai-loading .step-row.done { color: #10b981; }
  .ai-loading .step-row.active { color: #f97316; font-weight: 600; }

  /* Results */
  .result-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 24px;
    background: rgba(20,26,46,0.9);
    border: 1px solid rgba(249,115,22,0.2);
    border-radius: 12px; padding: 16px 20px;
  }
  .result-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ea580c);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: white; flex-shrink: 0;
  }
  .result-meta .name { font-size: 18px; font-weight: 800; color: #f1f5f9; }
  .result-meta .sub { font-size: 12px; color: #64748b; margin-top: 2px; }
  .result-score {
    margin-left: auto; text-align: right; flex-shrink: 0;
  }
  .result-score .num { font-size: 36px; font-weight: 900; color: #f97316; font-family: 'Space Grotesk', monospace; }
  .result-score .label { font-size: 11px; color: #64748b; }

  .metrics-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;
  }
  .metric-card {
    background: rgba(20,26,46,0.9);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .metric-card .m-icon { font-size: 24px; margin-bottom: 8px; }
  .metric-card .m-val { font-size: 22px; font-weight: 900; font-family: 'Space Grotesk', monospace; }
  .metric-card .m-unit { font-size: 11px; color: #64748b; }
  .metric-card .m-label { font-size: 11px; color: #64748b; margin-top: 4px; }
  .metric-card.orange .m-val { color: #f97316; }
  .metric-card.blue .m-val { color: #3b82f6; }
  .metric-card.green .m-val { color: #10b981; }

  .result-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
  }
  .result-card {
    background: rgba(20,26,46,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 20px;
  }
  .result-card-title {
    font-size: 13px; font-weight: 700; color: #f97316;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .result-bar-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .result-bar-row .rb-label { font-size: 12px; color: #94a3b8; min-width: 80px; }
  .result-bar-row .rb-track {
    flex: 1; height: 8px; background: rgba(255,255,255,0.07);
    border-radius: 4px; overflow: hidden;
  }
  .result-bar-row .rb-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .result-bar-row .rb-val { font-size: 12px; font-weight: 700; min-width: 32px; text-align: right; }

  /* Radar */
  .radar-wrap { display: flex; justify-content: center; align-items: center; }
  .radar-svg { width: 240px; height: 240px; }

  /* Suggestions */
  .suggestions-list { display: flex; flex-direction: column; gap: 12px; }
  .sug-card {
    display: flex; align-items: flex-start; gap: 14px;
    background: rgba(20,26,46,0.9);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 16px;
    border-left: 4px solid;
  }
  .sug-card.good { border-left-color: #10b981; }
  .sug-card.warn { border-left-color: #f97316; }
  .sug-card.info { border-left-color: #3b82f6; }
  .sug-icon { font-size: 22px; flex-shrink: 0; }
  .sug-body .sug-title { font-size: 14px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
  .sug-body .sug-text { font-size: 12px; color: #94a3b8; line-height: 1.6; }

  /* Training Plan */
  .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .plan-card {
    background: rgba(20,26,46,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 18px;
    border-left: 4px solid #f97316;
    transition: all 0.15s;
  }
  .plan-card:hover { border-color: rgba(249,115,22,0.4); transform: translateX(4px); }
  .plan-card .p-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .plan-card .p-title { font-size: 14px; font-weight: 700; color: #f1f5f9; }
  .plan-card .p-pri { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
  .plan-card .p-desc { font-size: 12px; color: #94a3b8; line-height: 1.6; margin-bottom: 10px; }
  .plan-card .p-meta { display: flex; gap: 14px; font-size: 11px; color: #64748b; }
  .plan-card .p-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-top: 6px; }

  /* Actions */
  .result-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
  .btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.15s; }
  .btn-primary { background: linear-gradient(135deg, #f97316, #ea580c); color: white; box-shadow: 0 4px 12px rgba(249,115,22,0.25); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(249,115,22,0.35); }
  .btn-secondary { background: rgba(255,255,255,0.07); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #f1f5f9; }

  /* History */
  .history-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer; border-radius: 10px; padding: 12px;
    transition: background 0.1s;
  }
  .history-item:hover { background: rgba(255,255,255,0.03); }
  .history-item:last-child { border-bottom: none; }
  .hi-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; color: white; flex-shrink: 0;
  }
  .hi-info { flex: 1; }
  .hi-name { font-size: 14px; font-weight: 600; color: #f1f5f9; }
  .hi-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
  .hi-score { font-size: 22px; font-weight: 900; font-family: 'Space Grotesk', monospace; }
  .hi-type { font-size: 10px; color: #64748b; text-align: right; }
  .hi-actions { display: flex; gap: 6px; }
  .hi-actions .btn { padding: 6px 12px; font-size: 11px; }

  /* Empty State */
  .empty-state { text-align: center; padding: 48px 20px; color: #475569; }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state .title { font-size: 16px; font-weight: 700; color: #64748b; margin-bottom: 8px; }
  .empty-state .sub { font-size: 13px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
  .fade-in { animation: fadeIn 0.4s ease; }

  @media (max-width: 768px) {
    .result-grid, .plan-grid { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .type-cards { grid-template-columns: 1fr; }
    .step-item .step-label { display: none; }
  }
</style>
</head>
<body>

<script src="assets/nav.js?v=3"></script>
<!-- MediaPipe Pose 浏览器端姿态追踪 -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<!-- 投球 AI 分析引擎 -->
<script src="assets/pitch-analysis-engine.js"></script>

<script>
// ====== STATE ======
var allPlayers = [];
var selectedPlayer = null;
var selectedType = null; // 'batting' | 'pitching'
var uploadedVideo = null;      // 正面视频（保留旧兼容）
var videoFront = null;         // 正面视频
var videoSide = null;          // 侧面视频
var currentStep = 1;
var analysisResult = null;
var analysisHistory = JSON.parse(localStorage.getItem('baseai_ai_history') || '[]');

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// ====== INIT ======
document.addEventListener('DOMContentLoaded', function() {
  initNav({ title: 'AI 专属教练', subtitle: 'Module 06 · AI Coach' });
  var pc = document.getElementById('page-content');
  pc.innerHTML = `
<div class="hero-section">
  <div class="hero-title">🤖 AI 专属教练</div>
  <div class="hero-sub">BaseAI 智能棒球分析系统 · Powered by AI</div>
  <div class="ai-badge">视频 AI 分析 · 个性化训练计划 · 成长追踪</div>
</div>
<div id="main-content"></div>`;
  loadPlayers();
});

// 备用演示球员数据（当 DB 不可用时使用）
var DEMO_PLAYERS = [
  { id: 'p1', player_id: 'p1', name: '罗莀安', position: '投手', number: 7, age: 11, team: 'U12 精英队' },
  { id: 'p2', player_id: 'p2', name: '陈小明', position: '捕手', number: 12, age: 12, team: 'U12 精英队' },
  { id: 'p3', player_id: 'p3', name: '王大伟', position: '一垒手', number: 23, age: 11, team: 'U12 精英队' },
  { id: 'p4', player_id: 'p4', name: '李小强', position: '游击手', number: 5, age: 12, team: 'U12 精英队' },
  { id: 'p5', player_id: 'p5', name: '张小龙', position: '外野手', number: 18, age: 11, team: 'U12 精英队' },
  { id: 'p6', player_id: 'p6', name: '刘小虎', position: '三垒手', number: 9, age: 12, team: 'U12 精英队' }
];

async function loadPlayers() {
  try {
    // 尝试从 DB 加载
    if (typeof DB !== 'undefined' && DB.getPlayers) {
      var res = await DB.getPlayers();
      allPlayers = res.data || [];
    }
    // 如果 DB 没数据或失败，使用演示数据
    if (!allPlayers || allPlayers.length === 0) {
      allPlayers = DEMO_PLAYERS;
    }
    renderStep1();
  } catch(e) {
    // DB 完全失败，用演示数据继续
    allPlayers = DEMO_PLAYERS;
    renderStep1();
  }
}

// ====== STEP 1: SELECT PLAYER + TYPE ======
function renderStep1() {
  var mc = document.getElementById('main-content');
  var playerOpts = allPlayers.map(function(p){
    return '<option value="'+(p.id||p.player_id)+'" data-name="'+esc(p.name)+'">'+esc(p.name)+(p.position?' ('+esc(p.position)+')':'')+'</option>';
  }).join('');

  mc.innerHTML = `
<div class="panel fade-in">
  <div class="panel-header">
    <div class="panel-title">📋 步骤 1：选择球员 &amp; 分析类型</div>
  </div>
  <div class="panel-body">
    <div class="setup-row">
      <div class="form-group" style="position:relative;">
        <label>选择球员</label>
        <input type="text" id="player-search-input" placeholder="输入名字搜索…" autocomplete="off" style="width:100%;padding:12px 14px;font-size:14px;background:rgba(20,26,46,0.9);border:1px solid rgba(249,115,22,0.3);color:#f1f5f9;border-radius:10px;box-sizing:border-box;outline:none;transition:border-color 0.15s;" oninput="filterPlayerList(this.value)" onfocus="showPlayerDropdown()" />
        <div id="player-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:260px;overflow-y:auto;background:#1a2235;border:1px solid rgba(249,115,22,0.4);border-radius:10px;margin-top:4px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.5);"></div>
        <div id="sel-player-name" style="margin-top:8px;font-size:13px;color:#f97316;font-weight:600;min-height:18px;"></div>
        <input type="hidden" id="sel-player" />
      </div>
    </div>

    <div style="font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;">选择分析类型</div>
    <div class="type-cards">
      <div class="type-card" id="card-batting" onclick="selectType('batting')">
        <div class="icon">⚡</div>
        <div class="type-name">⚾ 打击分析</div>
        <div class="type-desc">上传挥棒视频，分析挥棒速度、轨迹、力量、BPA角度</div>
      </div>
      <div class="type-card" id="card-pitching" onclick="selectType('pitching')">
        <div class="icon">🎯</div>
        <div class="type-name">🏹 投球分析</div>
        <div class="type-desc">上传投球视频，分析球速、控球力、球种分布、耐力</div>
      </div>
    </div>

    <button class="btn-ai" id="btn-next-step1" disabled onclick="goToStep2()">
      ▶ 继续：上传视频
    </button>
  </div>
</div>`;
}

function onPlayerChange() {
  var sel = document.getElementById('sel-player');
  selectedPlayer = sel && sel.value ? { id: sel.value, name: sel.dataset.name } : null;
  var nameEl = document.getElementById('sel-player-name');
  if (nameEl) nameEl.textContent = selectedPlayer ? '已选：' + selectedPlayer.name : '';
  updateStep1Btn();
}

function showPlayerDropdown() {
  // 每次点击时直接从Firebase REST实时拉取最新球员列表
  loadAllPlayersForSearch(function(players) {
    window._searchPlayers = players;
    var inp = document.getElementById('player-search-input');
    filterPlayerList(inp ? inp.value : '');
  });
}

function loadAllPlayersForSearch(cb) {
  // 优先使用已缓存的allPlayers
  if (window.allPlayers && window.allPlayers.length > 10) {
    cb(window.allPlayers);
    return;
  }
  // 否则直接查Firebase REST
  var dbUrl = 'https://baseai-hk-default-rtdb.asia-southeast1.firebasedatabase.app/players.json';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', dbUrl, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try {
        var raw = JSON.parse(xhr.responseText);
        var players = [];
        for (var k in raw) {
          if (raw[k] && raw[k].name) players.push(raw[k]);
        }
        window.allPlayers = players;
        cb(players);
      } catch(e) { cb([]); }
    } else if (xhr.readyState === 4) {
      cb(window.allPlayers || []);
    }
  };
  xhr.send();
}

function filterPlayerList(query) {
  var dropdown = document.getElementById('player-dropdown');
  if (!dropdown) return;
  var q = query.trim().toLowerCase();
  var pool = window._searchPlayers || window.allPlayers || [];
  var filtered = pool.filter(function(p) {
    return p.name && p.name.toLowerCase().includes(q);
  }).slice(0, 50); // 最多显示50条
  if (filtered.length === 0) {
    dropdown.innerHTML = '<div style="padding:16px;color:#64748b;font-size:13px;text-align:center;">未找到匹配球员</div>';
    dropdown.style.display = 'block';
    return;
  }
  dropdown.innerHTML = filtered.map(function(p) {
    return '<div class="pdi-item" data-id="'+(p.id||p.player_id)+'" data-name="'+esc(p.name)+'" onclick="selectPlayerItem(this)">'+
           '<span style="font-weight:600;color:#f1f5f9">'+esc(p.name)+'</span>'+
           (p.position ? '<span style="color:#64748b;font-size:12px;margin-left:8px">'+esc(p.position)+'</span>' : '')+
           '</div>';
  }).join('');
  dropdown.style.display = 'block';
}

function selectPlayerItem(el) {
  var id = el.dataset.id;
  var name = el.dataset.name;
  var inp = document.getElementById('player-search-input');
  if (inp) inp.value = name;
  var sel = document.getElementById('sel-player');
  if (sel) { sel.value = id; sel.dataset.name = name; }
  var dropdown = document.getElementById('player-dropdown');
  if (dropdown) dropdown.style.display = 'none';
  onPlayerChange();
}

// 点击空白关闭下拉
document.addEventListener('click', function(e) {
  var dropdown = document.getElementById('player-dropdown');
  var input = document.getElementById('player-search-input');
  if (dropdown && input && !dropdown.contains(e.target) && !input.contains(e.target)) {
    dropdown.style.display = 'none';
  }
});

  selectedType = type;
  document.querySelectorAll('.type-card').forEach(function(c){ c.classList.remove('selected'); });

function triggerUpload(slot) {
  document.getElementById(slot+'-input').click();
}

function onVideoSlot(input, slot) {
  if (input.files && input.files[0]) applyVideoSlot(slot, input.files[0]);
}

function applyVideoSlot(slot, file) {
  if (slot === 'front') {
    videoFront = file;
    uploadedVideo = file; // 兼容旧逻辑
  } else {
    videoSide = file;
  }

  var drop = document.getElementById(slot+'-drop');
  var preview = document.getElementById(slot+'-preview');
  var videoEl = document.getElementById(slot+'-video');
  var durEl = document.getElementById(slot+'-duration');
  var nameEl = document.getElementById(slot+'-name');

  drop.style.display = 'none';
  preview.style.display = 'block';
  videoEl.src = URL.createObjectURL(file);
  nameEl.textContent = file.name;
  videoEl.onloadedmetadata = function() {
    var dur = Math.round(videoEl.duration);
    var mm = Math.floor(dur/60), ss = dur%60;
    durEl.textContent = (slot==='front'?'正面 ':'侧面 ')+(mm>0?mm+'分':'')+ss+'秒';
  };
  checkUploadReady();
}

function clearSlot(slot) {
  if (slot === 'front') { videoFront = null; uploadedVideo = null; }
  else { videoSide = null; }
  var drop = document.getElementById(slot+'-drop');
  var preview = document.getElementById(slot+'-preview');
  var videoEl = document.getElementById(slot+'-video');
  drop.style.display = '';
  preview.style.display = 'none';
  videoEl.src = '';
  document.getElementById(slot+'-input').value = '';
  checkUploadReady();
}

function checkUploadReady() {
  var btn = document.getElementById('btn-analyze');
  var hint = document.getElementById('upload-hint');
  if (!btn) return;
  if (videoFront) {
    btn.disabled = false;
    if (hint) hint.textContent = videoSide ? '✅ 双视频已就绪，双角度分析精度更高' : '⚠️ 建议同时上传侧面视频，获得更精准的分析结果';
  } else {
    btn.disabled = true;
    if (hint) hint.textContent = '请先上传正面视频才可开始分析';
  }
}

// 旧版 onVideoFile 兼容
function onVideoFile(file) {
  if (!file) return;
  applyVideoSlot('front', file);
}

function backToStep1() {
  currentStep = 1;
  selectedType = null;
  uploadedVideo = null;
  videoFront = null;
  videoSide = null;
  renderStep1();
}

}

function renderSteps() {
  var list = document.getElementById('steps-list');
  if (!list) return;
  list.innerHTML = analysisSteps.map(function(s){
    var cls = s.done ? 'done' : s.active ? 'active' : '';
    var icon = s.done ? '✓' : s.active ? '▸' : '○';
    return '<div class="step-row '+cls+'">'+icon+' '+s.text+'</div>';
  }).join('');
}

function runAnalysisSimulation() {
  var progress = 0;
  var stepIdx = 0;
  analysisInterval = setInterval(function() {
    progress += Math.random() * 12 + 4;
    if (progress >= 100) {
      progress = 100;
      clearInterval(analysisInterval);
      setTimeout(function() { generateResult(); }, 400);
    }
    var el = document.getElementById('ai-progress');
    if (el) el.style.width = Math.min(progress, 100) + '%';
    var newStepIdx = Math.floor(progress / (100 / analysisSteps.length));
    if (newStepIdx > stepIdx && newStepIdx < analysisSteps.length) {
      analysisSteps[stepIdx].done = true;
      analysisSteps[stepIdx].active = false;
      stepIdx = newStepIdx;
      analysisSteps[stepIdx].active = true;
      renderSteps();
    } else if (progress >= 100) {
      analysisSteps.forEach(function(s){ s.done = true; s.active = false; });
      renderSteps();
    }
  }, 250);
}

        desc: '使用击球机器进行多元化击球训练，提升反应速度和击球命中率。',

    renderBattingResult(sugs, plans, { speedAvg, speedMax, bpa, trajectory, power, speed, contact, defense, control, overall });

  } else {
    // ===== 真实 AI 投球分析（MediaPipe Pose） =====

    var analysisSteps_pitch = [
      { text: '📹 加载 MediaPipe Pose 模型…', done: false, active: true },
      { text: '🦾 检测投手关节点…', done: false, active: false },

      { text: '⚡ 估算球速 & 好球率…', done: false, active: false },
      { text: '💡 生成个性化训练建议…', done: false, active: false }
    ];

    function updatePitchSteps(stepIdx) {
      analysisSteps_pitch.forEach(function(s, i) {
        s.done = i < stepIdx;

      }
      analysisResult = results;

      // 构建 UI 建议（来自规则引擎）
      var sugs = [];
      var recs = results.recommendations || [];

          cls: r.priority === 'good' ? 'good' : r.priority === 'critical' ? 'warn' : 'info',

          title: r.title,
          text: r.actions ? r.actions.join('；') : ''
        });
      });

      // 视频数量提示
      if (!results.hasDual) {
        sugs.push({ cls: 'info', icon: '📹', title: '建议上传侧面视频', text: '同时上传正面+侧面视频，可将分析精度从 65% 提升至约 85%。' });
      }

      var plans = [
        { title: '出手点稳定性训练', pri: '高', priCls: '#f97316', bgCls: 'rgba(249,115,22,0.15)',

          duration: '8周', freq: '每周3次', level: '中级', tag: '球速 ↑8km/h', tagColor: '#ef4444' },
        { title: '变化球种系统训练', pri: '中', priCls: '#3b82f6', bgCls: 'rgba(59,130,246,0.15)',
          desc: '在直球控球稳定后，系统学习曲球（12-6型）和变速球的手腕、握球位置，巩固肌肉记忆。U12建议主攻曲球。',

      renderPitchingResult(sugs, plans, results);

    // 启动真实分析

  if (analysisHistory.length > 30) analysisHistory.pop();
  localStorage.setItem('baseai_ai_history', JSON.stringify(analysisHistory));
}

// ====== RADAR DRAW ======
function drawRadar(svgId, scores) {
  var svg = document.getElementById(svgId);
  if (!svg) return;
  var cx = 120, cy = 120, r = 90;
  var labels = ['力量','速度','击球','防守','控球'];
  var keys = ['power','speed','contact','defense','control'];
  var n = labels.length;
  var step = (2*Math.PI)/n;
  var html = '';

  // Background rings
  for (var lvl = 1; lvl <= 5; lvl++) {
    var lr = r*(lvl/5);
    var pts = [];
    for (var i = 0; i < n; i++) {
      var a = i*step - Math.PI/2;
      pts.push((cx+lr*Math.cos(a)).toFixed(1)+','+(cy+lr*Math.sin(a)).toFixed(1));
    }
    html += '<polygon points="'+pts.join(' ')+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
  }
  // Spokes
  for (var i = 0; i < n; i++) {
    var a = i*step - Math.PI/2;
    html += '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
  }
  // Data polygon
  var dPts = [];
  for (var i = 0; i < n; i++) {
    var v = Math.min((scores[keys[i]]||60)/100, 1);
    var a = i*step - Math.PI/2;
    dPts.push((cx+r*v*Math.cos(a)).toFixed(1)+','+(cy+r*v*Math.sin(a)).toFixed(1));
  }
  html += '<polygon points="'+dPts.join(' ')+'" fill="rgba(249,115,22,0.2)" stroke="#f97316" stroke-width="2.5"/>';
  // Dots
  for (var i = 0; i < n; i++) {
    var v = Math.min((scores[keys[i]]||60)/100, 1);
    var a = i*step - Math.PI/2;
    var px = (cx+r*v*Math.cos(a)).toFixed(1), py = (cy+r*v*Math.sin(a)).toFixed(1);
    html += '<circle cx="'+px+'" cy="'+py+'" r="5" fill="#f97316" stroke="white" stroke-width="2"/>';
  }
  // Labels
  for (var i = 0; i < n; i++) {
    var a = i*step - Math.PI/2;
    var lx = (cx+(r+18)*Math.cos(a)).toFixed(1), ly = (cy+(r+18)*Math.sin(a)).toFixed(1);
    html += '<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" fill="#64748b" font-size="11" font-weight="600">'+labels[i]+'</text>';
  }
  svg.innerHTML = html;
}

  var toast = document.createElement('div');
  toast.id = 'baseai-toast';
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;background:'+colors[type]+';color:white;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:slideUp 0.3s ease';
  toast.textContent = msg;
  document.body.appendChild(toast);
  var style = document.createElement('style');
  style.textContent = '@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}';
  document.head.appendChild(style);
  setTimeout(function(){ toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(function(){ toast.remove(); }, 300); }, 3000);
}

// ====== COACH REVIEW ======
var currentCoachRating = null;
var currentCoachRatingP = null;

// 打击 - 教练点评显示
function showCoachReview(type) {
  if (type === 'batting') {
    var panel = document.getElementById('coach-review-panel');
    if (!panel) return;
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // 绑定字数统计
    var ta = document.getElementById('coach-comments');
    if (ta) {
      ta.addEventListener('input', function(){
        document.getElementById('coach-char-count').textContent = ta.value.length + ' / 300';
      });
    }
    // 检查是否已有保存的点评
    loadSavedCoachReview(type);
  } else {
    var panelP = document.getElementById('coach-review-panel-p');
    if (!panelP) return;
    panelP.style.display = 'block';
    panelP.scrollIntoView({ behavior: 'smooth', block: 'center' });
    var taP = document.getElementById('coach-comments-p');
    if (taP) {
      taP.addEventListener('input', function(){
        document.getElementById('coach-char-count-p').textContent = taP.value.length + ' / 300';
      });
    }
    loadSavedCoachReview(type);
  }
}

function hideCoachReview() {
  var panel = document.getElementById('coach-review-panel');
  if (panel) panel.style.display = 'none';
}
function hideCoachReviewP() {
  var panel = document.getElementById('coach-review-panel-p');
  if (panel) panel.style.display = 'none';
}

function setCoachRating(r) {
  currentCoachRating = r;
  document.querySelectorAll('.coach-badge-btn').forEach(function(b){ b.style.opacity='0.5'; b.style.borderColor='rgba(255,255,255,0.1)'; });
  var btn = document.getElementById('rate-'+r);
  if (btn) { btn.style.opacity='1'; btn.style.borderColor='currentColor'; }
}
function setCoachRatingP(r) {
  currentCoachRatingP = r;
  document.querySelectorAll('.coach-badge-btn-p').forEach(function(b){ b.style.opacity='0.5'; b.style.borderColor='rgba(255,255,255,0.1)'; });
  var btn = document.getElementById('rate-p-'+r);
  if (btn) { btn.style.opacity='1'; btn.style.borderColor='currentColor'; }
}

function saveCoachReview(type) {
  var coachName, comments, rating, panelId, savedId, prefix;
  if (type === 'batting') {
    coachName = (document.getElementById('coach-name') || {}).value || '';
    comments = (document.getElementById('coach-comments') || {}).value || '';
    rating = currentCoachRating;
    panelId = 'coach-review-panel';
    savedId = 'coach-review-saved';
    prefix = 'bat';
  } else {
    coachName = (document.getElementById('coach-name-p') || {}).value || '';
    comments = (document.getElementById('coach-comments-p') || {}).value || '';
    rating = currentCoachRatingP;
    panelId = 'coach-review-panel-p';
    savedId = 'coach-review-saved-p';
    prefix = 'pitch';
  }

  if (!coachName.trim()) { showToast('请填写教练姓名', 'warning'); return; }
  if (comments.trim().length < 10) { showToast('请填写至少10字的点评内容', 'warning'); return; }

  var ratingLabels = { excellent: '优秀', good: '良好', developing: '需提升' };
  var ratingColors = { excellent: '#10b981', good: '#3b82f6', developing: '#f97316' };
  var ratingBadge = rating ? '<span style="display:inline-flex;align-items:center;gap:4px;background:'+ratingColors[rating]+'22;border:1px solid '+ratingColors[rating]+'55;color:'+ratingColors[rating]+';padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;">'+ratingLabels[rating]+'</span>' : '';

  var review = {
    date: new Date().toLocaleString('zh-CN'),
    playerName: selectedPlayer.name,
    playerId: selectedPlayer.id,
    type: type,
    coachName: coachName.trim(),
    comments: comments.trim(),
    rating: rating,
    aiScore: analysisResult ? analysisResult.overall : 0,
    videoName: uploadedVideo ? uploadedVideo.name : ''
  };

  // 保存到历史
  var historyKey = 'baseai_coach_reviews';
  var reviews = JSON.parse(localStorage.getItem(historyKey) || '[]');
  reviews.unshift(review);
  if (reviews.length > 30) reviews.pop();
  localStorage.setItem(historyKey, JSON.stringify(reviews));

  // 保存到当前分析结果
  var analysisKey = 'baseai_ai_history';
  var history = JSON.parse(localStorage.getItem(analysisKey) || '[]');
  if (history[0]) {
    history[0].coachReview = { coachName: coachName.trim(), comments: comments.trim(), rating: rating };
    localStorage.setItem(analysisKey, JSON.stringify(history));
  }

  // 显示已保存的点评
  var savedEl = document.getElementById(savedId);
  if (savedEl) {
    savedEl.style.display = 'block';
    savedEl.innerHTML = `
      <div style="background:rgba(20,26,46,0.9);border:1px solid rgba(249,115,22,0.3);border-radius:14px;padding:20px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
          <div style="width:40px;height:40px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:white;flex-shrink:0;">${coachName.charAt(0)}</div>
          <div>
            <div style="font-size:14px;font-weight:700;color:#f1f5f9;">${esc(coachName)}</div>
            <div style="font-size:11px;color:#64748b;">${review.date}</div>
          </div>
          ${ratingBadge}
          <button onclick="deleteCoachReview('${prefix}')" style="margin-left:auto;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;">删除</button>
        </div>
        <div style="font-size:13px;color:#94a3b8;line-height:1.7;background:rgba(15,23,42,0.6);border-radius:8px;padding:14px;font-style:italic;">"${esc(comments)}"</div>
      </div>`;
  }

  // 隐藏编辑面板
  var panel = document.getElementById(panelId);
  if (panel) panel.style.display = 'none';

  showToast('教练点评已保存', 'success');

  // 保存到 Firebase（如果 DB 可用）
  saveReviewToFirebase(review);
}

function loadSavedCoachReview(type) {
  var historyKey = 'baseai_ai_history';
  var history = JSON.parse(localStorage.getItem(historyKey) || '[]');
  if (history[0] && history[0].coachReview && history[0].coachReview.coachName) {
    var cr = history[0].coachReview;
    var ratingLabels = { excellent: '优秀', good: '良好', developing: '需提升' };
    var ratingColors = { excellent: '#10b981', good: '#3b82f6', developing: '#f97316' };
    var ratingBadge = cr.rating ? '<span style="display:inline-flex;align-items:center;gap:4px;background:'+ratingColors[cr.rating]+'22;border:1px solid '+ratingColors[cr.rating]+'55;color:'+ratingColors[cr.rating]+';padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;">'+ratingLabels[cr.rating]+'</span>' : '';
    var savedId = type === 'batting' ? 'coach-review-saved' : 'coach-review-saved-p';
    var savedEl = document.getElementById(savedId);
    if (savedEl) {
      savedEl.style.display = 'block';
      savedEl.innerHTML = `
        <div style="background:rgba(20,26,46,0.9);border:1px solid rgba(249,115,22,0.3);border-radius:14px;padding:20px;">
          <div style="font-size:12px;font-weight:700;color:#f97316;margin-bottom:10px;">👨‍🏫 已保存的教练点评</div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="width:36px;height:36px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white;flex-shrink:0;">${cr.coachName.charAt(0)}</div>
            <div style="font-size:13px;font-weight:700;color:#f1f5f9;">${esc(cr.coachName)}</div>
            ${ratingBadge}
            <button onclick="editCoachReview('${type}')" style="margin-left:auto;background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.3);color:#f97316;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;">编辑</button>
          </div>
          <div style="font-size:13px;color:#94a3b8;line-height:1.7;background:rgba(15,23,42,0.6);border-radius:8px;padding:12px;font-style:italic;">"${esc(cr.comments)}"</div>
        </div>`;
    }
  }
}

function editCoachReview(type) {
  // 从历史加载已有点评到编辑框
  var historyKey = 'baseai_ai_history';
  var history = JSON.parse(localStorage.getItem(historyKey) || '[]');
  if (history[0] && history[0].coachReview) {
    var cr = history[0].coachReview;
    if (type === 'batting') {
      var nameEl = document.getElementById('coach-name');
      var comEl = document.getElementById('coach-comments');
      if (nameEl) nameEl.value = cr.coachName;
      if (comEl) comEl.value = cr.comments;
      if (cr.rating) setCoachRating(cr.rating);
      var panel = document.getElementById('coach-review-panel');
      if (panel) { panel.style.display = 'block'; panel.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    } else {
      var nameElP = document.getElementById('coach-name-p');
      var comElP = document.getElementById('coach-comments-p');
      if (nameElP) nameElP.value = cr.coachName;
      if (comElP) comElP.value = cr.comments;
      if (cr.rating) setCoachRatingP(cr.rating);
      var panelP = document.getElementById('coach-review-panel-p');
      if (panelP) { panelP.style.display = 'block'; panelP.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }
  }
}

function deleteCoachReview(prefix) {
  var historyKey = 'baseai_ai_history';
  var history = JSON.parse(localStorage.getItem(historyKey) || '[]');
  if (history[0]) { history[0].coachReview = null; localStorage.setItem(historyKey, JSON.stringify(history)); }
  var savedId = prefix === 'bat' ? 'coach-review-saved' : 'coach-review-saved-p';
  var savedEl = document.getElementById(savedId);
  if (savedEl) { savedEl.style.display = 'none'; savedEl.innerHTML = ''; }
  showToast('教练点评已删除', 'info');
}

async function saveReviewToFirebase(review) {
  try {
    if (typeof DB !== 'undefined' && DB.saveCoachReview) {
      await DB.saveCoachReview(review);
    }
  } catch(e) {
    // Firebase 失败不影响本地保存
  }
}

      : '';

      <div class="hi-avatar" style="background:${color}">${(h.playerName||'?').charAt(0)}</div>

        <div class="hi-name">${esc(h.playerName)}</div>
        <div class="hi-meta">${esc(h.type)} · ${esc(h.date)}</div>
        ${hasReview ? '<div style="font-size:11px;color:#64748b;margin-top:2px;">👨‍🏫 '+esc(h.coachReview.coachName)+'</div>' : ''}
      </div>
      <div style="text-align:right;">
        <div class="hi-score" style="color:${isPitch?'#3b82f6':'#f97316'}">${h.overall}</div>
        <div class="hi-type">${isPitch?'投球':'打击'}${reviewBadge}</div>

        <button class="btn btn-secondary" onclick="event.stopPropagation();showHistoryDetail(${i})">查看</button>

  mc.innerHTML = `
<div class="panel fade-in">
  <div class="panel-header">
    <div class="panel-title">📊 分析历史</div>
    <span style="margin-left:auto;font-size:12px;color:#64748b;">${analysisHistory.length} 条记录</span>
    <button class="btn btn-secondary" onclick="startNewAnalysis()" style="font-size:12px;">+ 新分析</button>
  </div>
  <div class="panel-body">
    ${historyItems.length > 0 ? historyItems.join('') : '<div class="empty-state"><div class="icon">📊</div><div class="title">暂无分析记录</div></div>'}
  </div>
</div>

<!-- 教练点评汇总 -->
${allReviews.length > 0 ? `
<div class="panel fade-in" style="margin-top:20px;">
  <div class="panel-header">
    <div class="panel-title">👨‍🏫 教练点评汇总</div>
    <span style="margin-left:auto;font-size:12px;color:#64748b;">${allReviews.length} 条点评</span>
  </div>
  <div class="panel-body">
    ${allReviews.slice(0,10).map(function(r){
      var isPitch = r.type === 'pitching';

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">

          <div style="flex:1;">
