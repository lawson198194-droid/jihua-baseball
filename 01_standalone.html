<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaseAI - 球员资料库</title>
<style>
:root {
  --bg: #0b0e14; --bg-card: #151923; --bg-secondary: #0f1319;
  --border: rgba(255,255,255,0.08); --border-light: rgba(255,255,255,0.04);
  --text: #e2e8f0; --text-muted: #64748b; --text-secondary: #94a3b8;
  --primary: #6366f1; --primary-light: #818cf8;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  --radius: 8px; --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4); --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ===== APP LAYOUT ===== */
.app { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--bg-card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0; overflow-y: auto;
}
.sidebar-logo {
  padding: 28px 20px 20px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.logo-mark { font-size: 32px; margin-bottom: 8px; }
.sidebar-logo h1 { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
.subtitle { font-size: 9px; color: var(--text-muted); letter-spacing: 3px; margin-top: 2px; }
.sidebar-section { padding: 16px 12px 8px; }
.sidebar-section-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; padding: 0 8px 8px; text-transform: uppercase; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius);
  color: var(--text-muted); text-decoration: none;
  font-size: 14px; font-weight: 500; transition: all 0.15s;
  border-left: 3px solid transparent; margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg-secondary); color: var(--text); }
.nav-item.active { background: rgba(99,102,241,0.12); color: var(--primary-light); border-left-color: var(--primary); }
.nav-item.ai-item.active { background: rgba(245,158,11,0.12); color: #fbbf24; border-left-color: #f59e0b; }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.nav-badge { margin-left: auto; background: #f59e0b; color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; letter-spacing: 0.5px; }
.sidebar-footer { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }
.db-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
.db-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
.db-dot.offline { background: var(--text-muted); }

/* ===== TOPBAR ===== */
.topbar {
  height: 60px; background: var(--bg-card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 15px; font-weight: 700; }
.topbar-user { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
.user-avatar { width: 30px; height: 30px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

/* ===== MAIN CONTENT ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.page-content { padding: 28px; flex: 1; overflow-y: auto; }

/* ===== PLAYER GRID ===== */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title-wrap h2 { font-size: 22px; font-weight: 800; }
.page-title-wrap p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost { background: none; color: var(--text-muted); }
.btn-ghost:hover { color: var(--text); background: var(--bg-secondary); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.filter-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.filter-bar input[type="text"] { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; color: var(--text); font-size: 14px; outline: none; flex: 1; min-width: 200px; transition: border-color 0.2s; }
.filter-bar input[type="text"]:focus { border-color: var(--primary); }
.filter-bar select { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; color: var(--text); font-size: 14px; outline: none; cursor: pointer; }
.filter-bar select:focus { border-color: var(--primary); }

.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.player-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
.player-card:hover { transform: translateY(-3px); border-color: var(--primary); }
.player-card-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px 12px; }
.player-avatar-lg { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: white; flex-shrink: 0; }
.player-info h3 { font-size: 15px; font-weight: 700; }
.player-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.player-card-body { padding: 0 18px 14px; }
.player-stats { display: flex; gap: 8px; margin-bottom: 12px; }
.player-stat { flex: 1; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px; text-align: center; }
.player-stat .val { font-size: 15px; font-weight: 700; }
.player-stat .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.player-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: rgba(99,102,241,0.15); color: #818cf8; }
.badge-success { background: rgba(16,185,129,0.15); color: #34d399; }
.badge-info { background: rgba(14,165,233,0.15); color: #38bdf8; }
.player-card-footer { padding: 10px 14px; border-top: 1px solid var(--border-light); display: flex; gap: 6px; }
.player-card-footer .btn { flex: 1; justify-content: center; font-size: 12px; }
.empty-state { text-align: center; padding: 80px 20px; }
.empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { color: var(--text-muted); font-size: 14px; }
.topbar-stats { display: flex; align-items: center; height: 100%; }
.topbar-stat { display: flex; flex-direction: column; justify-content: center; padding: 0 16px; border-right: 1px solid var(--border); min-width: 70px; text-align: center; }
.topbar-stat .num { font-size: 18px; font-weight: 800; font-family: var(--font-mono); }
.topbar-stat .label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; }
</style>
</head>
<body>

<script>
// ============================================================
// DB (MINIMAL IN-MEMORY - self-contained, no external deps)
// ============================================================
(function() {
  var _mem = {};

  var DEMO_PLAYERS = [
    { id:'P001',player_id:'P001',name:'罗莀安',gender:'F',position:'投手',birth_date:'2013-03-15',height_cm:148,weight_kg:42,school:'SISHK',batting_hand:'R',throwing_hand:'R',status:'active' },
    { id:'P002',player_id:'P002',name:'陈伟霆',gender:'M',position:'捕手',birth_date:'2012-07-22',height_cm:155,weight_kg:50,school:'男拔附小',batting_hand:'R',throwing_hand:'R',status:'active' },
    { id:'P003',player_id:'P003',name:'李芷晴',gender:'F',position:'内野',birth_date:'2013-11-08',height_cm:143,weight_kg:38,school:'协恩附小',batting_hand:'L',throwing_hand:'R',status:'active' },
    { id:'P004',player_id:'P004',name:'张浩然',gender:'M',position:'外野',birth_date:'2012-05-30',height_cm:160,weight_kg:55,school:'喇沙附小',batting_hand:'R',throwing_hand:'R',status:'active' },
    { id:'P005',player_id:'P005',name:'王心怡',gender:'F',position:'游击手',birth_date:'2013-09-14',height_cm:145,weight_kg:40,school:'拔萃女小',batting_hand:'S',throwing_hand:'R',status:'active' },
    { id:'P006',player_id:'P006',name:'刘建华',gender:'M',position:'投手',birth_date:'2012-02-28',height_cm:158,weight_kg:52,school:'圣保禄附小',batting_hand:'R',throwing_hand:'R',status:'active' },
    { id:'P007',player_id:'P007',name:'周雅文',gender:'F',position:'一垒手',birth_date:'2013-06-19',height_cm:150,weight_kg:44,school:'英华女校',batting_hand:'R',throwing_hand:'R',status:'active' },
    { id:'P008',player_id:'P008',name:'吴俊豪',gender:'M',position:'中外野',birth_date:'2012-12-03',height_cm:162,weight_kg:58,school:'福德附小',batting_hand:'L',throwing_hand:'R',status:'active' },
  ];

  _mem.players = DEMO_PLAYERS;

  function genId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); }

  window.DB = {
    getPlayers: function() { return Promise.resolve({ data: _mem.players || [], error: null }); },
    getMode: function() { return 'in-memory (standalone)'; }
  };
})();

// ============================================================
// NAV (BUILT IN)
// ============================================================
var MODULES = [
  { id:'m1', name:'球员资料库', icon:'👥', href:'01_球员资料库.html' },
  { id:'m2', name:'球队梯队', icon:'🏆', href:'02_球队梯队管理.html' },
  { id:'m3', name:'赛事记分', icon:'📊', href:'03_赛事管理与记分.html' },
  { id:'m4', name:'技术档案', icon:'📈', href:'04_球员技术档案.html' },
  { id:'m5', name:'权限后台', icon:'⚙️', href:'05_权限与后台管理.html' },
];
var CURRENT = window.location.pathname.split('/').pop() || '01_球员资料库.html';

function buildNav() {
  var html = '<aside class="sidebar"><div class="sidebar-logo"><div class="logo-mark">⚾</div><h1>BaseAI</h1><div class="subtitle">BASEBALL SYSTEM</div></div><div class="sidebar-section"><div class="sidebar-section-label">📋 核心模块</div>';
  MODULES.forEach(function(m) {
    var active = CURRENT === m.href ? ' active' : '';
    html += '<a href="'+m.href+'" class="nav-item'+active+'"><div class="nav-icon">'+m.icon+'</div><span>'+m.name+'</span></a>';
  });
  html += '</div><div class="sidebar-section"><div class="sidebar-section-label">🧠 智能模块</div><a href="ai-coach-v2.html" class="nav-item ai-item'+(CURRENT.includes('06_')?' active':'')+'"><div class="nav-icon">🤖</div><span>AI 专属教练</span><span class="nav-badge">AI</span></a></div>';
  html += '<div class="sidebar-section" style="margin-top:auto;"><a href="index.html" class="nav-item" style="border-top:1px solid var(--border);border-left:none;border-radius:0;"><div class="nav-icon">🏠</div><span>返回首页</span></a></div>';
  html += '<div class="sidebar-footer"><div class="db-indicator"><div class="db-dot offline"></div><span id="nav-db-label">本地存储</span></div><div style="margin-top:4px;font-size:10px;">v2.0 · 2026-04-19</div></div></aside>';
  return html;
}

function buildTopbar(title, subtitle) {
  return '<header class="topbar"><div class="topbar-left"><div><div class="topbar-title">'+title+'</div><div style="font-size:11px;color:var(--text-muted);">'+subtitle+'</div></div></div><div class="topbar-right"><div class="topbar-stats" id="topbar-stats"></div><div class="topbar-user"><div class="user-avatar">⚾</div><span>管理员</span></div></div></header>';
}

document.body.innerHTML = buildNav() + '<main class="main">' + buildTopbar('球员资料库', 'Module 01 · Player Registry') + '<div class="page-content" id="page-content"></div></main>';

// ============================================================
// HELPERS
// ============================================================
var avatarColors = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ec4899','#f59e0b','#06b6d4','#84cc16'];
function getAvatarColor(n) { return avatarColors[(n||'A').charCodeAt(0) % avatarColors.length]; }
function calcAge(bd) {
  if (!bd) return '-';
  var t = new Date(), b = new Date(bd);
  var a = t.getFullYear() - b.getFullYear();
  var m = t.getMonth() - b.getMonth();
  if (m < 0 || (m===0 && t.getDate() < b.getDate())) a--;
  return a;
}
function fmtHand(h) { return h==='L'?'左':h==='R'?'右':h==='S'?'双':'-'; }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// ============================================================
// STATE
// ============================================================
var allPlayers = [];
var filteredPlayers = [];
var filterGender = '';
var filterStatus = '';
var searchText = '';

// ============================================================
// LOAD & RENDER
// ============================================================
function renderTopbarStats() {
  var pc = { total: allPlayers.length, active: allPlayers.filter(function(p){ return p.status==='active'; }).length, male: allPlayers.filter(function(p){ return p.gender==='M'; }).length, female: allPlayers.filter(function(p){ return p.gender==='F'; }).length };
  var el = document.getElementById('topbar-stats');
  if (el) el.innerHTML = '<div class="topbar-stat"><div class="num">'+pc.total+'</div><div class="label">注册球员</div></div><div class="topbar-stat"><div class="num">'+pc.active+'</div><div class="label">活跃球员</div></div><div class="topbar-stat"><div class="num">'+pc.male+'</div><div class="label">男生</div></div><div class="topbar-stat"><div class="num">'+pc.female+'</div><div class="label">女生</div></div>';
}

function renderPlayers(players) {
  var container = document.getElementById('page-content');
  renderTopbarStats();

  var html = '<div class="page-header"><div class="page-title-wrap"><h2>⚾ 球员资料库 <span style="font-size:14px;color:#34d399;font-weight:400">(' + players.length + ' 人)</span></h2><p>管理所有注册球员信息，数据实时保存到数据库</p></div><div class="page-actions"><button class="btn btn-secondary btn-sm" onclick="exportPlayers()">📤 导出</button><button class="btn btn-secondary btn-sm" onclick="importPlayers()">📥 导入</button><button class="btn btn-primary" onclick="openAddModal()">+ 新增球员</button></div></div>';

  html += '<div class="filter-bar"><input type="text" id="search-input" placeholder="🔍 搜索姓名、学号、学校..." value="'+escHtml(searchText)+'" oninput="applyFilters()"><select id="filter-gender" onchange="applyFilters()"><option value="">全部性别</option><option value="M" '+(filterGender==='M'?'selected':'')+'>男</option><option value="F" '+(filterGender==='F'?'selected':'')+'>女</option></select><select id="filter-status" onchange="applyFilters()"><option value="">全部状态</option><option value="active" '+(filterStatus==='active'?'selected':'')+'>活跃</option><option value="inactive" '+(filterStatus==='inactive'?'selected':'')+'>非活跃</option></select><button class="btn btn-ghost btn-sm" onclick="resetFilters()">重置</button></div>';

  if (players.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">👥</div><h3>暂无球员数据</h3><p>点击右上角「新增球员」添加第一条记录</p><button class="btn btn-primary" onclick="openAddModal()" style="margin-top:16px;">+ 新增球员</button></div>';
  } else {
    html += '<div class="player-grid">';
    players.forEach(function(p) {
      var color = getAvatarColor(p.name);
      var age = calcAge(p.birth_date);
      html += '<div class="player-card"><div class="player-card-header"><div class="player-avatar-lg" style="background:'+color+'">'+(p.name||'?').charAt(0)+'</div><div class="player-info"><h3>'+escHtml(p.name)+'</h3><div class="player-meta">'+escHtml(p.player_id||'')+' · '+age+'岁 · '+(p.gender==='M'?'男':'女')+'</div></div></div><div class="player-card-body"><div class="player-stats"><div class="player-stat"><div class="val">'+(p.height_cm||'-')+'</div><div class="lbl">身高(cm)</div></div><div class="player-stat"><div class="val">'+(p.weight_kg||'-')+'</div><div class="lbl">体重(kg)</div></div><div class="player-stat"><div class="val" style="font-size:13px;">'+fmtHand(p.batting_hand)+'</div><div class="lbl">打击</div></div></div><div class="player-tags"><span class="badge">'+escHtml(p.position||'未设定')+'</span><span class="badge '+(p.status==='active'?'badge-success':'')+'">'+(p.status==='active'?'活跃':'非活跃')+'</span><span class="badge badge-info">'+fmtHand(p.throwing_hand)+'投</span></div></div><div class="player-card-footer"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();alert(\'编辑功能\')">✏️ 编辑</button><button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="event.stopPropagation();">🗑️</button></div></div>';
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function applyFilters() {
  searchText = (document.getElementById('search-input') || {value:''}).value;
  filterGender = (document.getElementById('filter-gender') || {value:''}).value;
  filterStatus = (document.getElementById('filter-status') || {value:''}).value;
  filteredPlayers = allPlayers.filter(function(p) {
    if (filterGender && p.gender !== filterGender) return false;
    if (filterStatus && p.status !== filterStatus) return false;
    if (searchText) {
      var q = searchText.toLowerCase();
      var name = (p.name||'').toLowerCase();
      var id = (p.player_id||'').toLowerCase();
      var school = (p.school||'').toLowerCase();
      if (!name.includes(q) && !id.includes(q) && !school.includes(q)) return false;
    }
    return true;
  });
  renderPlayers(filteredPlayers);
}

function resetFilters() {
  searchText = ''; filterGender = ''; filterStatus = '';
  var si = document.getElementById('search-input');
  var fg = document.getElementById('filter-gender');
  var fs = document.getElementById('filter-status');
  if (si) si.value = '';
  if (fg) fg.value = '';
  if (fs) fs.value = '';
  filteredPlayers = allPlayers;
  renderPlayers(allPlayers);
}

window.applyFilters = applyFilters;
window.resetFilters = resetFilters;

// ============================================================
// BOOT
// ============================================================
DB.getPlayers().then(function(result) {
  allPlayers = result.data || [];
  filteredPlayers = allPlayers;
  renderPlayers(filteredPlayers);
  document.getElementById('nav-db-label').textContent = '内置数据 · ' + allPlayers.length + ' 人';
}).catch(function(e) {
  document.getElementById('page-content').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>加载失败</h3><p>' + e.message + '</p></div>';
});
</script>
</body>
</html>
