<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球员技术档案 — BaseAI</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a42;
  --bg-input: #141a2e;
  --primary: #f97316;
  --primary-light: #fb923c;
  --accent: #3b82f6;
  --success: #10b981;
  --success-bg: rgba(16, 185, 129, 0.12);
  --warning: #f59e0b;
  --warning-bg: rgba(245, 158, 11, 0.12);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.12);
  --info: #06b6d4;
  --info-bg: rgba(6, 182, 212, 0.12);
  --purple: #8b5cf6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.04);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; flex-shrink: 0; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
.logo-mark { font-size: 28px; margin-bottom: 8px; }
.sidebar-logo h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.sidebar-logo .subtitle { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; margin-top: 2px; }
.sidebar-section { padding: 12px 12px 0; }
.sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all 0.15s; margin-bottom: 2px; cursor: pointer; }
.nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.nav-item.active { background: rgba(249,115,22,0.12); color: var(--primary); font-weight: 600; }
.nav-icon { font-size: 16px; }
.nav-badge { margin-left: auto; font-size: 9px; background: var(--purple); color: white; padding: 1px 6px; border-radius: 10px; font-weight: 700; }
.sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
.db-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }

.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { height: 60px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; padding: 0 24px; flex-shrink: 0; justify-content: space-between; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 15px; font-weight: 700; }
.topbar-subtitle { font-size: 11px; color: var(--text-muted); }
.topbar-stats { display: flex; gap: 0; }
.topbar-stat { padding: 0 16px; border-right: 1px solid var(--border); text-align: center; }
.topbar-stat:last-child { border-right: none; }
.topbar-stat .num { font-size: 18px; font-weight: 800; line-height: 1.2; }
.topbar-stat .label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; }

.content { padding: 24px; flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; cursor: pointer; white-space: nowrap; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-secondary { background: var(--bg-card-hover); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title-wrap h2 { font-size: 22px; font-weight: 800; }
.page-title-wrap p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.filter-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.filter-bar input, .filter-bar select { padding: 7px 12px; font-size: 13px; min-width: 160px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius); outline: none; transition: border-color 0.2s; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--primary); }
.filter-bar input::placeholder { color: var(--text-muted); }
.filter-search { flex: 1; min-width: 200px; }

.profiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.profile-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.2s; }
.profile-card:hover { transform: translateY(-3px); border-color: rgba(249,115,22,0.4); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.profile-header { padding: 16px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border-light); }
.profile-avatar { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: white; flex-shrink: 0; }
.profile-name { font-size: 16px; font-weight: 700; }
.profile-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.profile-score { margin-left: auto; text-align: center; }
.profile-score .num { font-size: 28px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
.profile-score .lbl { font-size: 10px; color: var(--text-muted); }
.profile-body { padding: 16px 20px; }
.radar-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
.profile-canvas { display: block; }
.profile-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
.profile-stat { text-align: center; padding: 8px; background: var(--bg-secondary); border-radius: 8px; }
.profile-stat .val { font-size: 15px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.profile-stat .lbl { font-size: 9px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
.profile-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-primary { background: rgba(249,115,22,0.15); color: #fb923c; }
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-info { background: var(--info-bg); color: var(--info); }
.profile-footer { padding: 10px 20px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; justify-content: flex-end; }

.empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }

#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; box-shadow: var(--shadow); animation: slideIn 0.3s ease; max-width: 300px; }
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }
.toast.warning { background: var(--warning); color: #1a1a1a; }
.toast.info { background: var(--accent); color: white; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>

<script>

/* NAV */
function initNav() {

  html += '</div><div class="sidebar-section" style="margin-top:auto;"><a href="index.html" class="nav-item" style="border-top:1px solid var(--border);"><div class="nav-icon">🏠</div><span>返回首页</span></a></div>';
  html += '<div class="sidebar-footer"><div class="db-indicator"><span>⚡ 内置数据</span></div><div style="margin-top:4px;font-size:10px;">v2.0 · 2026-04-19</div></div>';

function showToast(msg, type) {
  type = type || 'info';
  var tc = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3000);
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
var avatarColors = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ec4899','#f59e0b','#06b6d4','#84cc16'];
function getAvatarColor(n) { return avatarColors[(n||'A').charCodeAt(0) % avatarColors.length]; }
function getTrendIcon(t) { return t === 'up' ? '📈' : t === 'down' ? '📉' : '➡️'; }
function getOverallColor(o) { return o >= 85 ? '#34d399' : o >= 75 ? '#818cf8' : o >= 60 ? '#fbbf24' : '#f87171'; }

function drawRadar(id, stats) {
  var canvas = document.getElementById(id);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 160, H = 160, CX = W/2, CY = H/2, R = 55;
  var labels = ['打击','速度','力量','技术'];
  var keys = ['batting','speed','power','technique'];
  var maxVal = 100;

  ctx.clearRect(0, 0, W, H);

  // Background circles
  for (var r = 1; r <= 4; r++) {
    ctx.beginPath();
    for (var i = 0; i <= 4; i++) {
      var angle = Math.PI * 2 * i / 4 - Math.PI / 2;
      var rr = R * r / 4;
      ctx.lineTo(CX + rr * Math.cos(angle), CY + rr * Math.sin(angle));
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axes
  for (var i = 0; i < 4; i++) {
    var angle = Math.PI * 2 * i / 4 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX + R * Math.cos(angle), CY + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  keys.forEach(function(k, i) {
    var v = stats[k] || 0;
    var angle = Math.PI * 2 * i / 4 - Math.PI / 2;
    var r = (v / maxVal) * R;
    if (i === 0) ctx.moveTo(CX + r * Math.cos(angle), CY + r * Math.sin(angle));
    else ctx.lineTo(CX + r * Math.cos(angle), CY + r * Math.sin(angle));
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(249,115,22,0.2)';
  ctx.fill();
  ctx.strokeStyle = '#f97316';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Data points
  keys.forEach(function(k, i) {
    var v = stats[k] || 0;
    var angle = Math.PI * 2 * i / 4 - Math.PI / 2;
    var r = (v / maxVal) * R;
    ctx.beginPath();
    ctx.arc(CX + r * Math.cos(angle), CY + r * Math.sin(angle), 3, 0, Math.PI * 2);
    ctx.fillStyle = '#f97316';
    ctx.fill();
  });

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  keys.forEach(function(k, i) {
    var angle = Math.PI * 2 * i / 4 - Math.PI / 2;
    ctx.fillText(labels[i], CX + (R + 14) * Math.cos(angle), CY + (R + 14) * Math.sin(angle) + 3);
  });
}

/* APPLICATION */
var allProfiles = [], filteredProfiles = [];
var filterPos = '', filterTeam = '', searchText = '';

function getStats() {
  var avg = allProfiles.length ? Math.round(allProfiles.reduce(function(s, p) { return s + (p.overall||0); }, 0) / allProfiles.length) : 0;
  var top = allProfiles.length ? Math.max.apply(null, allProfiles.map(function(p) { return p.overall||0; })) : 0;
  return { total: allProfiles.length, avg: avg, top: top };
}

function updateTopbarStats() {
  var s = getStats();
  document.getElementById('topbar-stats').innerHTML =
    '<div class="topbar-stat"><div class="num">' + s.total + '</div><div class="label">球员档案</div></div>' +
    '<div class="topbar-stat"><div class="num">' + s.avg + '</div><div class="label">平均评分</div></div>' +
    '<div class="topbar-stat"><div class="num" style="color:#34d399">' + s.top + '</div><div class="label">最高评分</div></div>';
}

function renderProfiles() {
  var list = document.getElementById('profile-list');
  updateTopbarStats();
  if (filteredProfiles.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📈</div><h3>暂无技术档案</h3><p>暂无球员技术数据</p></div>';
    return;
  }
  var html = '<div class="profiles-grid">';
  filteredProfiles.forEach(function(p) {
    var color = getAvatarColor(p.name);
    var overallColor = getOverallColor(p.overall);
    var isPitcher = p.position === '投手';
    html += '<div class="profile-card">' +
      '<div class="profile-header">' +
        '<div class="profile-avatar" style="background:' + color + '">' + (p.name||'?').charAt(0) + '</div>' +
        '<div><div class="profile-name">' + escHtml(p.name) + '</div><div class="profile-meta">' + escHtml(p.position||'') + ' · ' + p.age + '岁 · ' + escHtml(p.school||'') + '</div></div>' +
        '<div class="profile-score"><div class="num" style="color:' + overallColor + '">' + p.overall + '</div><div class="lbl">综合评分</div></div>' +
      '</div>' +
      '<div class="profile-body">' +
        '<div class="radar-wrap"><canvas id="radar-' + escHtml(p.id) + '" class="profile-canvas" width="160" height="160"></canvas></div>' +
        '<div class="profile-stats">' +
          '<div class="profile-stat"><div class="val">' + p.stats.batting + '</div><div class="lbl">打击</div></div>' +
          '<div class="profile-stat"><div class="val">' + p.stats.speed + '</div><div class="lbl">速度</div></div>' +
          '<div class="profile-stat"><div class="val">' + p.stats.power + '</div><div class="lbl">力量</div></div>' +
          '<div class="profile-stat"><div class="val">' + p.stats.technique + '</div><div class="lbl">技术</div></div>' +
        '</div>' +
        '<div class="profile-tags">' +
          (isPitcher
            ? '<span class="badge badge-primary">ERA ' + p.ERA + '</span><span class="badge badge-success">' + p.W + '胜 ' + p.L + '败</span><span class="badge badge-info">' + p.SO + 'K</span>'
            : '<span class="badge badge-success">打击率 ' + p.stats.batting + '</span>') +
          '<span class="badge badge-info">' + getTrendIcon(p.trend) + ' ' + (p.trend==='up'?'上升':p.trend==='down'?'下滑':'稳定') + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="profile-footer">' +
        '<button class="btn btn-ghost btn-sm" onclick="showToast(\'详细分析功能即将上线\', \'info\')">📋 详细报告</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="showToast(\'训练建议功能即将上线\', \'info\')">🎯 训练建议</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  list.innerHTML = html;
  // Draw radar charts after DOM insertion
  setTimeout(function() {
    filteredProfiles.forEach(function(p) { drawRadar('radar-' + p.id, p.stats); });
  }, 50);
}

function applyFilters() {
  searchText = document.getElementById('filter-search').value.trim().toLowerCase();
  filterPos = document.getElementById('filter-pos').value;
  filterTeam = document.getElementById('filter-team').value;
  filteredProfiles = allProfiles.filter(function(p) {
    if (filterPos && p.position !== filterPos) return false;
    if (filterTeam && p.team !== filterTeam) return false;
    if (searchText) {
      if ((p.name||'').toLowerCase().indexOf(searchText) >= 0) return true;
      if ((p.school||'').toLowerCase().indexOf(searchText) >= 0) return true;
      return false;
    }
    return true;
  });
  renderProfiles();
}

function resetFilters() {
  document.getElementById('filter-search').value = '';
  document.getElementById('filter-pos').value = '';
  document.getElementById('filter-team').value = '';
  filterPos = ''; filterTeam = ''; searchText = '';
  filteredProfiles = allProfiles;
  renderProfiles();
}

function loadProfiles() {
  DB.getProfiles().then(function(result) {
    allProfiles = result.data || [];
    filteredProfiles = allProfiles;
    renderProfiles();
    showToast('已加载 ' + allProfiles.length + ' 份技术档案', 'success');
  });
}

window.showToast = showToast;

document.getElementById('filter-search').addEventListener('input', applyFilters);
document.getElementById('filter-pos').addEventListener('change', applyFilters);
document.getElementById('filter-team').addEventListener('change', applyFilters);
document.getElementById('btn-reset').addEventListener('click', resetFilters);
document.getElementById('btn-ai').addEventListener('click', function() { showToast('AI分析功能即将上线', 'info'); });

initNav();
loadProfiles();
</script>
</body>
</html>
