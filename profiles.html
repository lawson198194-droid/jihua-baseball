<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术档案 — BaseAI</title>
<link rel="stylesheet" href="assets/design-system.css">
<style>
:root { --primary: #2563EB; --accent: #10B981; --danger: #EF4444; --bg: #F1F5F9; --bg-card: #FFFFFF; --text-primary: #1E293B; --text-secondary: #64748B; --text-muted: #94A3B8; --border: #E2E8F0; --border-light: #F1F5F9; --bg-secondary: #F8FAFC; --bg-card-hover: #F8FAFC; --success: #10B981; --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06); --radius: 10px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text-primary); overflow: hidden; }

/* ── App Shell ─────────────────────────────────────────── */
.app-shell { display: flex; height: 100vh; }
.sidebar { width: 300px; min-width: 300px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-title { font-size: 15px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
.search-box { position: relative; margin-top: 10px; }
.search-box input { width: 100%; padding: 8px 32px 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg-secondary); outline: none; transition: border .2s; }
.search-box input:focus { border-color: var(--primary); background: white; }
.search-box .search-icon { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-muted); pointer-events: none; }
.filter-row { display: flex; gap: 6px; margin-top: 8px; }
.filter-row select { flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; background: var(--bg-secondary); outline: none; cursor: pointer; }
.player-list { flex: 1; overflow-y: auto; padding: 8px; }
.player-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; transition: background .15s; border: 1px solid transparent; margin-bottom: 4px; }
.player-item:hover { background: var(--bg-card-hover); }
.player-item.active { background: #EFF6FF; border-color: #BFDBFE; }
.player-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--primary); flex-shrink: 0; overflow: hidden; }
.player-avatar img { width: 100%; height: 100%; object-fit: cover; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.player-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-secondary); color: var(--text-muted); font-weight: 600; flex-shrink: 0; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0; }

/* ── Main Content ──────────────────────────────────────── */
.main-content { flex: 1; overflow-y: auto; padding: 24px; min-width: 0; }
.profile-header { display: flex; align-items: flex-start; gap: 20px; background: var(--bg-card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
.profile-avatar-wrap { flex-shrink: 0; }
.profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; color: white; overflow: hidden; }
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 20px; font-weight: 800; }
.profile-team { font-size: 13px; color: var(--text-secondary); margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.profile-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.tag-age { background: #FEF3C7; color: #92400E; }
.tag-gender { background: #DBEAFE; color: #1E40AF; }
.tag-team { background: #D1FAE5; color: #065F46; }
.profile-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ── Grid Layout ───────────────────────────────────────── */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.card { background: var(--bg-card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
.card-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.card-title .icon { font-size: 16px; }

/* ── Radar Chart ───────────────────────────────────────── */
.radar-card { grid-column: 1; grid-row: 1 / 3; }
.radar-wrap { display: flex; justify-content: center; align-items: center; min-height: 320px; }
#radarCanvas { max-width: 100%; }

/* ── Stats Summary ──────────────────────────────────────── */
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-secondary); }
.stat-value { font-weight: 700; color: var(--text-primary); }
.stat-value.highlight { color: var(--primary); font-size: 16px; }
.stat-category { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin: 10px 0 4px; }
.stat-category:first-child { margin-top: 0; }

/* ── Measurement Table ──────────────────────────────────── */
.meas-table-wrap { overflow-x: auto; }
.meas-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.meas-table th { padding: 7px 10px; background: var(--bg-secondary); color: var(--text-muted); font-weight: 700; text-align: center; border-bottom: 2px solid var(--border); white-space: nowrap; }
.meas-table th:first-child { text-align: left; border-radius: 6px 0 0 0; }
.meas-table th:last-child { border-radius: 0 6px 0 0; }
.meas-table td { padding: 8px 10px; border-bottom: 1px solid var(--border-light); text-align: center; color: var(--text-secondary); }
.meas-table td:first-child { text-align: left; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
.meas-table tbody tr:hover { background: var(--bg-card-hover); }
.meas-table .trend-up { color: var(--success); font-weight: 700; }
.meas-table .trend-down { color: var(--danger); font-weight: 700; }
.meas-table .no-data { text-align: center; color: var(--text-muted); padding: 20px; }

/* ── Chart ─────────────────────────────────────────────── */
.chart-wrap { height: 200px; position: relative; }

/* ── Tabs ──────────────────────────────────────────────── */
.tabs { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 2px solid var(--border-light); }
.tab { padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Buttons ───────────────────────────────────────────── */
.btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #1D4ED8; }
.btn-ghost { background: var(--bg-secondary); color: var(--text-secondary); }
.btn-ghost:hover { background: var(--border); color: var(--text-primary); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: #FEE2E2; color: var(--danger); }
.btn-danger:hover { background: #FECACA; }

/* ── Modal ─────────────────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.modal { background: var(--bg-card); border-radius: var(--radius); width: 90%; max-width: 520px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { width: 28px; height: 28px; border-radius: 6px; background: var(--bg-secondary); border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 20px; overflow-y: auto; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

/* ── Form ──────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
.form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; background: var(--bg-secondary); outline: none; transition: border .2s; }
.form-input:focus { border-color: var(--primary); background: white; }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── CSV Drop Zone ─────────────────────────────────────── */
.csv-drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 16px; }
.csv-drop-zone:hover, .csv-drop-zone.dragover { border-color: var(--primary); background: #EFF6FF; }
.csv-drop-zone .icon { font-size: 32px; margin-bottom: 8px; }
.csv-drop-zone .text { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.csv-drop-zone .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.csv-preview { background: var(--bg-secondary); border-radius: 8px; padding: 12px; margin-bottom: 14px; max-height: 200px; overflow-y: auto; font-size: 12px; }
.csv-preview table { width: 100%; border-collapse: collapse; }
.csv-preview th { padding: 4px 8px; background: var(--border); font-weight: 700; text-align: center; position: sticky; top: 0; }
.csv-preview td { padding: 4px 8px; border-bottom: 1px solid var(--border-light); text-align: center; }
.csv-preview td:first-child { text-align: left; font-weight: 600; }
.csv-result { border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 13px; }
.csv-result.success { background: #D1FAE5; color: #065F46; }
.csv-result.error { background: #FEE2E2; color: #991B1B; }

/* ── Import History ────────────────────────────────────── */
.import-log { max-height: 150px; overflow-y: auto; font-size: 12px; }
.import-log-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border-light); }
.import-log-item .ok { color: var(--success); }
.import-log-item .fail { color: var(--danger); }

/* ── Empty State ───────────────────────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .text { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
.empty-state .sub { font-size: 12px; }

/* ── Scrollbar ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Stat Pills ────────────────────────────────────────── */
.stat-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.stat-pill { background: var(--bg-secondary); border-radius: 8px; padding: 8px 12px; text-align: center; min-width: 60px; }
.stat-pill .val { font-size: 18px; font-weight: 800; color: var(--primary); }
.stat-pill .lbl { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

/* ── Radar Legend ──────────────────────────────────────── */
.radar-legend { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div class="app-shell">
  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">⚾ 技术档案</div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索球员姓名..." autocomplete="off">
        <span class="search-icon">🔍</span>
      </div>
      <div class="filter-row">
        <select id="filter-age"><option value="">所有梯队</option><option value="U8">U8</option><option value="U10">U10</option><option value="U12">U12</option><option value="U15">U15</option><option value="U18">U18</option><option value="UW18">UW18</option></select>
        <select id="filter-gender"><option value="">全部性别</option><option value="M">男</option><option value="F">女</option></select>
      </div>
    </div>
    <div class="player-list" id="player-list"></div>
    <div class="sidebar-footer">
      <button class="btn btn-primary" style="width:100%;" onclick="openImportModal()">📥 导入体测数据</button>
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:6px;" onclick="openAddMeasModal()">+ 手动添加体测</button>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="main-content" id="main-content">
    <div class="empty-state" id="empty-state">
      <div class="icon">⚾</div>
      <div class="text">选择一位球员</div>
      <div class="sub">从左侧列表选择球员，查看技术档案</div>
    </div>
    <div id="profile-content" style="display:none;"></div>
  </div>
</div>

<!-- CSV Import Modal -->
<div class="modal-overlay" id="import-modal" style="display:none;">
  <div class="modal" style="max-width:700px;">
    <div class="modal-header">
      <div class="modal-title">📥 批量导入体测数据（CSV）</div>
      <button class="modal-close" onclick="closeModal('import-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="csv-drop-zone" id="csv-drop" onclick="document.getElementById('csv-file-input').click()">
        <div class="icon">📊</div>
        <div class="text">点击上传 CSV 文件</div>
        <div class="hint">或拖拽 CSV 文件到这里</div>
      </div>
      <input type="file" id="csv-file-input" accept=".csv,.txt" style="display:none;" onchange="handleCSVFile(this.files[0])">
      <div class="form-hint" style="margin-bottom:12px;">
        <b>CSV 格式说明：</b>首行为表头，数据从第二行开始。<br>
        列顺序：<b>姓名, 日期(YYYY-MM-DD), 立定跳远(cm), 仰卧起坐(个/分), 一垒跑(秒), 全垒跑(秒), 掷远(m), 打击距离(m), 球速(km/h), 棒速(km/h)</b><br>
        日期和姓名必填，其余留空表示该项无数据。
      </div>
      <div id="csv-preview"></div>
      <div id="csv-result"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('import-modal')">取消</button>
      <button class="btn btn-primary" id="csv-confirm-btn" disabled onclick="confirmCSVImport()">确认导入</button>
    </div>
  </div>
</div>

<!-- Add Measurement Modal -->
<div class="modal-overlay" id="meas-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📏 手动添加体测记录</div>
      <button class="modal-close" onclick="closeModal('meas-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">选择球员</label>
        <select class="form-input" id="meas-player-select"></select>
      </div>
      <div class="form-group">
        <label class="form-label">测试日期</label>
        <input type="date" class="form-input" id="meas-date">
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">立定跳远 (cm)</label><input type="number" class="form-input" id="m-stand-jump" placeholder="如：150"></div>
        <div class="form-group"><label class="form-label">仰卧起坐 (个/分)</label><input type="number" class="form-input" id="m-situp" placeholder="如：30"></div>
        <div class="form-group"><label class="form-label">一垒跑 (秒)</label><input type="number" step="0.1" class="form-input" id="m-sprint-1b" placeholder="如：8.5"></div>
        <div class="form-group"><label class="form-label">全垒跑 (秒)</label><input type="number" step="0.1" class="form-input" id="m-sprint-hb" placeholder="如：15.2"></div>
        <div class="form-group"><label class="form-label">掷远 (m)</label><input type="number" step="0.1" class="form-input" id="m-throw" placeholder="如：30.5"></div>
        <div class="form-group"><label class="form-label">打击距离 (m)</label><input type="number" step="0.1" class="form-input" id="m-bat-dist" placeholder="如：40"></div>
        <div class="form-group"><label class="form-label">球速 (km/h)</label><input type="number" step="0.1" class="form-input" id="m-pitch-speed" placeholder="如：75"></div>
        <div class="form-group"><label class="form-label">棒速 (km/h)</label><input type="number" step="0.1" class="form-input" id="m-bat-speed" placeholder="如：60"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('meas-modal')">取消</button>
      <button class="btn btn-primary" onclick="confirmAddMeas()">保存记录</button>
    </div>
  </div>
</div>

<script src="firebase-service.js"></script>
<script src="db.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────
var allPlayers = [];
var activePlayerId = null;
var currentTab = 'stats';
var parsedCSV = null;
var growthChart = null;
var _csvInput = null; // persistent file input

// ─────────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  // Create persistent file input for CSV (survives modal re-render)
  _csvInput = document.createElement('input');
  _csvInput.type = 'file';
  _csvInput.accept = '.csv,.txt';
  _csvInput.style.display = 'none';
  _csvInput.addEventListener('change', function() {
    if (_csvInput.files[0]) handleCSVFile(_csvInput.files[0]);
  });
  document.body.appendChild(_csvInput);

  // CSV drag-drop
  var dropZone = document.getElementById('csv-drop');
  dropZone.addEventListener('dragover', function(e){ e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('dragover'); });
  dropZone.addEventListener('drop', function(e){ e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleCSVFile(e.dataTransfer.files[0]); });

  // Search & filters
  document.getElementById('search-input').addEventListener('input', renderPlayerList);
  document.getElementById('filter-age').addEventListener('change', renderPlayerList);
  document.getElementById('filter-gender').addEventListener('change', renderPlayerList);

  // Load players
  DB.init(function() {
    DB.getPlayers(function(result) {
      allPlayers = result.data || [];
      renderPlayerList();
    });
  });
});

// ─────────────────────────────────────────────────────────
//  Player List
// ─────────────────────────────────────────────────────────
function renderPlayerList() {
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  var age = document.getElementById('filter-age').value;
  var gender = document.getElementById('filter-gender').value;
  var list = document.getElementById('player-list');

  var filtered = allPlayers.filter(function(p) {
    if (q && !(p.name||'').toLowerCase().includes(q)) return false;
    if (age && p.age_group !== age) return false;
    if (gender && p.gender !== gender) return false;
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px;">无匹配球员</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(p) {
    var initials = (p.name||'?').charAt(0).toUpperCase();
    var badge = p.age_group || '';
    var meta = [p.team_name||'', p.gender==='F'?'女':'男'].filter(Boolean).join(' · ');
    html += '<div class="player-item'+(p.id===activePlayerId?' active':'')+'" onclick="selectPlayer(\''+esc(p.id)+'\')">'+
      '<div class="player-avatar">'+(p.photo?'<img src="'+esc(p.photo)+'" alt="">':initials)+'</div>'+
      '<div class="player-info"><div class="player-name">'+esc(p.name||'')+'</div><div class="player-meta">'+esc(meta)+'</div></div>'+
      (badge?'<span class="player-badge">'+esc(badge)+'</span>':'')+'</div>';
  });
  list.innerHTML = html;
}

// ─────────────────────────────────────────────────────────
//  Select Player
// ─────────────────────────────────────────────────────────
function selectPlayer(id) {
  activePlayerId = id;
  renderPlayerList();
  var player = allPlayers.find(function(p){ return p.id===id; });
  if (!player) return;
  renderProfile(player);
}

function renderProfile(player) {
  document.getElementById('empty-state').style.display = 'none';
  var el = document.getElementById('profile-content');
  el.style.display = 'block';

  var initials = (player.name||'?').charAt(0).toUpperCase();
  var measurements = player.measurements || [];
  var latest = measurements.length > 0 ? measurements[measurements.length-1] : null;
  var stats = player.stats || {};
  var batting = stats.batting || {};
  var pitching = stats.pitching || {};

  var html = '';
  html += '<div class="profile-header">';

function buildMeasTab(measurements) {
  var html = '<div class="card" style="margin-bottom:16px;">';
  html += '<div class="card-title"><span class="icon">📈</span> 成长曲线</div>';
  html += '<div class="chart-wrap"><canvas id="growthChart"></canvas></div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="card-title"><span class="icon">📋</span> 体测历史 ('+measurements.length+' 条记录)</div>';
  if (measurements.length === 0) {
    html += '<div class="no-data">暂无体测数据，可通过 CSV 批量导入或手动添加</div>';
  } else {
    html += '<div class="meas-table-wrap">';
    html += '<table class="meas-table"><thead><tr>';
    html += '<th>日期</th><th>立定跳(cm)</th><th>仰卧(个)</th><th>一垒跑(s)</th><th>全垒跑(s)</th><th>掷远(m)</th><th>打击(m)</th><th>球速(km/h)</th><th>棒速(km/h)</th>';
    html += '</tr></thead><tbody>';
    var fields = ['stand_jump_cm','situp','sprint_1b_s','sprint_hb_s','throw_dist_m','bat_dist_m','pitch_speed_kmh','bat_speed_kmh'];
    measurements.slice().reverse().forEach(function(m, idx) {
      var prev = measurements[measurements.length-idx-2];
      html += '<tr>';
      html += '<td>'+esc(m.date||'')+'</td>';
      fields.forEach(function(f) {
        var v = m[f];
        var p = prev ? prev[f] : null;
        var trend = '';
        if (v !== null && v !== undefined && p !== null && p !== undefined) {
          // For sprint (lower is better), invert the comparison
          if (f==='sprint_1b_s'||f==='sprint_hb_s') {
            if (v < p) trend = ' trend-up'; // lower is better
            else if (v > p) trend = ' trend-down';
          } else {
            if (v > p) trend = ' trend-up';
            else if (v < p) trend = ' trend-down';
          }
        }
        html += '<td class="'+trend.trim()+'">'+(v!==null&&v!==undefined?esc(String(v)):'—')+'</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';
  return html;
}

// ─────────────────────────────────────────────────────────
//  Radar Chart
// ─────────────────────────────────────────────────────────
function drawRadar(player, latest) {
  var canvas = document.getElementById('radarCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var scores = calcScores(latest);
  var playerScores = [scores.speed, scores.power, scores.batting, scores.pitching, scores.agility];

  // Team average (mock from all players with measurements)
  var teamAvg = calcTeamAvg();
  var avgScores = [teamAvg.speed, teamAvg.power, teamAvg.batting, teamAvg.pitching, teamAvg.agility];

  var labels = ['速度', '力量', '打击', '投球', '敏捷'];
  var colors = ['#2563EB', '#10B981'];
  var datasets = [
    { data: playerScores, color: colors[0], fill: 'rgba(37,99,235,0.15)', border: colors[0] },
    { data: avgScores, color: colors[1], fill: 'rgba(16,185,129,0.10)', border: colors[1] }
  ];

  drawRadarChart(ctx, canvas.width, canvas.height, labels, datasets);
}

function drawRadarChart(ctx, w, h, labels, datasets) {
  var cx = w/2, cy = h/2;
  var maxR = Math.min(cx, cy) - 40;
  var n = labels.length;
  var step = Math.PI * 2 / n;
  var startAngle = -Math.PI/2;

  ctx.clearRect(0, 0, w, h);

  // Grid rings
  for (var r=1; r<=5; r++) {
    ctx.beginPath();
    for (var i=0; i<=n; i++) {
      var angle = startAngle + step * i;
      var rr = (r/5) * maxR;
      var x = cx + Math.cos(angle) * rr;
      var y = cy + Math.sin(angle) * rr;
      if (i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#E2E8F0';
    ctx.lineWidth = r===5 ? 1.5 : 0.75;
    ctx.stroke();
  }

  // Axes + labels
  for (var i=0; i<n; i++) {
    var angle = startAngle + step * i;
    var x2 = cx + Math.cos(angle) * maxR;
    var y2 = cy + Math.sin(angle) * maxR;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = '#E2E8F0';
    ctx.lineWidth = 0.75;
    ctx.stroke();

    // Label
    var lx = cx + Math.cos(angle) * (maxR + 22);
    var ly = cy + Math.sin(angle) * (maxR + 22);
    ctx.fillStyle = '#64748B';
    ctx.font = '600 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], lx, ly);
  }

  // Score labels on axes
  for (var r=1; r<=5; r++) {
    var angle = startAngle; // just the top axis
    for (var i=0; i<n; i++) {
      var a2 = startAngle + step * i;
      var rr = (r/5) * maxR;
      var sx = cx + Math.cos(a2) * rr;
      var sy = cy + Math.sin(a2) * rr;
      if (r===5) { // only show on outermost ring
        ctx.fillStyle = '#CBD5E1';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(r*20), sx, sy);
      }
    }
  }

  // Data polygons
  datasets.forEach(function(ds, di) {
    ctx.beginPath();
    for (var i=0; i<=n; i++) {
      var idx = i % n;
      var angle = startAngle + step * idx;
      var val = Math.max(0, Math.min(100, ds.data[idx]));
      var rr = (val/100) * maxR;
      var x = cx + Math.cos(angle) * rr;
      var y = cy + Math.sin(angle) * rr;
      if (i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = ds.fill;
    ctx.fill();
    ctx.strokeStyle = ds.border;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dots
    for (var i=0; i<n; i++) {
      var angle = startAngle + step * i;
      var val = Math.max(0, Math.min(100, ds.data[i]));
      var rr = (val/100) * maxR;
      var x = cx + Math.cos(angle) * rr;
      var y = cy + Math.sin(angle) * rr;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fillStyle = ds.border;
      ctx.fill();
    }
  });
}

// ─────────────────────────────────────────────────────────
//  Growth Chart (Chart.js)
// ─────────────────────────────────────────────────────────
function drawGrowthChart(measurements) {
  var canvas = document.getElementById('growthChart');
  if (!canvas || measurements.length < 2) return;
  if (growthChart) { growthChart.destroy(); growthChart = null; }

  var sorted = measurements.slice().sort(function(a,b){ return a.date<b.date?-1:1; });
  var labels = sorted.map(function(m){ return m.date||''; });

  var datasets = [
    { key: 'sprint_1b_s', label: '一垒跑 (s)', color: '#2563EB', yAxis: 'ySprint' },
    { key: 'pitch_speed_kmh', label: '球速 (km/h)', color: '#EF4444', yAxis: 'ySpeed' },
    { key: 'throw_dist_m', label: '掷远 (m)', color: '#10B981', yAxis: 'yDist' },
  ];

  var visible = datasets.filter(function(d){ return sorted.some(function(m){ return m[d.key]; }); });
  if (visible.length === 0) return;

  var chartData = visible.map(function(d){
    return {
      label: d.label,
      data: sorted.map(function(m){ return m[d.key]||null; }),
      borderColor: d.color,
      backgroundColor: d.color+'22',
      tension: 0.3,
      fill: false,
      pointRadius: 4,
      pointHoverRadius: 6,
    };
  });

  growthChart = new Chart(canvas, {
    type: 'line',
    data: { labels: labels, datasets: chartData },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'top', labels: { font: { size: 11 } } } },
      scales: {
        y: { position: 'left', title: { display: true, text: '时间(s) / 球速(km/h)', font: { size: 10 } }, grid: { color: '#F1F5F9' } },
        yDist: { position: 'right', title: { display: true, text: '距离(m)', font: { size: 10 } }, grid: { drawOnChartArea: false }, ticks: { display: false } }
      }
    }
  });
}

// ─────────────────────────────────────────────────────────
//  Scoring
// ─────────────────────────────────────────────────────────
function calcScores(m) {
  if (!m) return { speed: 0, power: 0, batting: 0, pitching: 0, agility: 0 };

  // Speed: 100 - (一垒跑-7)*10 - (全垒跑-14)*5
  var speed = 100 - Math.max(0, (m.sprint_1b_s-7)*10) - Math.max(0, (m.sprint_hb_s-14)*5);

  // Power: 球速占50% (km/h换算, 140km/h=100分) + 掷远25% (100m=100分) + 打击距离25% (100m=100分)
  var power = 0;
  var count = 0;
  if (m.pitch_speed_kmh) { power += (m.pitch_speed_kmh/140)*50; count++; }
  if (m.throw_dist_m) { power += Math.min(100, (m.throw_dist_m/100)*25); count++; }
  if (m.bat_dist_m) { power += Math.min(100, (m.bat_dist_m/100)*25); count++; }
  if (count > 0) power = power / count * (power>0?1:0) + (count===0?0:0); // re-weighted
  // Actually compute properly:
  power = ((m.pitch_speed_kmh?m.pitch_speed_kmh/140:0)*50 + (m.throw_dist_m?Math.min(100,m.throw_dist_m/100*100)/100*25:0) + (m.bat_dist_m?Math.min(100,m.bat_dist_m/100*100)/100*25:0));

  // Batting: 棒速60% (90km/h=100分) + 打击距离40% (100m=100分)
  var batting = 0;
  if (m.bat_speed_kmh) batting += (m.bat_speed_kmh/90)*60;
  if (m.bat_dist_m) batting += Math.min(100,(m.bat_dist_m/100)*40);

  // Pitching: 球速 (km/h换算, 140km/h=100分)
  var pitching = m.pitch_speed_kmh ? (m.pitch_speed_kmh/140)*100 : 0;

  // Agility: 仰卧起坐50% + 立定跳远50%
  var agility = 0;
  if (m.situp) agility += Math.min(100, m.situp*2); // 50个=100分
  if (m.stand_jump_cm) agility += Math.min(100, m.stand_jump_cm/2); // 200cm=100分
  agility = agility / (!!m.situp + !!m.stand_jump_cm || 1);

  return {
    speed: Math.max(0, Math.min(100, speed)),
    power: Math.max(0, Math.min(100, power)),
    batting: Math.max(0, Math.min(100, batting)),
    pitching: Math.max(0, Math.min(100, pitching)),
    agility: Math.max(0, Math.min(100, agility))
  };
}

function calcTeamAvg() {
  var withMeas = allPlayers.filter(function(p){ return p.measurements && p.measurements.length > 0; });
  if (withMeas.length === 0) return { speed: 50, power: 50, batting: 50, pitching: 50, agility: 50 };
  var sums = { speed: 0, power: 0, batting: 0, pitching: 0, agility: 0 };
  withMeas.forEach(function(p) {
    var latest = p.measurements[p.measurements.length-1];
    var s = calcScores(latest);
    Object.keys(sums).forEach(function(k){ sums[k] += s[k]; });
  });
  var n = withMeas.length;
  Object.keys(sums).forEach(function(k){ sums[k] /= n; });
  return sums;
}

// ─────────────────────────────────────────────────────────
//  Tab Switching
// ─────────────────────────────────────────────────────────
function switchTab(tab, playerId) {
  currentTab = tab;
  var player = allPlayers.find(function(p){ return p.id === playerId; });
  if (!player) return;
  // Update active tab UI
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){
    if ((tab==='stats'&&t.textContent.includes('综合数据')) ||
        (tab==='meas'&&t.textContent.includes('体测记录')) ||
        (tab==='game'&&t.textContent.includes('比赛数据'))) t.classList.add('active');
  });
  var target = document.getElementById('tab-'+tab);
  if (target) target.classList.add('active');

  if (tab === 'meas') {
    setTimeout(function(){ drawGrowthChart(player.measurements||[]); }, 50);
  }
}

// ─────────────────────────────────────────────────────────
//  CSV Import
// ─────────────────────────────────────────────────────────
function openImportModal() {
  parsedCSV = null;
  document.getElementById('csv-preview').innerHTML = '';
  document.getElementById('csv-result').innerHTML = '';
  document.getElementById('csv-confirm-btn').disabled = true;
  document.getElementById('import-modal').style.display = 'flex';
}

function handleCSVFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    var lines = text.trim().split('\n');
    if (lines.length < 2) {
      showCSVResult('error', 'CSV 文件至少需要表头和一行数据');
      return;
    }
    var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^["']|["']$/g,''); });
    var rows = [];
    for (var i=1; i<lines.length; i++) {
      var vals = lines[i].split(',').map(function(v){ return v.trim().replace(/^["']|["']$/g,''); });
      if (vals.length < 2 || !vals[0] || !vals[1]) continue;
      var obj = { name: vals[0], date: vals[1] };
      if (headers[2]) obj.stand_jump_cm = parseFloat(vals[2]) || null;
      if (headers[3]) obj.situp = parseInt(vals[3]) || null;
      if (headers[4]) obj.sprint_1b_s = parseFloat(vals[4]) || null;
      if (headers[5]) obj.sprint_hb_s = parseFloat(vals[5]) || null;
      if (headers[6]) obj.throw_dist_m = parseFloat(vals[6]) || null;
      if (headers[7]) obj.bat_dist_m = parseFloat(vals[7]) || null;
      if (headers[8]) obj.pitch_speed_kmh = parseFloat(vals[8]) || null;
      if (headers[9]) obj.bat_speed_kmh = parseFloat(vals[9]) || null;
      rows.push(obj);
    }
    if (rows.length === 0) {
      showCSVResult('error', '未找到有效数据行（需包含姓名和日期）');
      return;
    }
    parsedCSV = rows;
    renderCSVPreview(rows, headers);
    document.getElementById('csv-confirm-btn').disabled = false;
  };
  reader.readAsText(file);
}

function renderCSVPreview(rows, headers) {
  var el = document.getElementById('csv-preview');
  var sample = rows.slice(0, 5);
  var html = '<table><thead><tr>';
  headers.forEach(function(h){ html += '<th>'+esc(h)+'</th>'; });
  html += '</tr></thead><tbody>';
  sample.forEach(function(r) {
    html += '<tr>';
    headers.forEach(function(h){ html += '<td>'+esc(String(r[h.trim()]!==undefined?r[h.trim()]:''))+'</td>'; });
    html += '</tr>';
  });
  if (rows.length > 5) html += '<tr><td colspan="'+headers.length+'" style="color:var(--text-muted);text-align:center;">...还有 '+(rows.length-5)+' 行</td></tr>';
  html += '</tbody></table>';
  el.innerHTML = html;
}

function confirmCSVImport() {
  if (!parsedCSV || parsedCSV.length === 0) return;
  var btn = document.getElementById('csv-confirm-btn');
  btn.disabled = true;
  btn.textContent = '导入中...';

  var ok = 0, fail = 0, errors = [];
  var pending = parsedCSV.slice();

  function processNext() {
    if (pending.length === 0) {
      showCSVResult('success', '导入完成！成功 '+ok+' 条，失败 '+fail+' 条'+(errors.length?'（'+errors.join(', ')+'）':''));
      btn.textContent = '确认导入';
      // Refresh player list
      DB.getPlayers(function(result) {
        allPlayers = result.data || [];
        renderPlayerList();
        if (activePlayerId) {
          var p = allPlayers.find(function(x){ return x.id === activePlayerId; });
          if (p) renderProfile(p);
        }
      });
      return;
    }
    var row = pending.shift();
    // Find player by name (fuzzy match)
    var matched = allPlayers.find(function(p){
      return p.name && p.name.toLowerCase() === row.name.toLowerCase();
    }) || allPlayers.find(function(p){
      return p.name && p.name.toLowerCase().includes(row.name.toLowerCase());
    }) || allPlayers.find(function(p){
      return row.name.toLowerCase().includes(p.name && p.name.toLowerCase());
    });

    if (!matched) {
      fail++;
      errors.push(row.name + '(未匹配)');
      processNext();
      return;
    }

    var meas = matched.measurements || [];
    // Check duplicate by date
    var exists = meas.some(function(m){ return m.date === row.date; });
    if (exists) {
      // Update existing
      var idx = meas.findIndex(function(m){ return m.date === row.date; });
      meas[idx] = row;
    } else {
      meas.push(row);
    }
    matched.measurements = meas;

    DB.updatePlayer(matched.id, { measurements: meas }, function(result) {
      if (result.success) ok++; else { fail++; errors.push(row.name); }
      processNext();
    });
  }

  processNext();
}

function showCSVResult(type, msg) {
  var el = document.getElementById('csv-result');
  el.className = 'csv-result ' + type;
  el.innerHTML = msg;
}

// ─────────────────────────────────────────────────────────
//  Manual Add Measurement
// ─────────────────────────────────────────────────────────
function openAddMeasModal() {
  if (!activePlayerId) {
    alert('请先在左侧选择一个球员');
    return;
  }
  var select = document.getElementById('meas-player-select');
  select.innerHTML = allPlayers.map(function(p){
    return '<option value="'+esc(p.id)+'"'+(p.id===activePlayerId?' selected':'')+'>'+esc(p.name||'')+'</option>';
  }).join('');
  document.getElementById('meas-date').value = new Date().toISOString().split('T')[0];
  ['m-stand-jump','m-situp','m-sprint-1b','m-sprint-hb','m-throw','m-bat-dist','m-pitch-speed','m-bat-speed'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  document.getElementById('meas-modal').style.display = 'flex';
}

function confirmAddMeas() {
  var playerId = document.getElementById('meas-player-select').value;
  var date = document.getElementById('meas-date').value;
  if (!date) { alert('请选择日期'); return; }

  var m = {
    date: date,
    stand_jump_cm: parseFloat(document.getElementById('m-stand-jump').value) || null,
    situp: parseInt(document.getElementById('m-situp').value) || null,
    sprint_1b_s: parseFloat(document.getElementById('m-sprint-1b').value) || null,
    sprint_hb_s: parseFloat(document.getElementById('m-sprint-hb').value) || null,
    throw_dist_m: parseFloat(document.getElementById('m-throw').value) || null,
    bat_dist_m: parseFloat(document.getElementById('m-bat-dist').value) || null,
    pitch_speed_kmh: parseFloat(document.getElementById('m-pitch-speed').value) || null,
    bat_speed_kmh: parseFloat(document.getElementById('m-bat-speed').value) || null
  };

  var player = allPlayers.find(function(p){ return p.id === playerId; });
  if (!player) return;

  var meas = player.measurements || [];
  var exists = meas.some(function(x){ return x.date === date; });
  if (exists) {
    var idx = meas.findIndex(function(x){ return x.date === date; });
    meas[idx] = m;
  } else {
    meas.push(m);
  }

  DB.updatePlayer(playerId, { measurements: meas }, function(result) {
    if (result.success) {
      player.measurements = meas;
      closeModal('meas-modal');
      if (playerId === activePlayerId) renderProfile(player);
      renderPlayerList();
    } else {
      alert('保存失败');
    }
  });
}

//  Modal Helpers
// ─────────────────────────────────────────────────────────

  document.getElementById(id).style.display = 'none';
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') { document.querySelectorAll('.modal-overlay').forEach(function(m){ m.style.display='none'; }); } });

// ─────────────────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────────────────
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escHtml(s) { return esc(s); }
function toFixed(v, decimals) {
  if (v === null || v === undefined) return '—';
  return Number(v).toFixed(decimals);
}
function fmtBA(v) {
  if (!v || isNaN(v)) return '.---';
  return v.toFixed(3).replace(/^0/, '');
}
function fmtIP(ip) {
  if (!ip) return '0';
  var whole = Math.floor(ip);
  var frac = Math.round((ip - whole) * 3);
  return whole + (frac ? '-' + frac : '');
}
