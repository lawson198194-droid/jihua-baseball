<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术档案 — BaseAI</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a42;
  --bg-input: #141a2e;
  --primary: #f97316;
  --primary-light: #fb923c;
  --accent: #3b82f6;
  --success: #10b981;
  --success-bg: rgba(16, 185, 129, 0.12);
  --warning: #f59e0b;
  --warning-bg: rgba(245, 158, 11, 0.12);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.12);
  --info: #06b6d4;
  --info-bg: rgba(6, 182, 212, 0.12);
  --purple: #8b5cf6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.04);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Space Grotesk','Noto Sans SC',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── App Shell ─────────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#0f1629;border-right:2px solid rgba(249,115,22,0.3);display:flex;flex-direction:column;position:relative;z-index:10}
.sidebar-logo{padding:24px 16px 20px;border-bottom:2px solid rgba(249,115,22,0.2);background:rgba(249,115,22,0.04)}
.logo-mark{font-size:32px;margin-bottom:8px}
.sidebar-logo h1{font-size:18px;font-weight:800;color:#f1f5f9;letter-spacing:-0.5px}
.sidebar-logo .subtitle{font-size:9px;color:#f97316;letter-spacing:2px;margin-top:2px;font-weight:700}
.sidebar-section{padding:14px 8px 0}
.sidebar-section-label{font-size:10px;font-weight:700;color:rgba(249,115,22,0.7);letter-spacing:1px;text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;color:#cbd5e1;transition:all .15s;margin-bottom:2px;cursor:pointer;text-decoration:none}
.nav-item:hover{background:rgba(249,115,22,0.1);color:#f97316}
.nav-item.active{background:rgba(249,115,22,0.15);color:#f97316;font-weight:700;border-left:3px solid #f97316}
.nav-icon{font-size:16px;min-width:20px;text-align:center}
.nav-badge{margin-left:auto;font-size:9px;background:var(--purple);color:#fff;padding:1px 6px;border-radius:10px;font-weight:700}
.sidebar-footer{margin-top:auto;padding:16px;border-top:2px solid rgba(249,115,22,0.15);background:rgba(0,0,0,0.2)}
.db-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:#10b981;font-weight:600}

/* ── Main ─────────────────────────────────────────────────── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;border-bottom:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;padding:0 24px;flex-shrink:0;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:700}
.topbar-subtitle{font-size:11px;color:var(--text-muted)}
.topbar-stats{display:flex;gap:0}
.topbar-stat{padding:0 16px;border-right:1px solid var(--border);text-align:center}
.topbar-stat:last-child{border-right:none}
.topbar-stat .num{font-size:18px;font-weight:800;line-height:1.2}
.topbar-stat .label{font-size:10px;color:var(--text-muted);letter-spacing:.5px}

/* ── Body ─────────────────────────────────────────────────── */
.body{flex:1;display:flex;overflow:hidden;background:var(--bg-primary)}

/* ── Left Panel: Search + Name List ───────────────────────── */
.panel-left{flex:1;min-width:260px;max-width:260px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:#0f1629;overflow:hidden}
.panel-left-header{padding:16px 16px 0;flex-shrink:0}
.panel-left-label{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.panel-left-search input{
  width:100%;padding:9px 12px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text-primary);font-size:13px;outline:none;
  transition:border-color .2s;box-sizing:border-box;
}
.panel-left-search input:focus{border-color:var(--primary)}
.panel-left-search input::placeholder{color:var(--text-muted)}
.panel-left-filters{display:flex;gap:8px;margin-top:8px;margin-bottom:12px}
.panel-left-filters select{
  flex:1;padding:6px 8px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text-primary);font-size:12px;outline:none;cursor:pointer;
}
.name-list{overflow-y:auto;padding:4px 8px 16px;min-height:200px}
.name-item{
  padding:10px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;
  font-weight:600;color:var(--text-secondary);margin-bottom:3px;transition:all .15s;
  border:1px solid transparent;display:flex;justify-content:space-between;align-items:center;
}
.name-item:hover{background:var(--bg-card-hover);color:var(--text-primary);border-color:var(--border)}
.name-item.selected{background:rgba(249,115,22,0.15);color:#f97316;border-color:rgba(249,115,22,0.3);font-weight:700}
.name-meta{font-size:10px;color:var(--text-muted);font-weight:400}
.name-empty{padding:32px 12px;text-align:center;color:var(--text-muted);font-size:12px;line-height:1.6}

/* ── Right Panel: Profile Detail ──────────────────────────── */
.panel-right{flex:1;overflow-y:auto;padding:24px;min-width:0}

/* Profile Header Card */
.profile-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}
.profile-header{display:flex;align-items:center;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border)}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--bg-secondary);border:3px solid var(--primary);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--primary);overflow:hidden;flex-shrink:0}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:22px;font-weight:800;color:var(--text-primary);margin-bottom:6px}
.profile-tags{display:flex;gap:6px;flex-wrap:wrap}
.profile-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(249,115,22,0.12);color:var(--primary);font-weight:600}

/* Tabs */
.profile-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border)}
.profile-tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.profile-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.profile-tab:hover:not(.active){color:var(--text-primary)}
.tab-panel{display:none;padding:20px 24px}
.tab-panel.active{display:block}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:800;line-height:1.2}
.stat-lbl{font-size:10px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* Radar */
.radar-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;text-align:center}
.radar-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.radar-wrap{display:flex;justify-content:center;align-items:center;min-height:260px}
.radar-legend{display:flex;justify-content:center;gap:24px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Growth Chart */
.chart-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;height:220px}

/* Table */
.table-wrap{overflow-x:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:10px 14px;background:var(--bg-secondary);color:var(--text-muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border-light);color:var(--text-secondary)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg-card-hover)}
.data-table td:first-child{font-weight:600;color:var(--text-primary)}

/* Empty State */
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.25}
.empty-state h3{font-size:18px;color:var(--text-secondary);margin-bottom:8px}
.empty-state p{font-size:13px;color:var(--text-muted)}

/* Prompt State */
.profile-prompt{text-align:center;padding:80px 20px;color:var(--text-muted);font-size:14px}
.profile-prompt-icon{font-size:64px;margin-bottom:20px;opacity:.2}
.profile-prompt h3{font-size:20px;font-weight:700;color:var(--text-secondary);margin-bottom:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;border:none;transition:all .15s;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-card-hover);color:var(--text-primary)}

/* ── Modal ─────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--bg-card-hover);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.modal-close:hover{color:var(--danger)}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:9px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text-primary);outline:none;transition:border-color .2s;box-sizing:border-box}
.form-input:focus{border-color:var(--primary)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:span 2}

/* CSV Drop Zone */
.csv-drop-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;background:var(--bg-card)}
.csv-drop-zone:hover,.csv-drop-zone.dragover{border-color:var(--primary);background:rgba(249,115,22,0.06)}
.csv-drop-zone .icon{font-size:40px;margin-bottom:10px}
.csv-drop-zone .text{font-size:14px;font-weight:600;color:var(--text-secondary)}
.csv-drop-zone .hint{font-size:11px;color:var(--text-muted);margin-top:4px}
.csv-preview{background:var(--bg-primary);border-radius:var(--radius);padding:12px;margin-bottom:14px;max-height:200px;overflow-y:auto;font-size:12px;border:1px solid var(--border-light)}
.csv-preview table{width:100%;border-collapse:collapse}
.csv-preview th{padding:5px 8px;background:var(--bg-secondary);font-weight:700;text-align:center;position:sticky;top:0;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.csv-preview td{padding:5px 8px;border-bottom:1px solid var(--border-light);text-align:center;color:var(--text-secondary)}
.csv-preview td:first-child{text-align:left;font-weight:600;color:var(--text-primary)}
.csv-result{border-radius:var(--radius);padding:12px 16px;margin-top:12px;font-size:13px;font-weight:600}
.csv-result.success{background:var(--success-bg);color:var(--success);border:1px solid rgba(16,185,129,0.3)}
.csv-result.error{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,0.3)}

/* Toast */
#toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:600;box-shadow:var(--shadow);animation:slideIn .3s ease;max-width:320px}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--danger);color:#fff}
.toast.warning{background:var(--warning);color:#1a1a1a}
.toast.info{background:var(--accent);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="toast-container"></div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="app-sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">⚾</div>
      <h1>BaseAI</h1>
      <div class="subtitle">BASEBALL SYSTEM</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">核心模块</div>
      <a href="players.html" class="nav-item"><div class="nav-icon">👥</div><span>球员资料库</span></a>
      <a href="teams.html" class="nav-item"><div class="nav-icon">🏆</div><span>球队梯队</span></a>
      <a href="games.html" class="nav-item"><div class="nav-icon">📊</div><span>赛事记分</span></a>
      <a href="profiles.html" class="nav-item active"><div class="nav-icon">📈</div><span>技术档案</span></a>
      <a href="admin.html" class="nav-item"><div class="nav-icon">⚙️</div><span>权限后台</span></a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">智能模块</div>
      <a href="ai-coach-v2.html" class="nav-item"><div class="nav-icon">🤖</div><span>AI 专属教练</span><span class="nav-badge">AI</span></a>
    </div>
    <div class="sidebar-section" style="margin-top:auto;">
      <a href="index.html" class="nav-item" style="border-top:1px solid var(--border);"><div class="nav-icon">🏠</div><span>返回首页</span></a>
    </div>
    <div class="sidebar-footer">
      <div class="db-indicator"><span>⚡ Firebase</span></div>
      <div style="margin-top:4px;font-size:10px;">v4.1 · 2026-04-23</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title">📈 技术档案</div>
          <div class="topbar-subtitle">Module 04 · Player Profiles</div>
        </div>
      </div>
      <div class="topbar-stats" id="topbar-stats"></div>
    </div>

    <!-- Body: Left (Search) + Right (Detail) -->
    <div class="body">
      <!-- Left: Search + Name List -->
      <div class="panel-left">
        <div class="panel-left-header">
          <div class="panel-left-label">🔍 搜索球员</div>
          <div class="panel-left-search">
            <input type="text" id="search-input" placeholder="输入姓名…" autocomplete="off" oninput="renderNameList()">
          </div>
          <div class="panel-left-filters">
            <select id="filter-age" onchange="renderNameList()">
              <option value="">梯队</option><option value="U8">U8</option><option value="U10">U10</option><option value="U12">U12</option><option value="U15">U15</option><option value="U18">U18</option><option value="UW18">UW18</option>
            </select>
            <select id="filter-gender" onchange="renderNameList()">
              <option value="">性别</option><option value="M">男</option><option value="F">女</option>
            </select>
          </div>
        </div>
        <div id="name-list" class="name-list">
          <div class="name-empty">加载中…</div>
        </div>
      </div>

      <!-- Right: Profile Detail -->
      <div id="profile-detail" class="panel-right">
        <div class="profile-prompt">
          <div class="profile-prompt-icon">👈</div>
          <h3>选择左侧球员</h3>
          <p>在搜索框输入姓名，从列表中选择查看技术档案</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CSV Import Modal -->
<div id="csv-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('csv-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📥 批量导入体测数据</div>
      <button class="modal-close" onclick="closeModal('csv-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="csv-drop-zone" id="csv-drop-zone" onclick="document.getElementById('csv-file-input').click()">
        <div class="icon">📄</div>
        <div class="text">点击上传 CSV 文件</div>
        <div class="hint">支持 Excel 导出格式：姓名、日期、一垒跑、全垒跑、球速等</div>
      </div>
      <input type="file" id="csv-file-input" accept=".csv,.xlsx,.txt" style="display:none;" onchange="handleCSVFile(this.files[0])">
      <div id="csv-preview" style="display:none;"></div>
      <div id="csv-result"></div>
    </div>
  </div>
</div>

<!-- Manual Add Modal -->
<div id="meas-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('meas-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">➕ 添加体测数据</div>
      <button class="modal-close" onclick="closeModal('meas-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">球员姓名 *</label>
        <select class="form-input" id="meas-player-select"></select>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" class="form-input" id="meas-date">
        </div>
        <div class="form-group">
          <label class="form-label">立定跳远 (cm)</label>
          <input type="number" class="form-input" id="meas-stand-jump" placeholder="如 185">
        </div>
        <div class="form-group">
          <label class="form-label">仰卧起坐 (个/分)</label>
          <input type="number" class="form-input" id="meas-situp" placeholder="如 30">
        </div>
        <div class="form-group">
          <label class="form-label">一垒跑 (秒)</label>
          <input type="number" class="form-input" id="meas-1b" step="0.1" placeholder="如 7.2">
        </div>
        <div class="form-group">
          <label class="form-label">全垒跑 (秒)</label>
          <input type="number" class="form-input" id="meas-hb" step="0.1" placeholder="如 14.5">
        </div>
        <div class="form-group">
          <label class="form-label">掷远 (m)</label>
          <input type="number" class="form-input" id="meas-throw" step="0.1" placeholder="如 45">
        </div>
        <div class="form-group">
          <label class="form-label">打击距离 (m)</label>
          <input type="number" class="form-input" id="meas-bat-dist" step="0.1" placeholder="如 60">
        </div>
        <div class="form-group">
          <label class="form-label">球速 (km/h)</label>
          <input type="number" class="form-input" id="meas-pitch-speed" step="0.1" placeholder="如 85">
        </div>
        <div class="form-group">
          <label class="form-label">棒速 (km/h)</label>
          <input type="number" class="form-input" id="meas-bat-speed" step="0.1" placeholder="如 75">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('meas-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveMeasurement()">保存</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-service.js"></script>
<script src="db.js"></script>
<script>
/* ── State ──────────────────────────────────────────────────── */
var allPlayers = [];
var selectedPlayerId = null;
var currentTab = 'stats';

/* ── Helpers ────────────────────────────────────────────────── */
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toFixed(v,n){return (parseFloat(v)||0).toFixed(n||1);}
function measCount(p){return p.measurements?p.measurements.length:0;}

function showToast(msg,type){
  type=type||'info';
  var c=document.getElementById('toast-container');
  var t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},3500);
}

function closeModal(id){document.getElementById(id).style.display='none';}

/* ── Firebase Init ──────────────────────────────────────────── */
var _dbInited=false;
var _pending=[];
function onDBReady(fn){
  console.log('[Profiles] onDBReady called, _dbInited=',_dbInited,', pending=',_pending.length);
  if(_dbInited)fn();else _pending.push(fn);
}

/* ── Scoring ────────────────────────────────────────────────── */
function calcScores(m){
  if(!m)return{speed:0,power:0,batting:0,pitching:0,agility:0};
  var sp=parseFloat(m.pitch_speed_kmh)||0;
  var bs=parseFloat(m.bat_speed_kmh)||0;
  var td=parseFloat(m.throw_dist_m)||0;
  var bd=parseFloat(m.bat_dist_m)||0;
  var s1=parseFloat(m.sprint_1b_s)||0;
  var sh=parseFloat(m.sprint_hb_s)||0;
  var su=parseFloat(m.situp)||0;
  var sj=parseFloat(m.stand_jump_cm)||0;
  return{
    speed:   Math.max(0,Math.min(100,100-(s1-7)*10-(sh-14)*5)),
    power:    Math.min(100,(sp/140)*50+(td/100)*25+(bd/100)*25),
    batting:  Math.min(100,(bs/90)*60+(bd/100)*40),
    pitching: Math.min(100,(sp/140)*100),
    agility:  Math.min(100,su*2*0.5+sj/2*0.5)
  };
}

/* ── Load Players ───────────────────────────────────────────── */
function loadPlayers(){
  console.log('[Profiles] loadPlayers called');
  onDBReady(function(){
    console.log('[Profiles] onDBReady fired, calling DB.getPlayers');
    DB.getPlayers(function(result){
      console.log('[Profiles] DB.getPlayers callback, result length:', (result&&result.data)?result.data.length:'null');
      allPlayers=(result&&result.data)||[];
      console.log('[Profiles] allPlayers.length:', allPlayers.length);
      updateTopbarStats();
      renderNameList();
    });
  });
}

function updateTopbarStats(){
  var total=allPlayers.length;
  var withMeas=allPlayers.filter(function(p){return p.measurements&&p.measurements.length>0;}).length;
  document.getElementById('topbar-stats').innerHTML=
    '<div class="topbar-stat"><div class="num" style="color:var(--primary);">'+total+'</div><div class="label">注册球员</div></div>'+
    '<div class="topbar-stat"><div class="num" style="color:var(--success);">'+withMeas+'</div><div class="label">有体测数据</div></div>';
}

/* ── Render Name List ─────────────────────────────────────── */
function renderNameList(){
  var q=document.getElementById('search-input').value.trim().toLowerCase();
  var age=document.getElementById('filter-age').value;
  var gender=document.getElementById('filter-gender').value;
  var list=document.getElementById('name-list');
  var filtered=allPlayers.filter(function(p){
    if(q&&!(p.name||'').toLowerCase().includes(q))return false;
    if(age&&p.age_group!==age)return false;
    if(gender&&p.gender!==gender)return false;
    return true;
  });
  console.log('[Profiles] Render:', {total:allPlayers.length, filtered:filtered.length, age:age, gender:gender, q:q});
  if(filtered.length===0){
    list.innerHTML='<div class="name-empty">没有匹配的球员<br><span style="font-size:11px;margin-top:4px;display:block;">试试调整筛选条件</span></div>';
    return;
  }
  var html='';
  filtered.forEach(function(p){
    var cls=selectedPlayerId===p.id?'selected':'';
    var mc=measCount(p);
    var meta=mc>0?'<span class="name-meta">'+mc+'次体测</span>':'<span class="name-meta" style="color:var(--danger);">无体测</span>';
    html+='<div class="name-item '+cls+'" onclick="selectPlayer(\''+p.id+'\')">'+esc(p.name||'未知')+meta+'</div>';
  });
  list.innerHTML=html;
}

/* ── Select Player ──────────────────────────────────────────── */
function selectPlayer(id){
  selectedPlayerId=id;
  renderNameList();
  var p=allPlayers.find(function(x){return x.id===id;});
  if(!p){showToast('找不到该球员','error');return;}
  renderProfileDetail(p);
}

/* ── Render Profile Detail ──────────────────────────────────── */
function renderProfileDetail(p){
  var container=document.getElementById('profile-detail');
  var initials=(p.name||'未知').substring(0,2);
  var photoUrl=p.photo_url||'';
  var m=p.measurements||[];
  var latest=m.length>0?m[m.length-1]:null;
  var scores=calcScores(latest);
  var stats=p.stats||{};
  var batting=stats.batting||{};
  var pitching=stats.pitching||{};
  var measCount=m.length;

  var html='';

  // Profile Card
  html+='<div class="profile-card">';

  // Header
  html+='<div class="profile-header">';
  if(photoUrl){
    html+='<div class="profile-avatar"><img src="'+esc(photoUrl)+'" style="width:100%;height:100%;object-fit:cover"></div>';
  }else{
    html+='<div class="profile-avatar">'+initials+'</div>';
  }
  html+='<div class="profile-info">';
  html+='<div class="profile-name">'+esc(p.name||'未知球员')+'</div>';
  html+='<div class="profile-tags">';
  if(p.age_group)html+='<span class="profile-tag">'+esc(p.age_group)+'</span>';
  if(p.gender==='M')html+='<span class="profile-tag" style="background:rgba(59,130,246,0.12);color:var(--accent);">♂ 男</span>';
  if(p.gender==='F')html+='<span class="profile-tag" style="background:rgba(236,72,153,0.12);color:#ec4899;">♀ 女</span>';
  if(p.team_id)html+='<span class="profile-tag" style="background:var(--info-bg);color:var(--info);">'+esc(p.team_id)+'</span>';
  html+='</div></div>';
  html+='</div>'; // header close

  // Tabs
  html+='<div class="profile-tabs">';
  html+='<button class="profile-tab'+(currentTab==='stats'?' active':'')+'" onclick="switchTab(\'stats\')">📊 能力评分</button>';
  html+='<button class="profile-tab'+(currentTab==='meas'?' active':'')+'" onclick="switchTab(\'meas\')">📈 体测记录 ('+measCount+')</button>';
  html+='<button class="profile-tab'+(currentTab==='game'?' active':'')+'" onclick="switchTab(\'game\')">⚾ 比赛数据</button>';
  html+='</div>';

  // ── Tab: Stats ──
  html+='<div class="tab-panel'+(currentTab==='stats'?' active':'')+'" id="tab-stats">';
  html+='<div class="stats-grid">';
  html+='<div class="stat-card"><div class="stat-val" style="color:var(--accent);">'+toFixed(scores.speed)+'</div><div class="stat-lbl">⚡ 速度</div></div>';
  html+='<div class="stat-card"><div class="stat-val" style="color:var(--danger);">'+toFixed(scores.power)+'</div><div class="stat-lbl">💪 力量</div></div>';
  html+='<div class="stat-card"><div class="stat-val" style="color:var(--warning);">'+toFixed(scores.batting)+'</div><div class="stat-lbl">🏏 打击</div></div>';
  html+='<div class="stat-card"><div class="stat-val" style="color:var(--success);">'+toFixed(scores.pitching)+'</div><div class="stat-lbl">🎯 投球</div></div>';
  html+='<div class="stat-card"><div class="stat-val" style="color:var(--purple);">'+toFixed(scores.agility)+'</div><div class="stat-lbl">🏃 敏捷</div></div>';
  html+='</div>';

  // Radar
  html+='<div class="radar-card">';
  html+='<div class="radar-title">🎯 五维能力雷达图</div>';
  html+='<div class="radar-wrap"><canvas id="radarCanvas" width="280" height="280"></canvas></div>';
  html+='<div class="radar-legend">';
  html+='<div class="legend-item"><span class="legend-dot" style="background:#f97316"></span> 本次体测</div>';
  html+='<div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> 全队平均</div>';
  html+='</div></div>';

  // Detail Table
  if(latest){
    html+='<div class="table-wrap"><table class="data-table"><thead><tr><th>项目</th><th>数值</th><th>参考</th></tr></thead><tbody>';
    if(latest.sprint_1b_s)html+='<tr><td>一垒跑</td><td style="color:var(--accent);font-weight:700;">'+latest.sprint_1b_s+'s</td><td>速度</td></tr>';
    if(latest.sprint_hb_s)html+='<tr><td>全垒跑</td><td style="color:var(--accent);font-weight:700;">'+latest.sprint_hb_s+'s</td><td>速度</td></tr>';
    if(latest.pitch_speed_kmh)html+='<tr><td>球速</td><td style="color:var(--success);font-weight:700;">'+latest.pitch_speed_kmh+' km/h</td><td>投球/力量</td></tr>';
    if(latest.throw_dist_m)html+='<tr><td>掷远</td><td style="color:var(--danger);font-weight:700;">'+latest.throw_dist_m+' m</td><td>力量</td></tr>';
    if(latest.bat_dist_m)html+='<tr><td>打击距离</td><td style="color:var(--warning);font-weight:700;">'+latest.bat_dist_m+' m</td><td>打击/力量</td></tr>';
    if(latest.bat_speed_kmh)html+='<tr><td>棒速</td><td style="color:var(--purple);font-weight:700;">'+latest.bat_speed_kmh+' km/h</td><td>打击</td></tr>';
    if(latest.situp)html+='<tr><td>仰卧起坐</td><td>'+latest.situp+' 个/分</td><td>敏捷</td></tr>';
    if(latest.stand_jump_cm)html+='<tr><td>立定跳远</td><td>'+latest.stand_jump_cm+' cm</td><td>敏捷</td></tr>';
    html+='</tbody></table></div>';
  }else{
    html+='<div class="empty-state"><div class="empty-icon">📋</div><h3>暂无体测数据</h3><p>导入 CSV 或手动添加体测数据</p></div>';
  }
  html+='</div>'; // tab-stats close

  // ── Tab: Measurements ──
  html+='<div class="tab-panel'+(currentTab==='meas'?' active':'')+'" id="tab-meas">';
  if(measCount>0){
    html+='<div class="chart-wrap"><canvas id="growthChart"></canvas></div>';
    html+='<div class="table-wrap"><table class="data-table"><thead><tr><th>日期</th><th>立定跳(cm)</th><th>仰卧(个)</th><th>一垒跑(s)</th><th>全垒跑(s)</th><th>掷远(m)</th><th>打击(m)</th><th>球速(km/h)</th><th>棒速(km/h)</th></tr></thead><tbody>';
    m.slice().reverse().forEach(function(meas){
      html+='<tr>';
      html+='<td>'+(meas.date||'—')+'</td>';
      html+='<td>'+(meas.stand_jump_cm||'—')+'</td>';
      html+='<td>'+(meas.situp||'—')+'</td>';
      html+='<td style="color:var(--accent);font-weight:700;">'+(meas.sprint_1b_s||'—')+'</td>';
      html+='<td style="color:var(--accent);font-weight:700;">'+(meas.sprint_hb_s||'—')+'</td>';
      html+='<td style="color:var(--danger);font-weight:700;">'+(meas.throw_dist_m||'—')+'</td>';
      html+='<td>'+(meas.bat_dist_m||'—')+'</td>';
      html+='<td style="color:var(--success);font-weight:700;">'+(meas.pitch_speed_kmh||'—')+'</td>';
      html+='<td style="color:var(--purple);font-weight:700;">'+(meas.bat_speed_kmh||'—')+'</td>';

  html+='</div>'; // tab-meas close

  // ── Tab: Game ──
  html+='<div class="tab-panel'+(currentTab==='game'?' active':'')+'" id="tab-game">';

    html+='<div class="stats-grid">';
    if(batting.ab){
      var avg=batting.ab>0?(batting.h/batting.ab).toFixed(3):'—';
      html+='<div class="stat-card"><div class="stat-val" style="color:var(--success);">'+avg+'</div><div class="stat-lbl">AVG</div></div>';

      html+='<div class="stat-card"><div class="stat-val">'+batting.h+'</div><div class="stat-lbl">H</div></div>';
      html+='<div class="stat-card"><div class="stat-val">'+batting.rbi+'</div><div class="stat-lbl">RBI</div></div>';
      html+='<div class="stat-card"><div class="stat-val">'+(batting.bb||0)+'</div><div class="stat-lbl">BB</div></div>';
    }
    if(pitching.ip){
      var era=pitching.ip>0?((pitching.er||0)*7/pitching.ip).toFixed(2):'—';
      html+='<div class="stat-card"><div class="stat-val" style="color:var(--warning);">'+era+'</div><div class="stat-lbl">ERA</div></div>';
      html+='<div class="stat-card"><div class="stat-val">'+parseFloat(pitching.ip).toFixed(1)+'</div><div class="stat-lbl">IP</div></div>';
      html+='<div class="stat-card"><div class="stat-val">'+(pitching.so||0)+'</div><div class="stat-lbl">SO</div></div>';
    }
    html+='</div>';
  }else{
    html+='<div class="empty-state"><div class="empty-icon">⚾</div><h3>暂无比赛数据</h3><p>该球员尚未参加比赛</p></div>';
  }
  html+='</div>'; // tab-game close

  html+='</div></div>'; // card close + body close
  container.innerHTML=html;

  // Draw charts after DOM update
  setTimeout(function(){
    drawRadar(latest);
    if(currentTab==='meas'&&measCount>0)setTimeout(function(){drawGrowthChart(m);},50);
  },50);
}

/* ── Tab Switching ──────────────────────────────────────────── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.profile-tab').forEach(function(el,i){
    el.classList.toggle('active',['stats','meas','game'][i]===tab);
  });
  document.querySelectorAll('.tab-panel').forEach(function(el){
    el.classList.toggle('active',el.id==='tab-'+tab);
  });
  var p=allPlayers.find(function(x){return x.id===selectedPlayerId;});
  if(p)renderProfileDetail(p);
}

/* ── Draw Radar ─────────────────────────────────────────────── */
function drawRadar(latest){
  var canvas=document.getElementById('radarCanvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var cx=canvas.width/2,cy=canvas.height/2,r=105;
  var labels=['速度','力量','打击','投球','敏捷'];
  var scores=calcScores(latest);
  var vals=[scores.speed,scores.power,scores.batting,scores.pitching,scores.agility];
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Grid rings
  ctx.strokeStyle='rgba(255,255,255,0.07)';
  ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(function(pct){
    ctx.beginPath();
    for(var i=0;i<=5;i++){
      var angle=(i/5)*Math.PI*2-Math.PI/2;
      var x=cx+Math.cos(angle)*r*pct;
      var y=cy+Math.sin(angle)*r*pct;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.stroke();
  });

  // Axes
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=1;
  for(var i=0;i<5;i++){
    var angle=(i/5)*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(angle)*r,cy+Math.sin(angle)*r);
    ctx.stroke();
    var lx=cx+Math.cos(angle)*(r+16);
    var ly=cy+Math.sin(angle)*(r+16);
    ctx.fillStyle='#94a3b8';
    ctx.font='11px Space Grotesk, sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(labels[i],lx,ly);
  }

  // Player polygon (orange)
  ctx.beginPath();
  vals.forEach(function(v,i){
    var angle=(i/5)*Math.PI*2-Math.PI/2;
    var x=cx+Math.cos(angle)*r*(v/100);
    var y=cy+Math.sin(angle)*r*(v/100);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(249,115,22,0.18)';
  ctx.fill();
  ctx.strokeStyle='#f97316';
  ctx.lineWidth=2;
  ctx.stroke();

  // Average polygon (blue, dashed)
  var avgVals=[65,58,62,55,70];
  ctx.beginPath();
  avgVals.forEach(function(v,i){
    var angle=(i/5)*Math.PI*2-Math.PI/2;
    var x=cx+Math.cos(angle)*r*(v/100);
    var y=cy+Math.sin(angle)*r*(v/100);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.strokeStyle='#3b82f6';
  ctx.lineWidth=1.5;
  ctx.setLineDash([5,5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Data dots
  vals.forEach(function(v,i){
    var angle=(i/5)*Math.PI*2-Math.PI/2;
    var x=cx+Math.cos(angle)*r*(v/100);
    var y=cy+Math.sin(angle)*r*(v/100);
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#f97316';
    ctx.fill();
  });
}

/* ── Growth Chart ───────────────────────────────────────────── */
function drawGrowthChart(measurements){
  var canvas=document.getElementById('growthChart');
  if(!canvas)return;
  if(typeof Chart==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload=function(){drawGrowthChartReal(measurements);};
    document.head.appendChild(s);
  }else{
    drawGrowthChartReal(measurements);
  }
}

function drawGrowthChartReal(measurements){
  var canvas=document.getElementById('growthChart');
  if(!canvas)return;
  var sorted=measurements.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
  var labels=sorted.map(function(m){return m.date||'';});
  var datasets=[];
  var metrics=[
    {key:'sprint_1b_s',label:'一垒跑(s)',color:'#3b82f6'},
    {key:'pitch_speed_kmh',label:'球速(km/h)',color:'#10b981'},
    {key:'throw_dist_m',label:'掷远(m)',color:'#f97316'}
  ];
  metrics.forEach(function(m){
    var hasData=sorted.some(function(s){return s[m.key];});
    if(!hasData)return;
    datasets.push({
      label:m.label,data:sorted.map(function(s){return s[m.key]||null;}),
      borderColor:m.color,backgroundColor:'transparent',
      tension:0.3,pointRadius:5,pointHoverRadius:7,borderWidth:2,spanGaps:true
    });
  });
  if(datasets.length===0){canvas.style.display='none';return;}
  canvas.style.display='block';
  if(canvas._chart)canvas._chart.destroy();
  canvas._chart=new Chart(canvas,{
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{family:'Space Grotesk'}}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b'}},
        y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b'}}
      }
    }
  });
}

/* ── CSV Import ─────────────────────────────────────────────── */
function openImportModal(){
  document.getElementById('csv-modal').style.display='flex';
  document.getElementById('csv-result').innerHTML='';
  document.getElementById('csv-preview').style.display='none';
}

function handleCSVFile(file){
  if(!file){showToast('请选择文件','warning');return;}
  var reader=new FileReader();
  reader.onload=function(e){parseCSV(e.target.result);};
  reader.readAsText(file);
}

function parseCSV(text){
  var lines=text.trim().split(/\r?\n/);
  if(lines.length<2){showToast('CSV 内容为空或格式错误','error');return;}
  var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
  var nameIdx=headers.findIndex(function(h){return h.includes('姓名')||h.includes('名字')||h==='name';});
  var dateIdx=headers.findIndex(function(h){return h.includes('日期')||h==='date';});
  if(nameIdx<0){showToast('找不到姓名列','error');return;}

  var rows=[];
  for(var i=1;i<lines.length;i++){
    var vals=lines[i].split(',').map(function(v){return v.trim().replace(/^"|"$/g,'');});
    if(!vals[nameIdx])continue;
    var row={name:vals[nameIdx],date:dateIdx>=0?vals[dateIdx]:''};
    headers.forEach(function(h,idx){
      var map={'立定跳':'stand_jump_cm','仰卧':'situp','一垒跑':'sprint_1b_s','全垒跑':'sprint_hb_s','掷远':'throw_dist_m','打击':'bat_dist_m','球速':'pitch_speed_kmh','棒速':'bat_speed_kmh'};
      var key=map[h];
      if(key&&vals[idx])row[key]=parseFloat(vals[idx])||0;
    });
    rows.push(row);
  }

  if(rows.length===0){showToast('没有找到有效数据行','error');return;}

  var preview=document.getElementById('csv-preview');
  var html='<table><thead><tr>';
  ['姓名','日期','一垒跑','全垒跑','球速','掷远'].forEach(function(h){html+='<th>'+h+'</th>';});
  html+='</tr></thead><tbody>';
  rows.slice(0,5).forEach(function(r){
    html+='<tr>';
    html+='<td>'+esc(r.name)+'</td><td>'+esc(r.date)+'</td>';
    html+='<td>'+toFixed(r.sprint_1b_s)+'</td><td>'+toFixed(r.sprint_hb_s)+'</td>';
    html+='<td>'+toFixed(r.pitch_speed_kmh)+'</td><td>'+toFixed(r.throw_dist_m)+'</td>';
    html+='</tr>';
  });
  if(rows.length>5)html+='<tr><td colspan="6" style="color:var(--text-muted);">...还有 '+(rows.length-5)+' 条</td></tr>';
  html+='</tbody></table>';
  preview.innerHTML='<div style="margin-bottom:10px;font-size:13px;font-weight:600;color:var(--success);">✅ 解析成功 '+rows.length+' 条</div>'+html;
  preview.style.display='block';

  var matched=0,notFound=[];
  rows.forEach(function(row){
    var player=allPlayers.find(function(p){return p.name===row.name;});
    if(!player){notFound.push(row.name);return;}
    var m=row;m.date=m.date||new Date().toISOString().substring(0,10);
    if(!player.measurements)player.measurements=[];
    player.measurements.push(m);
    matched++;
    DB.savePlayer(player,function(){},function(e){});
  });
  var result=document.getElementById('csv-result');
  if(matched>0){
    result.innerHTML='<div class="csv-result success">✅ 成功匹配 '+matched+' 名球员</div>';
    showToast('导入完成：'+matched+' 条体测数据已更新','success');
    renderNameList();
    updateTopbarStats();
    if(selectedPlayerId){
      var p=allPlayers.find(function(x){return x.id===selectedPlayerId;});
      if(p)renderProfileDetail(p);
    }
  }else{
    result.innerHTML='<div class="csv-result error">❌ 未匹配到任何球员，请检查姓名是否正确</div>';
  }
}

/* ── Manual Add ─────────────────────────────────────────────── */
function openAddMeasModal(){
  document.getElementById('meas-modal').style.display='flex';
  var sel=document.getElementById('meas-player-select');
  sel.innerHTML=allPlayers.map(function(p){return'<option value="'+p.id+'">'+esc(p.name||'未知')+'</option>';}).join('');
  document.getElementById('meas-date').value=new Date().toISOString().substring(0,10);
}

function saveMeasurement(){
  var pid=document.getElementById('meas-player-select').value;
  var player=allPlayers.find(function(p){return p.id===pid;});
  if(!player){showToast('请选择球员','warning');return;}
  var m={
    date:document.getElementById('meas-date').value,
    stand_jump_cm:parseFloat(document.getElementById('meas-stand-jump').value)||0,
    situp:parseInt(document.getElementById('meas-situp').value)||0,
    sprint_1b_s:parseFloat(document.getElementById('meas-1b').value)||0,
    sprint_hb_s:parseFloat(document.getElementById('meas-hb').value)||0,
    throw_dist_m:parseFloat(document.getElementById('meas-throw').value)||0,
    bat_dist_m:parseFloat(document.getElementById('meas-bat-dist').value)||0,
    pitch_speed_kmh:parseFloat(document.getElementById('meas-pitch-speed').value)||0,
    bat_speed_kmh:parseFloat(document.getElementById('meas-bat-speed').value)||0
  };
  if(!player.measurements)player.measurements=[];
  player.measurements.push(m);
  DB.savePlayer(player,function(){
    showToast('体测数据已保存','success');
    closeModal('meas-modal');
    renderNameList();
    updateTopbarStats();
    if(selectedPlayerId===pid){
      var p=allPlayers.find(function(x){return x.id===pid;});
      if(p)renderProfileDetail(p);
    }
  },function(e){showToast('保存失败：'+e,'error');});
}

/* ── Drag Drop ─────────────────────────────────────────────── */
var dz=document.getElementById('csv-drop-zone');
if(dz){
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dragover');});
  dz.addEventListener('drop',function(e){
    e.preventDefault();dz.classList.remove('dragover');
    var file=e.dataTransfer.files[0];
    if(file)handleCSVFile(file);
  });
}

/* ── Init ───────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  DB.init(function(){
    _dbInited=true;
    _pending.forEach(function(f){f();});
    loadPlayers();
  });
});
</script>
