/* ── Client-side GC PDF Parser — robust, handles pdf.js merged rows ──── */
function parseGCText(text) {
  var result = { success: false, hk_batting: [], hk_pitching: [], home_batting: [], home_pitching: [], hk_runs_by_inning: [], home_runs_by_inning: [] };

  // ══ Helper: filter out garbage stat-header matches ════════════════════════
  var STAT_HEADERS = { AB:1,R:1,H:1,RBI:1,BB:1,SO:1,IP:1,ER:1,HR:1 };
  function isStatHeader(name) {
    var n = name.trim().toUpperCase();
    return n === 'AB' || n === 'R' || n === 'H' || n === 'RBI' || n === 'BB' || n === 'SO' || n === 'IP' || n === 'ER' || n === 'HR' || n === 'E' || n === 'TB' || n === 'SB' || n === 'CS' || n === 'LOB' || n === 'BF';
  }
  function validName(name) {
    if (!name || name.trim().length < 2) return false;
    var n = name.trim().toUpperCase();
    // Reject pure stat header abbreviations (AB, R, H, RBI, BB, SO, etc.)
    if (isStatHeader(n)) return false;
    // Accept names with a space (First Last / First M.) or single capital letter (I, M, O, etc.)
    return true;
  }

  // ══ 1. Team names + Score (from full text) ══════════════════════════════
  // Real text: "Kaakiro Lions Majors TTBC Majors Eagles 2 - 9 Away Sunday March 08, 2026 1 2 3 4 5 6 R H E KKRL ..."
  // Strategy: find the "Away/Home + DayName + Month + Day, Year" date anchor.
  // Everything before that anchor (up to "X - Y") is the away team.
  // Everything between "X - Y" and the anchor is the home team.
  var dateAnchorMatch = text.match(/(Away|Home)\s+(Sunday|Monday|Tuesday|Wednesday|Thursday|Friday|Saturday)\s+(\w+)\s+(\d{1,2}),?\s+(\d{4})/);
  if (!dateAnchorMatch) {
    console.log('[GC Parse] Date anchor not found');
    console.log('[GC Parse] Text snippet:', text.substring(0, 300));
    return result;
  }
  var dateAnchorPos = text.indexOf(dateAnchorMatch[0]);

  // Find "Away" keyword first, then look backwards (~20 chars) for "X - Y" score
  // This is robust against varying PDF spacing between score and "Away" keyword
  var awayKw = text.indexOf('Away ');
  if (awayKw < 0) awayKw = text.indexOf('Home ');
  // Primary: locate "Away " keyword, look backward ~40 chars, find "X - Y" immediately before "Away"
  var awayKw = text.indexOf('Away ');
  if (awayKw < 0) awayKw = text.indexOf('Home ');
  var scoreSearchStart = awayKw > 0 ? Math.max(0, awayKw - 40) : 0;
  var scoreSearchText = text.substring(scoreSearchStart, awayKw > 0 ? awayKw : dateAnchorPos);
  var scoreMatch = scoreSearchText.match(/(\d+)\s*-\s*(\d+)\s+(?=Away\b|Home\b)/i);
  if (!scoreMatch) {
    // Fallback: find score anywhere before date, must be followed by Away or Home
    scoreMatch = text.substring(0, dateAnchorPos).match(/(\d+)\s*-\s*(\d+)\s+(?=Away\b|Home\b)/i);
  }
  if (scoreMatch) {
    result.away_score = parseInt(scoreMatch[1]);
    result.home_score = parseInt(scoreMatch[2]);
    console.log('[GC Parse] Score:', result.away_score, '-', result.home_score);
  } else {
    console.log('[GC Parse] Score "X - Y" not found');
  }

  // Title line format: "[Away Team Full] [Home Team Full] [Score] Away [Date]"
  // Example: "Kaakiro Lions Majors TTBC Majors Eagles 2 - 9 Away Sunday March 08, 2026"
  // Strategy: innings codes (KKRL=away, TTBC=home) are the unambiguous anchor.
  // We know from the innings that code[0]=away, code[1]=home.
  // Find each code's position in the TITLE LINE (before "Away"), pick the one with
  // the LARGER position = comes later in title line = home team.
  var awayKw2 = text.indexOf('Away ');
  if (awayKw2 < 0) awayKw2 = text.indexOf('Home ');
  var titleLine = text.substring(0, awayKw2); // everything before "Away "
  // Extract codes from innings section (KKRL, TTBC, etc.)
  var tmpCodes = [];
  var tmpInnRe = /(?:^|\n)([A-Z]{4,})\s+([\dX\s]+)/gm;
  var m3;
  while ((m3 = tmpInnRe.exec(text)) !== null) {
    var n3 = m3[2].trim().split(/\s+/);
    if (n3.length >= 5) tmpCodes.push(m3[1]);
  }
  var code0 = tmpCodes[0] || ''; // away team code (KKRL)
  var code1 = tmpCodes[1] || ''; // home team code (TTBC)

  if (code0 && code1) {
    // Find each code's position in the title line
    var pos0 = titleLine.lastIndexOf(code0); // last occurrence in title = true occurrence
    var pos1 = titleLine.lastIndexOf(code1);
    // The code with the LARGER position comes LATER in the title = home team
    if (pos1 > pos0) {
      // code1=TTBC is after code0=KKRL in title → home team follows away team
      result.home_team = titleLine.substring(pos1).trim();
      result.away_team = titleLine.substring(0, pos0).trim();
    } else {
      // No direct code match in title; try to find TTBC abbreviation alone
      // Title has "TTBC Majors Eagles" (full abbrev + name)
      // Find the line's last uppercase 4-char word = home team abbrev anchor
      var words = titleLine.trim().split(/\s+/);
      var abbrevIdx = -1;
      for (var ai = words.length - 1; ai >= 0; ai--) {
        if (/^[A-Z]{4,}$/.test(words[ai])) { abbrevIdx = ai; break; }
      }
      if (abbrevIdx >= 0) {
        result.home_team = words.slice(0, abbrevIdx).join(' ');
        result.away_team = words.slice(abbrevIdx + 1).join(' ');
      } else {
        result.away_team = '(Away)';
        result.home_team = '(Home)';
      }
    }
  } else {
    result.away_team = '(Away)';
    result.home_team = '(Home)';
  }
  console.log('[GC Parse] Teams:', result.away_team, '(Away', result.away_score, ') vs', result.home_team, '(Home', result.home_score, ')');

  // ══ 2. Date ═══════════════════════════════════════════════════════════
  var monthMap = { January:1, February:2, March:3, April:4, May:5, June:6, July:7, August:8, September:9, October:10, November:11, December:12 };
  var month = monthMap[dateAnchorMatch[3]] || 1;
  var day = parseInt(dateAnchorMatch[4]);
  var year = dateAnchorMatch[5];
  result.date = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
  console.log('[GC Parse] Date:', result.date);

  // ══ 3. Innings row ══════════════════════════════════════════════════════
  var awayCode = result.away_team.substring(0,4).toUpperCase();
  var homeCode = result.home_team.substring(0,4).toUpperCase();
  var innRegex = /(?:[A-Z]{4,})\s+([\dX\s]+)/g;
  var innMatch, foundInnings = [];
  while ((innMatch = innRegex.exec(text)) !== null) {
    var nums = innMatch[1].trim().split(/\s+/);
    if (nums.length >= 5) {
      foundInnings.push({ code: innMatch[0].substring(0,4).toUpperCase(), nums: nums });
    }
  }
  if (foundInnings.length >= 1) {
    result.away_runs_by_inning = foundInnings[0].nums.slice(0, foundInnings[0].nums.length - 3).map(function(v){ return v === 'X' ? 0 : parseInt(v) || 0; });
    console.log('[GC Parse] Innings[0]:', foundInnings[0].code, '->', result.away_runs_by_inning);
  }
  if (foundInnings.length >= 2) {
    result.home_runs_by_inning = foundInnings[1].nums.slice(0, foundInnings[1].nums.length - 3).map(function(v){ return v === 'X' ? 0 : parseInt(v) || 0; });
    console.log('[GC Parse] Innings[1]:', foundInnings[1].code, '->', result.home_runs_by_inning);
  }

  // ══ 4. Batting / Pitching sections ══════════════════════════════════════
  var battingStart = text.indexOf('BATTING');
  var pitchingStart = text.indexOf('PITCHING');
  if (battingStart < 0 || pitchingStart < 0) {
    console.log('[GC Parse] BATTING or PITCHING section not found');
    result.success = true; return result;
  }

  var battingBlock = text.substring(battingStart + 7, pitchingStart);
  var pitchingBlock = text.substring(pitchingStart + 8);

  // ── Batting full-text pass (primary) ───────────────────────────────────
  // Match: FirstName [MiddleInitial] LastName #NN (POS) AB R H RBI BB SO
  // Player name must: (a) contain a space, OR (b) be a single capital letter
  // Exclude stat headers (AB, R, H, RBI, BB, SO, etc.)
  var batAll = battingBlock.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#(\d+)\s*\(([A-Z]+)\)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/g) || [];
  // Filter out garbage (stat headers leaking through)
  batAll = batAll.filter(function(m) {
    var nm = m.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#/);
    return nm && validName(nm[1]);
  });
  console.log('[GC Parse] Batting raw matches:', batAll.length);

  // Determine team split: count player rows before first "Totals"
  var totIdx = battingBlock.indexOf('Totals');
  var preTotBlock = totIdx >= 0 ? battingBlock.substring(0, totIdx) : battingBlock;
  var preTotMatches = preTotBlock.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#(\d+)\s*\(([A-Z]+)\)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/g) || [];
  preTotMatches = preTotMatches.filter(function(m) {
    var nm = m.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#/);
    return nm && validName(nm[1]);
  });
  var preTotCount = preTotMatches.length;
  console.log('[GC Parse] Away (hk) rows before Totals:', preTotCount, '/ total:', batAll.length);

  batAll.forEach(function(m, i) {
    var pm = m.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#(\d+)\s*\(([A-Z]+)\)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/);
    if (pm && validName(pm[1])) {
      var p = { name: pm[1].trim(), number: parseInt(pm[2]), pos: pm[3],
                ab: parseInt(pm[4]), r: parseInt(pm[5]), h: parseInt(pm[6]),
                rbi: parseInt(pm[7]), bb: parseInt(pm[8]), so: parseInt(pm[9]) };
      if (i < preTotCount) result.hk_batting.push(p);
      else result.home_batting.push(p);
    }
  });
  console.log('[GC Parse] hk_batting:', result.hk_batting.length, 'home_batting:', result.home_batting.length);

  // ── Pitching full-text pass ─────────────────────────────────────────────
  // Match: FirstName [MiddleInitial] LastName #NN IP H R ER BB SO HR (no parentheses)
  var pitAll = pitchingBlock.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#(\d+)\s+([\d\.]+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/g) || [];
  pitAll = pitAll.filter(function(m) {
    var nm = m.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#/);
    return nm && validName(nm[1]);
  });
  console.log('[GC Parse] Pitching raw matches:', pitAll.length);

  var pitTotIdx = pitchingBlock.indexOf('Totals');
  var prePitBlock = pitTotIdx >= 0 ? pitchingBlock.substring(0, pitTotIdx) : pitchingBlock;
  var prePitMatches = prePitBlock.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#(\d+)\s+([\d\.]+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/g) || [];
  prePitMatches = prePitMatches.filter(function(m) {
    var nm = m.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#/);
    return nm && validName(nm[1]);
  });
  var prePitCount = prePitMatches.length;

  pitAll.forEach(function(m, i) {
    var pm = m.match(/([A-Za-z][A-Za-z\s\.]*(?:\s+[A-Za-z])?)\s*#(\d+)\s+([\d\.]+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/);
    if (pm && validName(pm[1])) {
      var p = { name: pm[1].trim(), number: parseInt(pm[2]), ip: parseFloat(pm[3]),
                h: parseInt(pm[4]), r: parseInt(pm[5]), er: parseInt(pm[6]),
                bb: parseInt(pm[7]), so: parseInt(pm[8]), hr: parseInt(pm[9]) };
      if (i < prePitCount) result.hk_pitching.push(p);
      else result.home_pitching.push(p);
    }
  });
  console.log('[GC Parse] hk_pitching:', result.hk_pitching.length, 'home_pitching:', result.home_pitching.length);

  result.hk_team_key = 'away';
  result.success = true;
  console.log('[GC Parse] Done');
  return result;
}

function uploadGCFile(file) {
  if (!file || _gcUploading) return;
  if (file.type && file.type !== 'application/pdf') {
    showToast('请上传 PDF 文件', 'error'); return;
  }
  _gcUploading = true;
  showToast('正在解析 GC PDF，请稍候...', 'info');

  var reader = new FileReader();
  reader.onload = function(e) {
    var typedarray = new Uint8Array(e.target.result);
    pdfjsLib.getDocument({ data: typedarray }).promise.then(function(pdf) {
      var allText = '';
      var pagePromises = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        pagePromises.push(pdf.getPage(i).then(function(page) {
          return page.getTextContent().then(function(content) {
            // Preserve line breaks between text items by checking y position
            // Use a very tight threshold (> 0.1) to avoid merging adjacent rows
            var lastY = null, lines = [], line = [];
            content.items.forEach(function(item) {
              var y = item.transform[5]; // keep full precision
              if (lastY !== null && Math.abs(y - lastY) > 0.1) {
                if (line.length > 0) lines.push(line.join(' '));
                line = [item.str];
              } else {
                line.push(item.str);
              }
              lastY = y;
            });
            if (line.length > 0) lines.push(line.join(' '));
            return lines.join('\n');
          });
        }));
      }
      Promise.all(pagePromises).then(function(pages) {
        // Join pages, then normalize whitespace: multiple spaces/tabs → single space
        allText = pages.join('\n').replace(/\s+/g, ' ').replace(/\n\s*/g, '\n').trim();
        console.log('[GC PDF] Raw text length:', allText.length);
        console.log('[GC PDF] First 300 chars:', allText.substring(0, 300));
        var data = parseGCText(allText);
        _gcUploading = false;
        _gcResult = data;
        showToast(data.success ? '✅ PDF 解析成功！' : '⚠️ 解析完成但数据不完整', data.success ? 'success' : 'warning');
        if (data.success) {
          _wizardGame.home       = _wizardGame.home || (data.hk_team_key === 'away' ? data.away_team : data.home_team);
          _wizardGame.away       = _wizardGame.away || (data.hk_team_key === 'away' ? data.home_team : data.away_team);
          var isHome = data.hk_team_key === 'home';
          _wizardGame.home_score = _wizardGame.home_score || (isHome ? data.home_score : data.away_score);
          _wizardGame.away_score = _wizardGame.away_score || (isHome ? data.away_score : data.home_score);
          if (!_wizardGame.date)  _wizardGame.date  = data.date || '';
          if (!_wizardGame.venue) _wizardGame.venue = data.location || '';
        }
        var body = document.getElementById('modal-body-content');
        if (body) body.innerHTML = renderWizardSteps() + renderWizardContent();
        rebindDropZone();
        bindWizardFooter(!!_wizardGame.id);
      });
    }).catch(function(err) {
      _gcUploading = false;
      showToast('❌ PDF 解析失败: ' + err.message, 'error');
      var body = document.getElementById('modal-body-content');
      if (body) body.innerHTML = renderWizardSteps() + renderWizardContent();
    });
  };
  reader.readAsArrayBuffer(file);
}

/* ── Drop zone event binding ─────────────────────────────── */
function rebindDropZone() {
  var dropZone = document.getElementById('pdf-drop');
  if (!dropZone) return;
  // Remove old handlers to prevent double-binding on re-render
  dropZone.ondragover = null; dropZone.ondragleave = null; dropZone.onclick = null;
  dropZone.addEventListener('dragover',  function(e){ e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop',      function(e){
    e.preventDefault(); dropZone.classList.remove('drag-over');
    var f = e.dataTransfer.files[0];
    if (f && !_gcUploading) uploadGCFile(f);
  });
  dropZone.addEventListener('click', function() {
    if (_gcUploading) return;
    ensureGCInput().click();
  });
}

function saveGameBasic(game, isEdit) {
  var src = _wizardGame && (_wizardGame.home || _wizardGame.year) ? _wizardGame : null;
  var home = src ? src.home : '';
  var away = src ? src.away : '';
  var gc = _gcResult;
  var data = {
    home: home, away: away,
    home_score: src ? src.home_score : (parseInt((document.getElementById('gf-hs')||{}).value)||0),
    away_score: src ? src.away_score : (parseInt((document.getElementById('gf-as')||{}).value)||0),
    date: src ? src.date : (document.getElementById('gf-date')||{}).value,
    venue: src ? src.venue : (document.getElementById('gf-venue')||{}).value,
    category: src ? src.category : (document.getElementById('gf-cat')||{}).value,
    status: src ? src.status : (document.getElementById('gf-status')||{}).value,
    year: src ? src.year : (document.getElementById('gf-year')||{}).value || new Date().getFullYear(),
    tournament: src ? src.tournament : (document.getElementById('gf-tournament')||{}).value || '',
    hk_team_key: gc&&gc.success ? gc.hk_team_key : null,
    hk_batting: gc&&gc.success ? gc.hk_batting : [],
    hk_pitching: gc&&gc.success ? gc.hk_pitching : [],
    hk_runs_by_inning: gc&&gc.success ? (gc.hk_runs_by_inning||[]) : [],
    away_runs_by_inning: gc&&gc.success ? (gc.away_runs_by_inning||[]) : [],
    away_hits: gc&&gc.success ? (gc.away_hits||null) : null,
    away_errors: gc&&gc.success ? (gc.away_errors||null) : null,
    home_hits: gc&&gc.success ? (gc.home_hits||null) : null,
    home_errors: gc&&gc.success ? (gc.home_errors||null) : null,
    hk_pdf_players: gc&&gc.success ? gc.hk_batting.concat(gc.hk_pitching).filter(function(v,i,a){return a.findIndex(function(t){return t.name===v.name;})===i;}).map(function(v){return v.name;}) : [],
    roster: buildRosterFromGC(src, gc)
  };
  function buildRosterFromGC(src, gc) {
    if (src && src.roster && src.roster.length > 0) return src.roster;
    var batting  = gc && gc.success ? (gc.hk_batting||[])  : [];
    var pitching = gc && gc.success ? (gc.hk_pitching||[]) : [];

    // Build name → player_id lookup from allPlayers
    var nameToId = {};
    if (typeof allPlayers !== 'undefined' && allPlayers) {
      allPlayers.forEach(function(p) {
        if (p && p.id && p.name) {
          nameToId[p.name.toLowerCase()] = p.id;
          nameToId[p.name.toLowerCase().split(' ').reverse().join(' ')] = p.id; // "Last First" → "First Last"
          nameToId[p.name.toLowerCase().split(' ')[0]] = p.id; // first name only
        }
      });
    }

    function findPlayerId(name) {
      if (!name) return null;
      var lower = name.toLowerCase();
      if (nameToId[lower]) return nameToId[lower];
      // Try reversed
      var parts = lower.split(' ');
      if (parts.length === 2) {
        var reversed = parts[1] + ' ' + parts[0];
        if (nameToId[reversed]) return nameToId[reversed];
      }
      // Try first name only
      if (parts[0] && nameToId[parts[0]]) return nameToId[parts[0]];
      return null;
    }

    // Merge batting + pitching into one list per player name
    var nameMap = {};
    batting.forEach(function(p) {
      if (!p.name) return;
      var pid = findPlayerId(p.name);
      if (!nameMap[p.name]) nameMap[p.name] = { player_id: pid, name: p.name, number: p.number||'', position: p.position||'', batting: p, pitching: null };
      else Object.assign(nameMap[p.name], { batting: p });
    });
    pitching.forEach(function(p) {
      if (!p.name) return;
      var pid = findPlayerId(p.name);
      if (!nameMap[p.name]) nameMap[p.name] = { player_id: pid, name: p.name, number: p.number||'', position: p.position||'', batting: null, pitching: p };
      else Object.assign(nameMap[p.name], { pitching: p });
    });
    var roster = [];
    Object.keys(nameMap).forEach(function(name) {
      var m = nameMap[name];
      var b = m.batting, p = m.pitching;
      roster.push({
        player_id: m.player_id,
        name: m.name,
        number: m.number,
        position: m.position,
        // batting stats
        ab:  b ? b.ab  : 0,  r:  b ? b.r  : 0,  h:  b ? b.h  : 0,
        rbi: b ? b.rbi : 0,  bb: b ? b.bb : 0,  so: b ? b.so : 0,
        // pitching stats (p.so = strikeouts from GC parser, stored as so_p for DB)
        ip:   p ? p.ip   : 0,  er:   p ? p.er   : 0,  so_p: p ? p.so : 0
      });
    });
    return roster;
  }
  if (isEdit) data.id = game.id;
  DB.upsertGame(data, function(res){
    if (!res.success) { showToast('保存失败: '+res.error, 'error'); return; }
    closeModal('game-modal');
    showToast(isEdit?'赛事已更新':'赛事已保存！','success');

    // Directly update allGames instead of loadGames() to avoid Firebase fetch issues
    var savedGame = JSON.parse(JSON.stringify(data));
    savedGame.id = res.id;
    if (isEdit) {
      var idx = allGames.findIndex(function(g){ return g.id === res.id; });
      if (idx >= 0) allGames[idx] = savedGame; else allGames.unshift(savedGame);
    } else {
      allGames.unshift(savedGame);
    }
    renderGames();
    _wizardGame = {};

    // ── Push batting + pitching stats to each player's lifetime record ──
    var roster = data.roster || [];
    if (roster.length === 0) return;
    var pending = 0;
    roster.forEach(function(r) {
      if (!r.player_id) { console.log('[Stats] No player_id for:', r.name); return; }
      var hasBatting = (r.ab||0) > 0 || (r.h||0) > 0 || (r.r||0) > 0 || (r.rbi||0) > 0 || (r.bb||0) > 0 || (r.so||0) > 0;
      var hasPitching = (r.ip||0) > 0 || (r.er||0) > 0 || (r.so_p||0) > 0;
      if (!hasBatting && !hasPitching) return;
      pending++;
      // Merge batting + pitching into ONE call per player to avoid race conditions
      DB.updatePlayerGameStats(r.player_id, {
        ab: r.ab||0, r: r.r||0, h: r.h||0, rbi: r.rbi||0, bb: r.bb||0, so: r.so||0,
        ip: r.ip||0, er: r.er||0, pso: r.so_p||0
      }, function(){
        console.log('[Stats] saved for player', r.player_id, r.name);
        pending--; if (pending <= 0) console.log('[Stats] All player stats updated');
      });
    });
  });
}

function openRosterModal(gameId, cb) {
  cb = cb || function(){};

  function proceed(game) {
    console.log('[Roster] allPlayers count:', allPlayers.length, '| game roster:', (game.roster||[]).length, '| hk_batting:', (game.hk_batting||[]).length);
    finishModal(game);
  }

  function finishModal(game) {
    // Normalize IDs to string to avoid int/string mismatch
    _rosterIds = new Set((game.roster||[]).map(function(p){ return String(p.player_id||p.id||''); }).filter(Boolean));
    // Auto-pre-select players matching PDF batting/pitching names
    if ((game.hk_batting||[]).length > 0 || (game.hk_pitching||[]).length > 0) {
      autoMatchPlayers(game, function(matchedIds){
        matchedIds.forEach(function(id){ _rosterIds.add(String(id)); });
        renderRosterModal(game);
        cb();
      });
    } else {
      renderRosterModal(game);
      cb();
    }
  }

  if (gameId) {
    DB.getGame(gameId, function(res){
      proceed(res.data || {});
    });
  } else {
    proceed({});
  }
}

// Auto-match PDF player names to library players (multi-level fuzzy matching)
function autoMatchPlayers(game, callback) {
  var pdfPlayers = (game.hk_batting||[]).concat(game.hk_pitching||[]);
  if (!pdfPlayers.length) { callback([]); return; }
  var matched = [];
  allPlayers.forEach(function(p){
    var pn = (p.name||'').toLowerCase().trim();
    for (var i=0; i<pdfPlayers.length; i++) {
      var bn = (pdfPlayers[i].name||'').toLowerCase().trim();
      var pid = String(p.id||p.player_id||'');
      if (!pid) continue;
      // Level 1: exact match (case-insensitive)
      var match = pn === bn;
      // Level 2: one contains the other (handles "I Chan" ↔ "i chan" or partial)
      if (!match) match = pn.includes(bn) || bn.includes(pn);
      // Level 3: first token matches (handles "I" in "I Chan" matching "I" in "I Chan")
      if (!match) {
        var pnToks = pn.split(/\s+/);
        var bnToks = bn.split(/\s+/);
        match = pnToks.some(function(t){ return bnToks.includes(t) && t.length > 1; });
      }
      // Level 4: initial + last name (e.g. "I Chan" matches "I Chan")
      if (!match) {
        var pLast = pnToks[pnToks.length-1];
        var bLast = bnToks[bnToks.length-1];
        var pInit = pnToks[0][0]||'';
        var bInit = bnToks[0][0]||'';
        match = (pInit===bInit && pLast===bLast && pLast.length > 1);
      }
      if (match && !matched.includes(pid)) {
        matched.push(pid);
        console.log('[AutoMatch] ✓', bn, '→', p.name, '(#'+p.number+')');
        break;
      }
    }
  });
  console.log('[AutoMatch] Total matched:', matched.length, '/', pdfPlayers.length);
  callback(matched);
}

function renderRosterModal(game) {
  _currentGameCache = game;   // 缓存供 toggleRosterPlayer 使用
  closeModal('roster-modal');
  // 基于 _rosterIds 分组（已选 / 未选）
  var selected   = allPlayers.filter(function(p){ return _rosterIds.has(String(p.id||p.player_id||'')); });
  var unrostered = allPlayers.filter(function(p){ return !_rosterIds.has(String(p.id||p.player_id||'')); });

  var html = '<div class="modal-overlay" id="roster-modal">'+
    '<div class="modal" style="max-width:900px;">'+
      '<div class="modal-header"><div class="modal-title">👥 参赛阵容 — '+escHtml(game.home||'')+' vs '+escHtml(game.away||'')+'</div><button class="modal-close" onclick="closeModal(\'roster-modal\')">✕</button></div>'+
      '<div class="modal-body">'+
        '<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">点击球员卡片选中/取消。选中的球员将参与数据绑定。</p>'+

        // Already selected
        '<div class="roster-section">'+
          '<div class="roster-section-title">✅ 已选球员 <span id="roster-count" style="color:var(--primary)">('+selected.length+')</span></div>'+
          '<div class="roster-grid" id="roster-selected"></div>'+
        '</div>'+

        // Available players
        '<div class="roster-section">'+
          '<div class="roster-section-title">➕ 从资料库添加球员</div>'+
          '<div class="roster-search"><input type="text" id="roster-search" placeholder="搜索球员姓名..." oninput="filterRosterList()"></div>'+
          '<div class="roster-grid" id="roster-available"></div>'+
          '<div id="roster-avail-empty" style="display:none;margin-top:10px;text-align:center;padding:10px;background:rgba(249,115,22,0.06);border:1px dashed rgba(249,115,22,0.3);border-radius:8px;">'+
            '<div style="font-size:12px;color:var(--text-muted);">球员资料库为空，请先在「球员资料库」添加球员</div>'+
          '</div>'+
        '</div>'+

        // Stats binding
        '<div id="stats-bind-area"></div>'+
      '</div>'+
      '<div class="modal-footer" style="position:sticky;bottom:0;background:var(--bg-secondary);border-top:1px solid var(--border);padding:16px 24px;">'+
        '<button class="btn btn-ghost" onclick="closeModal(\'roster-modal\')">稍后再说</button>'+
        '<button class="btn btn-primary" id="btn-save-roster">💾 保存阵容并绑定数据</button>'+
      '</div>'+
    '</div>'+
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);

  renderRosterGrid(selected,   document.getElementById('roster-selected'),   true);
  renderRosterGrid(unrostered, document.getElementById('roster-available'), false);

  // Show empty state if no players available to add
  var emptyMsg = document.getElementById('roster-avail-empty');
  if (emptyMsg) emptyMsg.style.display = (unrostered.length === 0) ? 'block' : 'none';

  if (game.hk_batting && game.hk_batting.length) {
    renderStatsBind(game);
  }

  document.getElementById('btn-save-roster').onclick = function() {
    saveRosterAndBind(game.id);
  };

  // Event delegation: handle ALL clicks inside the modal
  var overlay = document.getElementById('roster-modal');
  overlay.addEventListener('click', function(e) {
    var card = e.target.closest('.roster-player-card');
    if (card) {
      var pid = card.getAttribute('data-id');
      if (pid) toggleRosterPlayer(pid);
    }
  });
}

function renderRosterGrid(players, container, isSelected) {
  if (!players || !players.length) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;">'+(isSelected?'暂无选中球员':'无匹配球员')+'</div>';
    return;
  }
  var html = '';
  players.forEach(function(p) {
    var pid = String(p.id||p.player_id||'');
    var sel = isSelected || _rosterIds.has(pid);
    html += '<div class="roster-player-card'+(sel?' selected':'')+'" data-id="'+escHtml(pid)+'">'+
      '<div class="rpc-check">✓</div>'+
      '<div class="rpc-name">'+escHtml(p.name||'')+'</div>'+
      '<div class="rpc-num">#'+(p.number||p.jersey_number||'')+'</div>'+
      '<div class="rpc-pos">'+escHtml((p.positions||[]).join('/')||p.position||'')+'</div>'+
    '</div>';
  });
  container.innerHTML = html;
}

function toggleRosterPlayer(pid) {
  pid = String(pid);
  if (_rosterIds.has(pid)) {
    _rosterIds.delete(pid);
  } else {
    _rosterIds.add(pid);
  }
  // 直接用缓存的 game 对象重新渲染，不需要再请求 Firebase
  if (_currentGameCache) {
    renderRosterModal(_currentGameCache);
  }
}

function filterRosterList() {
  var q = document.getElementById('roster-search').value.toLowerCase();
  var all = document.querySelectorAll('#roster-available .roster-player-card');
  all.forEach(function(card) {
    var name = (card.querySelector('.rpc-name')||{}).textContent||'';
    card.style.display = name.toLowerCase().includes(q) ? '' : 'none';
  });
}

function renderStatsBind(game) {
  var area = document.getElementById('stats-bind-area');
  if (!area) return;
  var batting = game.hk_batting||[];
  var pitching = game.hk_pitching||[];
  // Get currently selected player IDs
  var selectedIds = Array.from(_rosterIds);
  // Build lookup from player ID → player record
  var playerById = {};
  allPlayers.forEach(function(p){ playerById[p.id||p.player_id]=p; });

  var h = '<div class="roster-section"><div class="roster-section-title">📊 数据绑定预览（PDF 球员 → 资料库球员）</div>';
  h += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">点击卡片右侧筛选，自动匹配 '+(batting.length+pitching.length)+' 个球员</div>';

  var matched=0, unmatched=0;

  if (batting.length) {
    h += '<div class="gc-section-label">⚾ 打击数据</div>';
    batting.forEach(function(b) {
      var matchedPlayer = null;
      selectedIds.forEach(function(pid){
        var p = playerById[pid];
        if (!p) return;
        var pn = (p.name||'').toLowerCase();
        var bn = (b.name||'').toLowerCase();
        if (pn===bn||pn.includes(bn)||bn.includes(pn)||pn.split(' ')[0]===bn.split(' ')[0]) {
          matchedPlayer = p;
        }
      });
      var status = matchedPlayer
        ? '<span style="color:#22c55e;font-weight:700">✓ 已绑定 → '+escHtml(matchedPlayer.name||'')+' #'+(matchedPlayer.number||matchedPlayer.jersey_number||'')+'</span>'
        : '<span class="stat-bind-none">待匹配...</span>';
      if (matchedPlayer) matched++; else unmatched++;
      h += '<div class="stat-bind-row">'+
        '<div class="stat-bind-name">'+escHtml(b.name||'')+' #'+escHtml(b.number||'')+'</div>'+
        '<div class="stat-bind-val">AB:'+b.ab+' H:'+b.h+' R:'+b.r+' BB:'+b.bb+' SO:'+b.so+' RBI:'+b.rbi+'</div>'+
        '<div class="stat-bind-arrow">→</div>'+
        '<div class="stat-bind-target">'+status+'</div>'+
      '</div>';
    });
  }

  if (pitching.length) {
    h += '<div class="gc-section-label">🎯 投球数据</div>';
    pitching.forEach(function(b) {
      var matchedPlayer = null;
      selectedIds.forEach(function(pid){
        var p = playerById[pid];
        if (!p) return;
        var pn = (p.name||'').toLowerCase();
        var bn = (b.name||'').toLowerCase();
        if (pn===bn||pn.includes(bn)||bn.includes(pn)||pn.split(' ')[0]===bn.split(' ')[0]) {
          matchedPlayer = p;
        }
      });
      var status = matchedPlayer
        ? '<span style="color:#22c55e;font-weight:700">✓ 已绑定 → '+escHtml(matchedPlayer.name||'')+' #'+(matchedPlayer.number||matchedPlayer.jersey_number||'')+'</span>'
        : '<span class="stat-bind-none">待匹配...</span>';
      if (matchedPlayer) matched++; else unmatched++;
      h += '<div class="stat-bind-row">'+
        '<div class="stat-bind-name">'+escHtml(b.name||'')+' #'+escHtml(b.number||'')+'</div>'+
        '<div class="stat-bind-val">IP:'+fmtIP(b.ip)+' H:'+b.h+' R:'+b.r+' ER:'+b.er+' BB:'+b.bb+' SO:'+b.so+'</div>'+
        '<div class="stat-bind-arrow">→</div>'+
        '<div class="stat-bind-target">'+status+'</div>'+
      '</div>';
    });
  }

  h += '<div style="margin-top:8px;font-size:12px;text-align:right;">'+
    '<span style="color:#22c55e">✓ 已匹配: '+matched+'</span> · '+
    '<span style="color:#ef4444">待匹配: '+unmatched+'</span>'+
  '</div>';

  h += '</div>';
  area.innerHTML = h;
}

function saveRosterAndBind(gameId) {
  var selectedPlayers = allPlayers.filter(function(p){ return _rosterIds.has(p.id||p.player_id); });
  // Fetch game to get PDF batting/pitching data saved from step 1
  DB.getGame(gameId, function(res){
    var game = res.data||{};
    var batting = game.hk_batting||[];
    var pitching = game.hk_pitching||[];

    var roster = selectedPlayers.map(function(p) {
      var pn = (p.name||'').toLowerCase();
      var bs = null, ps = null;
      batting.forEach(function(b){
        var bn = (b.name||'').toLowerCase();
        if (pn===bn||pn.includes(bn)||bn.includes(pn)||pn.split(' ')[0]===bn.split(' ')[0]) bs=b;
      });
      pitching.forEach(function(b){
        var bn = (b.name||'').toLowerCase();
        if (pn===bn||pn.includes(bn)||bn.includes(pn)||pn.split(' ')[0]===bn.split(' ')[0]) ps=b;
      });
      return {
        player_id: p.id||p.player_id,
        name: p.name,
        number: p.number||p.jersey_number||'',
        batting: bs ? { ab:bs.ab||0, r:bs.r||0, h:bs.h||0, rbi:bs.rbi||0, bb:bs.bb||0, so:bs.so||0 } : null,
        pitching: ps ? { ip:parseFloat(ps.ip)||0, h:ps.h||0, r:ps.r||0, er:ps.er||0, bb:ps.bb||0, so:ps.so||0, hr:ps.hr||0 } : null
      };
    });

  // Save roster
    DB.setGameRoster(gameId, roster, function() {
      // Update player lifetime stats
      var done = 0, total = 0;
      roster.forEach(function(r) {
        if (r.batting) total++;
        if (r.pitching) total++;
      });

      function checkDone() {
        done++;
        if (done >= total) {
          closeModal('roster-modal');
          showToast('阵容已保存，球员生涯数据已更新！', 'success');
          loadGames();
        }
      }

      if (total === 0) {
        closeModal('roster-modal');
        showToast('阵容已保存', 'success');
        loadGames();
        return;
      }

      roster.forEach(function(r) {
        if (r.batting) {
          DB.updatePlayerGameStats(r.player_id, {
            ab: r.batting.ab, r: r.batting.r, h: r.batting.h,
            rbi: r.batting.rbi, bb: r.batting.bb, so: r.batting.so
          }, function(){ checkDone(); });
        }
        if (r.pitching) {
          DB.updatePlayerGameStats(r.player_id, {
            ip: r.pitching.ip, ph: r.pitching.h, pr: r.pitching.r,
            per: r.pitching.er, pbb: r.pitching.bb, pso: r.pitching.so, phr: r.pitching.hr
          }, function(){ checkDone(); });
        }
      });
    }); // end DB.setGameRoster
  }); // end DB.getGame
}

function viewRoster(gameId, cb) {
  DB.getGame(gameId, function(res) {
    var game = res.data||{};
    _rosterIds = new Set((game.roster||[]).map(function(p){ return p.player_id||p.id; }));
    renderRosterModal(game);
    if (cb) cb();
  });
}

window.editGame = function(id) {
  DB.getGame(id, function(res) {
    var g = res.data;
    if (!g) { showToast('赛事不存在', 'error'); return; }
    _gcResult = g.hk_batting && g.hk_batting.length ? g : null;
    _rosterIds = new Set((g.roster||[]).map(function(p){ return p.player_id||p.id; }));
    renderAddModal(g, true);
  });
};

window.deleteGame = function(id) {
  if (!confirm('确定删除这场赛事？')) return;
  DB.deleteGame(id, function(res) {
    showToast('赛事已删除', 'success');
    loadGames();
  });
};

function loadGames(cb) {
  DB.getGames(function(result) {
    allGames = result.data||[];
    renderGames();
    if (cb) cb();
  });
}

/* ── Init ──────────────────────────────────────────────────── */
(function() {
  var _initTimer = setTimeout(function() {
    var sidebar = document.getElementById('app-sidebar');
    var gameList = document.getElementById('game-list');
    if (sidebar && !sidebar.innerHTML.trim()) {
      sidebar.innerHTML = '<div style="padding:20px 16px;"><div style="color:#ef4444;font-size:12px;font-weight:700;margin-bottom:8px;">⚠️ 初始化超时</div><a href="diag.html" style="color:#f97316;font-size:12px;">→ 诊断页面</a></div>';
    }
    if (gameList && !gameList.innerHTML.trim()) {
      gameList.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><h3>连接中...</h3><p>如长时间无响应，请按 Ctrl+Shift+R 强制刷新</p></div>';
    }
  }, 4000);

  console.log('[Init] games.html starting...');
  DB.init(function(){
    console.log('[Init] DB.init done, loading players via SDK...');
    clearTimeout(_initTimer);
    _dbInited = true;
    var loaded = 0;

    function check() {
      loaded++;
      console.log('[Init] check() loaded=', loaded, '/2');
      if (loaded >= 2) {
        console.log('[Init] Both done, allPlayers=', allPlayers.length, 'allGames=', allGames.length);
        // Sync
        allPlayers.forEach(function(p) {
          allGames.forEach(function(g) {
            (g.roster||[]).forEach(function(r) {
              if (r.player_id === p.id || r.player_id === p.player_id) {
                r.name = p.name;
                r.number = p.number || p.jersey_number || '';
              }
            });
          });
        });
        renderGames();
        bindFilterEvents();
        _pendingLoads.forEach(function(fn){ fn(); });
      }
    }

    // Step 1: localStorage cache (instant, set by players.html after it loads players from Firebase SDK)
    var cached = null;
    try { cached = JSON.parse(localStorage.getItem('baseai_players') || '[]'); } catch(e){}
    if (cached && cached.length > 0) {
      console.log('[Init] allPlayers from localStorage cache:', cached.length);
      var active = cached.filter(function(p){ return p.status==='active'; });
      allPlayers = active.length > 0 ? active : cached;
      check();
      return;
    }

    // Step 2: fetch from players.json (pre-downloaded from Firebase, hosted on GitHub Pages)
    fetch('players.json')
      .then(function(resp) {
        console.log('[Init] players.json fetch status:', resp.status);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.json();
      })
      .then(function(data) {
        console.log('[Init] players.json loaded:', data.length, 'players');
        // Cache to localStorage for next time
        try { localStorage.setItem('baseai_players', JSON.stringify(data)); } catch(e){}
        var active = data.filter(function(p){ return p.status==='active'; });
        allPlayers = active.length > 0 ? active : data;
        check();
      })
      .catch(function(e) {
        console.error('[Init] players.json fetch failed:', e.message);
        // Step 3: DB.getPlayers as last resort
        DB.getPlayers(function(r) {
          var raw = (r&&r.data)||[];
          var active = raw.filter(function(p){ return p.status==='active'; });
          allPlayers = active.length > 0 ? active : raw;
          console.log('[Init] allPlayers from DB:', allPlayers.length);
          check();
        });
      });

    // Load games
    DB.getGames(function(r){
      allGames = (r&&r.data)||[];
      console.log('[Init] allGames =', allGames.length);
      check();
    });
  }); // close DB.init

  // Initialize navigation
  initNav({ title: '赛事管理与记分', subtitle: 'Module 03 · Game Management v3.0' });

  }); // close IIFE
</script>
