<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛事管理与记分 — BaseAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a42;
  --bg-input: #141a2e;
  --primary: #f97316;
  --primary-light: #fb923c;
  --accent: #3b82f6;
  --success: #10b981;
  --success-bg: rgba(16, 185, 129, 0.12);
  --warning: #f59e0b;
  --warning-bg: rgba(245, 158, 11, 0.12);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.12);
  --info: #06b6d4;
  --info-bg: rgba(6, 182, 212, 0.12);
  --purple: #8b5cf6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.04);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; flex-shrink: 0; background: #0f1629; border-right: 2px solid rgba(249,115,22,0.3); display: flex; flex-direction: column; position: relative; z-index: 10; }
.sidebar-logo { padding: 24px 16px 20px; border-bottom: 2px solid rgba(249,115,22,0.2); background: rgba(249,115,22,0.04); }
.logo-mark { font-size: 32px; margin-bottom: 8px; }
.sidebar-logo h1 { font-size: 18px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; }
.sidebar-logo .subtitle { font-size: 9px; color: #f97316; letter-spacing: 2px; margin-top: 2px; font-weight: 700; }
.sidebar-section { padding: 14px 8px 0; }
.sidebar-section-label { font-size: 10px; font-weight: 700; color: rgba(249,115,22,0.7); letter-spacing: 1px; text-transform: uppercase; padding: 0 6px; margin-bottom: 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; color: #cbd5e1; transition: all 0.15s; margin-bottom: 2px; cursor: pointer; text-decoration: none; }
.nav-item:hover { background: rgba(249,115,22,0.1); color: #f97316; }
.nav-item.active { background: rgba(249,115,22,0.15); color: #f97316; font-weight: 700; border-left: 3px solid #f97316; }
.nav-icon { font-size: 16px; min-width: 20px; text-align: center; }
.nav-badge { margin-left: auto; font-size: 9px; background: var(--purple); color: white; padding: 1px 6px; border-radius: 10px; font-weight: 700; }
.sidebar-footer { margin-top: auto; padding: 16px; border-top: 2px solid rgba(249,115,22,0.15); background: rgba(0,0,0,0.2); }
.db-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #10b981; font-weight: 600; }

.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { height: 60px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; padding: 0 24px; flex-shrink: 0; justify-content: space-between; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 15px; font-weight: 700; }
.topbar-subtitle { font-size: 11px; color: var(--text-muted); }
.topbar-stats { display: flex; gap: 0; }
.topbar-stat { padding: 0 16px; border-right: 1px solid var(--border); text-align: center; }
.topbar-stat:last-child { border-right: none; }
.topbar-stat .num { font-size: 18px; font-weight: 800; line-height: 1.2; }
.topbar-stat .label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; }

.content { padding: 24px; flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; cursor: pointer; white-space: nowrap; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title-wrap h2 { font-size: 22px; font-weight: 800; }
.page-title-wrap p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.game-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.game-tab { padding: 8px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); transition: all 0.15s; }
.game-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.game-tab:hover:not(.active) { color: var(--text-primary); border-color: var(--primary); }

.scoreboard-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px; transition: all 0.2s; }
.scoreboard-card:hover { border-color: rgba(249,115,22,0.4); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.score-header { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border-light); justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.score-date { font-size: 12px; color: var(--text-muted); }
.score-teams { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; background: var(--bg-primary); }
.score-team { text-align: center; min-width: 140px; }
.score-team-name { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; }
.score-team-scr { font-size: 42px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1; }
.score-vs { font-size: 20px; font-weight: 700; color: var(--text-muted); }
.score-center { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.score-info { font-size: 11px; color: var(--text-muted); text-align: center; }
.inning-bar { padding: 10px 20px; display: flex; gap: 4px; align-items: center; overflow-x: auto; background: var(--bg-card); flex-wrap: wrap; }
.inning-group { display: flex; align-items: center; gap: 4px; }
.inning-label { font-size: 10px; color: var(--text-muted); min-width: 20px; }
.inning-cell { min-width: 32px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: var(--bg-secondary); color: var(--text-secondary); }
.inning-cell.home { background: rgba(99,102,241,0.15); color: #818cf8; }
.inning-cell.away { background: rgba(245,158,11,0.15); color: #fbbf24; }
.inning-cell.total { background: var(--border-light); font-size: 12px; font-weight: 800; }
.score-footer { padding: 12px 20px; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.game-status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.status-completed { background: var(--success-bg); color: var(--success); }
.status-in-progress { background: var(--warning-bg); color: var(--warning); }
.status-scheduled { background: var(--info-bg); color: var(--info); }

/* ── PDF Import Area ──────────────────────────────────────── */
.pdf-drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-card);
  margin-bottom: 16px;
}
.pdf-drop-zone:hover, .pdf-drop-zone.drag-over {
  border-color: var(--primary);
  background: rgba(249,115,22,0.06);
}
.pdf-drop-zone input[type="file"] { display: none; }
.pdf-drop-icon { font-size: 40px; margin-bottom: 8px; }
.pdf-drop-text { font-size: 14px; color: var(--text-secondary); }
.pdf-drop-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.gc-info-banner {
  background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(249,115,22,0.08));
  border: 1.5px solid rgba(16,185,129,0.3);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  margin-bottom: 4px;
}
.gc-info-banner.gc-no-data {
  background: rgba(245,158,11,0.08);
  border-color: rgba(245,158,11,0.25);
}
.gc-teams {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 8px;
}
.gc-team { text-align: center; }
.gc-team-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
.gc-team-name { font-size: 14px; font-weight: 700; }
.gc-vs { font-size: 20px; font-weight: 900; color: var(--accent); text-align: center; }
.gc-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.gc-hint { font-size: 12px; color: var(--text-muted); font-style: italic; }
.gc-preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.gc-preview-title { font-size: 14px; font-weight: 700; }
.gc-preview-teams { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.gc-preview-meta { font-size: 12px; color: var(--text-muted); }
.gc-preview-badge { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; background: rgba(16,185,129,0.15); color: var(--success); }
.gc-preview-badge.pending { background: rgba(245,158,11,0.15); color: var(--warning); }
.gc-preview-badge.error { background: rgba(239,68,68,0.15); color: var(--danger); }

.gc-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.gc-tab { padding: 6px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); }
.gc-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

.gc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.gc-table th { text-align: left; padding: 6px 8px; background: var(--bg-primary); color: var(--text-muted); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
.gc-table td { padding: 7px 8px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
.gc-table tr:hover td { background: var(--bg-card-hover); }
.gc-table .gc-num { font-weight: 700; color: var(--primary); font-family: 'JetBrains Mono', monospace; }
.gc-table .gc-name { font-weight: 600; color: var(--text-primary); }
.gc-table .gc-pos { color: var(--text-muted); font-size: 10px; }
.gc-section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 0 4px; border-top: 1px solid var(--border-light); margin-top: 8px; }

/* ── Roster selector ─────────────────────────────────────── */
.roster-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; }
.roster-section-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.roster-player-card {
  background: var(--bg-primary); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 10px 8px; cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.roster-player-card:hover { border-color: var(--primary); background: rgba(249,115,22,0.06); }
.roster-player-card.selected { border-color: var(--success); background: rgba(16,185,129,0.08); }
.roster-player-card .rpc-name { font-size: 12px; font-weight: 700; color: var(--text-primary); }
.roster-player-card .rpc-pos { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.roster-player-card .rpc-num { font-size: 11px; font-weight: 700; color: var(--primary); font-family: 'JetBrains Mono', monospace; }
.roster-player-card .rpc-check { display: none; font-size: 18px; color: var(--success); position: absolute; top: 4px; right: 4px; }
.roster-player-card { position: relative; }
.roster-player-card.selected .rpc-check { display: block; }
.roster-player-card.selected { position: relative; }

.roster-search { margin-bottom: 10px; }
.roster-search input {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px; color: var(--text-primary);
  font-size: 13px; outline: none;
}
.roster-search input:focus { border-color: var(--primary); }

.stat-bind-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.stat-bind-name { min-width: 100px; font-weight: 600; color: var(--text-primary); }
.stat-bind-val { font-weight: 700; color: var(--primary); font-family: 'JetBrains Mono', monospace; min-width: 30px; }
.stat-bind-arrow { color: var(--text-muted); }
.stat-bind-target { flex: 1; font-size: 11px; color: var(--text-secondary); }
.stat-bind-target select {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 6px; color: var(--text-primary);
  font-size: 12px; width: 100%; max-width: 180px;
}
.stat-bind-none { color: var(--text-muted); font-style: italic; }
.bind-confirm-btn { margin-top: 12px; }

/* ── Modal sizing ─────────────────────────────────────────── */
.modal { max-width: 820px; }
.modal-body { padding: 20px; max-height: 80vh; overflow-y: auto; }

/* ── Step Wizard ────────────────────────────────────────────── */
.step-wizard { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
.step-item { display: flex; align-items: center; flex: 1; }
.step-item:last-child { flex: 0; }
.step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; background: var(--bg-card); border: 2px solid var(--border); color: var(--text-secondary); flex-shrink: 0; transition: all 0.2s; }
.step-circle.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.step-circle.done { background: #22c55e; border-color: #22c55e; color: #fff; }
.step-label { font-size: 12px; color: var(--text-secondary); margin-left: 8px; white-space: nowrap; }
.step-label.active { color: var(--text-primary); font-weight: 600; }
.step-line { flex: 1; height: 2px; background: var(--border); margin: 0 8px; transition: background 0.2s; }
.step-line.done { background: #22c55e; }

/* ── Tournament Add ───────────────────────────────────────────── */
.tournament-add { display: flex; gap: 8px; margin-top: 6px; }
.tournament-add input { flex: 1; }

/* ── GC Player Row ───────────────────────────────────────────── */
.gc-player-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border); margin-bottom: 6px; transition: border-color 0.15s; }
.gc-player-row.selected { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
.gc-player-row .player-name { flex: 1; font-weight: 500; }
.gc-player-row .player-meta { font-size: 11px; color: var(--text-secondary); }
.gc-player-row .gc-actions { display: flex; gap: 6px; align-items: center; }
.gc-player-row .gc-actions .btn { padding: 4px 10px; font-size: 11px; }

/* ── Roster Summary ──────────────────────────────────────────── */
.roster-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.roster-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
.roster-stat .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
.roster-stat .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.modal-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-form-grid .full { grid-column: span 2; }
.modal-form-grid label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-form-grid input, .modal-form-grid select, .modal-form-grid textarea {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 12px; color: var(--text-primary);
  font-size: 14px; outline: none; transition: border-color 0.2s;
}
.modal-form-grid input:focus, .modal-form-grid select:focus, .modal-form-grid textarea:focus { border-color: var(--primary); }
.modal-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.modal-tab { padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.modal-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.modal-tab:hover:not(.active) { color: var(--text-primary); }
.modal-section { margin-bottom: 16px; }
.modal-section-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); }


.empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-card-hover); border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.modal-close:hover { background: var(--danger-bg); color: var(--danger); }
.modal-body { padding: 24px; }
.modal-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-form-grid .full { grid-column: span 2; }
.modal-form-grid label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-form-grid input, .modal-form-grid select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; }
.modal-form-grid input:focus, .modal-form-grid select:focus { border-color: var(--primary); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }

#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; box-shadow: var(--shadow); animation: slideIn 0.3s ease; max-width: 300px; }
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }
.toast.warning { background: var(--warning); color: #1a1a1a; }
.toast.info { background: var(--accent); color: white; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Game Data Modal CSS ─────────────────────────────── */
.gamedata-section { border-bottom: 1px solid var(--border-light); padding: 20px 24px; }
.gamedata-section:last-child { border-bottom: none; }
.gamedata-section-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
.gamedata-score-wrap { display: flex; align-items: center; justify-content: center; gap: 32px; }
.gamedata-team-block { text-align: center; }
.gamedata-team-name { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.gamedata-total-score { font-size: 52px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1; color: var(--primary); }
.gamedata-vs { font-size: 20px; font-weight: 700; color: var(--text-muted); }
.gamedata-inning-table { overflow-x: auto; }
.gamedata-inning-row { display: flex; gap: 3px; align-items: center; margin-bottom: 4px; }
.gamedata-inning-row:first-child { margin-bottom: 6px; }
.ginn-team { min-width: 88px; max-width: 88px; font-size: 12px; font-weight: 600; padding: 4px 6px; border-radius: 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ginn-home { color: var(--success); }
.ginn-away { color: var(--accent); }
.ginn-inn { width: 36px; min-width: 36px; height: 30px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: var(--bg-secondary); color: var(--text-secondary); }
.ginn-total { background: var(--primary); color: white; }
.ginn-x { color: var(--text-muted); font-weight: 600; }
.gamedata-table-wrap { overflow-x: auto; }
.gamedata-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.gamedata-table th { padding: 8px 12px; background: var(--bg-secondary); color: var(--text-muted); font-weight: 700; text-align: center; border-bottom: 1px solid var(--border); }
.gamedata-table th:first-child { text-align: left; border-radius: 6px 0 0 0; }
.gamedata-table th:last-child { border-radius: 0 6px 0 0; }
.gamedata-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); color: var(--text-secondary); text-align: center; }
.gamedata-table td:first-child { text-align: left; font-weight: 600; color: var(--text-primary); }
.gamedata-table tbody tr:hover { background: var(--bg-card-hover); }
.gamedata-meta { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.gamedata-inning-row.gamedata-inning-head .ginn-team { background: var(--bg-secondary); color: var(--text-muted); font-weight: 700; text-align: center; }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-service.js"></script>
<script src="db.js"></script>
<script>
/* ── State ─────────────────────────────────────────────────── */
var allGames    = [];
var allPlayers  = [];
var _filterTournament = '';
var _filterCategory   = '';
var _gcResult   = null;   // parsed GC PDF data
var _gameStep         = 1;         // 1=basic, 2=roster, 3=bind
var _rosterIds        = new Set(); // selected player IDs for current game
var _currentGameCache = null;      // cached game object for roster modal

/* ── Firebase Init ────────────────────────────────────────── */
var _dbInited = false;
var _pendingLoads = [];

function _onDBReady(fn) {
  if (_dbInited) fn();
  else _pendingLoads.push(fn);
}

function initNav() {
  var html = '<div class="sidebar-logo"><div class="logo-mark">⚾</div><h1>BaseAI</h1><div class="subtitle">BASEBALL SYSTEM</div></div>';
  html += '<div class="sidebar-section"><div class="sidebar-section-label">核心模块</div>';
  [
    ['👥','球员资料库','players.html'],
    ['🏆','球队梯队','teams.html'],
    ['📊','赛事记分','games.html',true],
    ['📈','技术档案','profiles.html'],
    ['⚙️','权限后台','admin.html']
  ].forEach(function(m){ html+='<a href="'+m[2]+'" class="nav-item'+(m[3]?' active':'')+'"><div class="nav-icon">'+m[0]+'</div><span>'+m[1]+'</span></a>'; });
  html += '</div><div class="sidebar-section"><div class="sidebar-section-label">智能模块</div>';
  html += '<a href="ai-coach-v2.html" class="nav-item"><div class="nav-icon">🤖</div><span>AI 专属教练</span><span class="nav-badge">AI</span></a>';
  html += '</div><div class="sidebar-section" style="margin-top:auto;"><a href="index.html" class="nav-item" style="border-top:1px solid var(--border);"><div class="nav-icon">🏠</div><span>返回首页</span></a></div>';
  html += '<div class="sidebar-footer"><div class="db-indicator"><span>⚡ Firebase</span></div><div style="margin-top:4px;font-size:10px;">v3.0 · 2026-04-21</div></div>';
  document.getElementById('app-sidebar').innerHTML = html;
}

function showToast(msg, type) {
  type = type || 'info';
  var tc = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(function() { t.style.opacity='0'; setTimeout(function(){ t.remove(); },300); }, 3500);
}
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){ if(!d) return '—'; var p=d.split('-'); return p[1]+'/'+p[2]+'/'+p[0]; }
function getCatLabel(c){ return {u8:'🌱 U8',u10:'🌱 U10',u12:'⚾ U12',u15:'🏆 U15',u18:'🎖️ U18',uw18:'👧 UW18'}[c]||''; }
function getStatusBadge(s){
  var m={completed:'✅ 已完成','in-progress':'🔴 进行中',scheduled:'📅 未开始'};
  return '<span class="game-status-badge status-'+s+'">'+m[s]+'</span>';
}
function fmtIP(ip){ return parseFloat(ip||0).toFixed(1); }

function renderInnings(innings, isHome) {
  if (!innings || innings.length === 0) return '<div style="padding:8px 20px;font-size:12px;color:var(--text-muted);">无局数数据</div>';
  var h = '<div class="inning-bar"><span style="font-size:11px;color:var(--text-muted);margin-right:8px;flex-shrink:0;">' + (isHome?'主':'客') + '：</span>';
  var total = 0;
  innings.forEach(function(s) {
    if (typeof s === 'number') {
      total += s;
      h += '<div class="inning-cell ' + (isHome?'home':'away') + '">' + s + '</div>';
    } else {
      h += '<div class="inning-cell" style="opacity:0.3">-</div>';
    }
  });
  h += '<div class="inning-cell total">' + total + '</div></div>';
  return h;
}

/* ── Game Data Modal (PDF detail) ──────────────────────────── */
function viewGameData(gameId) {
  var game = allGames.find(function(g){ return g.id === gameId; });
  if (!game) { showToast('找不到赛事数据', 'error'); return; }
  renderGameDataModal(game);
}

function renderGameDataModal(game) {
  closeModal('gamedata-modal');
  var homeR = game.hk_runs_by_inning||[];
  var awayR = game.away_runs_by_inning||game.home_runs_by_inning||[];

  var h = '<div class="modal-overlay" id="gamedata-modal">'+
    '<div class="modal" style="max-width:900px;">'+
      '<div class="modal-header">'+
        '<div class="modal-title">📋 赛事数据详情</div>'+
        '<div style="font-size:11px;color:var(--text-muted);font-weight:400;margin-top:2px;">'+
          escHtml(game.date||'') + (game.venue?' · '+escHtml(game.venue):'') +'</div>'+
        '<button class="modal-close" onclick="closeModal(\'gamedata-modal\')">✕</button>'+
      '</div>'+
      '<div class="modal-body" style="padding:0;">';

  // ── Section 1: 总比分概览 ──
  h += '<div class="gamedata-section">'+
    '<div class="gamedata-section-title">🏆 总比分</div>'+
    '<div class="gamedata-meta">'+
      '<span>'+escHtml(game.date||'未知日期')+'</span>'+
      (game.venue?' · <span>'+escHtml(game.venue)+'</span>':'')+
    '</div>'+
    '<div class="gamedata-score-wrap">'+
      '<div class="gamedata-team-block">'+
        '<div class="gamedata-team-name">'+escHtml(game.home||'')+'</div>'+
        '<div class="gamedata-total-score">'+(game.home_score||0)+'</div>'+
      '</div>'+
      '<div class="gamedata-vs">VS</div>'+
      '<div class="gamedata-team-block">'+
        '<div class="gamedata-team-name">'+escHtml(game.away||'')+'</div>'+
        '<div class="gamedata-total-score">'+(game.away_score||0)+'</div>'+
      '</div>'+
    '</div>'+
  '</div>';

  // ── Section 2: 逐局比分 ──
  var hasInnings = homeR.length > 0 || awayR.length > 0;
  if (hasInnings) {
    // Normalize: convert "X" to null, find max innings
    var normHome = homeR.map(function(v){ return v==='X'||v==='x' ? null : (parseInt(v)||0); });
    var normAway = awayR.map(function(v){ return v==='X'||v==='x' ? null : (parseInt(v)||0); });
    var homeReal = normHome.filter(function(v){ return v!==null; });
    var awayReal = normAway.filter(function(v){ return v!==null; });
    var maxInnings = Math.max(homeReal.length, awayReal.length);
    if (maxInnings === 0) maxInnings = 1;

    h += '<div class="gamedata-section">'+
      '<div class="gamedata-section-title">📊 逐局比分</div>'+
      '<div style="overflow-x:auto;padding:0 4px;">'+
      '<div style="display:inline-flex;gap:3px;align-items:center;min-width:fit-content;">';

    // Header row
    h += '<div class="gamedata-inning-row">';
    h += '<div class="ginn-team" style="background:var(--bg-secondary);color:var(--text-muted);font-weight:700;">球队</div>';
    for (var i=0; i<maxInnings; i++) { h += '<div class="ginn-inn" style="background:var(--bg-secondary);color:var(--text-muted);font-weight:700;">'+(i+1)+'</div>'; }
    h += '<div class="ginn-inn ginn-total">R</div>'+
         '<div class="ginn-inn" style="background:var(--text-muted);color:white;font-weight:700;">H</div>'+
         '<div class="ginn-inn" style="background:var(--text-muted);color:white;font-weight:700;">E</div></div>';

    // Home row
    var homeTotal = 0; homeReal.forEach(function(v){ homeTotal += (v||0); });
    h += '<div class="gamedata-inning-row">';
    h += '<div class="ginn-team ginn-home">'+escHtml(game.home||'')+'</div>';
    for (var hi=0; hi<maxInnings; hi++) {
      var hv = normHome[hi];
      h += '<div class="ginn-inn'+(hv===null?' ginn-x':'')+'">'+(hv===null?'—':hv)+'</div>';
    }
    h += '<div class="ginn-inn ginn-total">'+homeTotal+'</div>'+
         '<div class="ginn-inn">'+(game.home_hits!==null&&game.home_hits!==undefined?game.home_hits:'—')+'</div>'+
         '<div class="ginn-inn">'+(game.home_errors!==null&&game.home_errors!==undefined?game.home_errors:'—')+'</div></div>';

    // Away row
    var awayTotal = 0; awayReal.forEach(function(v){ awayTotal += (v||0); });
    h += '<div class="gamedata-inning-row">';
    h += '<div class="ginn-team ginn-away">'+escHtml(game.away||'')+'</div>';
    for (var ai=0; ai<maxInnings; ai++) {
      var av = normAway[ai];
      h += '<div class="ginn-inn'+(av===null?' ginn-x':'')+'">'+(av===null?'—':av)+'</div>';
    }
    h += '<div class="ginn-inn ginn-total">'+awayTotal+'</div>'+
         '<div class="ginn-inn">'+(game.away_hits!==null&&game.away_hits!==undefined?game.away_hits:'—')+'</div>'+
         '<div class="ginn-inn">'+(game.away_errors!==null&&game.away_errors!==undefined?game.away_errors:'—')+'</div></div>';

    h += '</div></div></div>';
  } else {
    h += '<div class="gamedata-section">'+
      '<div class="gamedata-section-title">📊 逐局比分</div>'+
      '<div style="text-align:center;color:var(--text-muted);padding:20px 0;font-size:13px;">'+
        '暂无数据，请通过 GC PDF 导入或手动编辑添加</div></div>';
  }

  // ── Section 3: 打击数据 ──
  var batting = game.hk_batting||[];
  if (batting.length) {
    h += '<div class="gamedata-section">'+
      '<div class="gamedata-section-title">⚾ 打击数据</div>'+
      '<div class="gamedata-table-wrap">'+
        '<table class="gamedata-table"><thead><tr>'+
          '<th>球员</th><th>#</th><th>AB</th><th>H</th><th>R</th><th>RBI</th><th>BB</th><th>SO</th>'+
        '</tr></thead><tbody>';
    batting.forEach(function(b){
      h += '<tr>'+
        '<td>'+escHtml(b.name||'')+'</td>'+
        '<td>'+escHtml(b.number||'')+'</td>'+
        '<td>'+(b.ab||0)+'</td>'+
        '<td>'+(b.h||0)+'</td>'+
        '<td>'+(b.r||0)+'</td>'+
        '<td>'+(b.rbi||0)+'</td>'+
        '<td>'+(b.bb||0)+'</td>'+
        '<td>'+(b.so||0)+'</td>'+
      '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  // ── Section 4: 投手数据 ──
  var pitching = game.hk_pitching||[];
  if (pitching.length) {
    h += '<div class="gamedata-section">'+
      '<div class="gamedata-section-title">🎯 投手数据</div>'+
      '<div class="gamedata-table-wrap">'+
        '<table class="gamedata-table"><thead><tr>'+
          '<th>球员</th><th>#</th><th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>SO</th>'+
        '</tr></thead><tbody>';
    pitching.forEach(function(b){
      h += '<tr>'+
        '<td>'+escHtml(b.name||'')+'</td>'+
        '<td>'+escHtml(b.number||'')+'</td>'+
        '<td>'+fmtIP(b.ip)+'</td>'+
        '<td>'+(b.h||0)+'</td>'+
        '<td>'+(b.r||0)+'</td>'+
        '<td>'+(b.er||0)+'</td>'+
        '<td>'+(b.bb||0)+'</td>'+
        '<td>'+(b.so||0)+'</td>'+
      '</tr>';
    });
    h += '</tbody></table></div></div>';
  }

  if (!batting.length && !pitching.length) {
    h += '<div class="gamedata-section">'+
      '<div style="text-align:center;padding:32px;color:var(--text-muted);">'+
        '📄 暂无 PDF 解析数据<br><span style="font-size:12px;">请通过 GC PDF 导入或手动编辑添加数据</span>'+
      '</div>'+
    '</div>';
  }

  h += '</div>'+
    '<div class="modal-footer" style="position:sticky;bottom:0;background:var(--bg-secondary);border-top:1px solid var(--border);padding:16px 24px;text-align:center;">'+
      '<button class="btn btn-primary" onclick="closeModal(\'gamedata-modal\')">关闭</button>'+
    '</div>'+
  '</div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
}

/* ── Game Data Modal CSS end ─────────────────────────── */

/* ── Global Utils & Stats ────────────────────────────── */
function getStats() {
  return { total: allGames.length };
}

function updateTopbarStats() {
  var s = getStats();
  document.getElementById('topbar-stats').innerHTML =
    '<div class="topbar-stat"><div class="num">'+s.total+'</div><div class="label">总赛事</div></div>';
}

function renderGames() {
  var list = document.getElementById('game-list');
  updateTopbarStats();
  var filtered = allGames.filter(function(g){
    if (_filterTournament && g.tournament !== _filterTournament) return false;
    if (_filterCategory && g.category !== _filterCategory) return false;
    return true;
  });
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><h3>暂无赛事数据</h3><p>点击右上角「录入赛事」或「导入 GC PDF」开始</p></div>';
    return;
  }
  var html = '';
  filtered.forEach(function(g) {
    var winner = (g.home_score||0)>(g.away_score||0) ? escHtml(g.home||'') :
                 (g.away_score||0)>(g.home_score||0) ? escHtml(g.away||'') :
                 '<span style="color:var(--warning)">—</span>';
    html += '<div class="scoreboard-card">'+
      '<div class="score-header">'+
        '<div style="font-size:11px;color:var(--text-muted);">'+(g.year||'')+(g.tournament?' · '+escHtml(g.tournament):'')+'</div>'+
        '<div class="score-date">'+
          (g.category?getCatLabel(g.category):'')+(g.category&&g.date?' · ':'')+(g.date?fmtDate(g.date):'')+(g.date&&g.venue?' · ':'')+(g.venue?escHtml(g.venue):'')+
        '</div>'+
      '</div>'+
      '<div class="score-teams">'+
        '<div class="score-team"><div class="score-team-name">'+escHtml(g.home||'')+'</div><div class="score-team-scr">'+(g.home_score||0)+'</div></div>'+
        '<div class="score-center"><div class="score-vs">VS</div><div class="score-info">'+(g.roster&&g.roster.length?g.roster.length+'人阵容':'—')+'</div></div>'+
        '<div class="score-team"><div class="score-team-name">'+escHtml(g.away||'')+'</div><div class="score-team-scr">'+(g.away_score||0)+'</div></div>'+
      '</div>'+
      '<div class="score-footer">'+
        '<span style="font-size:11px;color:var(--text-muted);">'+(g.date?'📅 '+escHtml(g.date):'')+'</span>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">'+
          '<button class="btn btn-ghost btn-sm" onclick="viewGameData(\''+escHtml(g.id)+'\')">📋 数据</button>'+
          (g.roster&&g.roster.length?'<button class="btn btn-ghost btn-sm" onclick="viewRoster(\''+escHtml(g.id)+'\')">👥 阵容</button>':'')+
          '<button class="btn btn-ghost btn-sm" onclick="editGame(\''+escHtml(g.id||'')+'\')">✏️ 编辑</button>'+
          '<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteGame(\''+escHtml(g.id||'')+'\')">🗑️</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
  list.innerHTML = html;
  // Keep filter dropdowns in sync with available tournaments
  updateTournamentFilter();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.game-tab').forEach(function(b){ b.classList.toggle('active',b.dataset.tab===tab); });
  renderGames();
}

// ── Filter helpers ────────────────────────────────────────────────
function updateTournamentFilter() {
  var sel = document.getElementById('filter-tournament');
  if (!sel) return;
  var tours = {};
  allGames.forEach(function(g){ if (g.tournament) tours[g.tournament] = true; });
  var opts = Object.keys(tours).sort().map(function(t){
    return '<option value="'+escHtml(t)+'"'+(t===_filterTournament?' selected':'')+'>'+escHtml(t)+'</option>';
  });
  sel.innerHTML = '<option value="">全部赛事</option>'+opts.join('');
}

function bindFilterEvents() {
  document.getElementById('filter-tournament').addEventListener('change', function(){
    _filterTournament = this.value;
    renderGames();
  });
  document.getElementById('filter-category').addEventListener('change', function(){
    _filterCategory = this.value;
    renderGames();
  });
}

/* ── Modals ────────────────────────────────────────────────── */

function getTournaments() {
  try {

function addTournament(name) {

  var list = getTournaments();
  if (list.indexOf(name.trim()) < 0) {
    list.push(name.trim());
    try { localStorage.setItem('baseai_tournaments', JSON.stringify(list)); } catch(e){}

  return true;
}

function renderAddModal() {
  var isEdit = !!_wizardGame.id;
  var existing = document.getElementById('game-modal');
  if (existing) {
    // In-place update: just refresh the content area, never rebuild the modal
    var content = existing.querySelector('#modal-body-content');
    if (content) {
      content.innerHTML = renderWizardSteps() + renderWizardContent();
      bindWizardFooter(isEdit);
      rebindPDFHandlers();
      ensurePlayersThenMatch();
      return;
    }
    existing.remove(); // fallback: rebuild if content area not found
  }
  var html = '<div class="modal-overlay" id="game-modal">'+
    '<div class="modal" id="modal-inner" style="max-width:780px;">'+
      '<div class="modal-header"><div class="modal-title">'+(isEdit?'✏️ 编辑赛事':'📊 新建赛事')+'</div><button class="modal-close" onclick="closeModal(\'game-modal\')">✕</button></div>'+
      '<div class="modal-body" id="modal-body-content"></div>'+
    '</div>'+
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);

  bindWizardFooter(isEdit);
  rebindPDFHandlers();

}

function rebindPDFHandlers() {
  var dropZone = document.getElementById('pdf-drop');
  if (!dropZone) return;
  // Always re-bind (innerHTML replaces the element, _bound is on old element)
  dropZone.removeEventListener('dragover', onDragOver);
  dropZone.removeEventListener('dragleave', onDragLeave);
  dropZone.removeEventListener('drop', onDrop);
  dropZone.removeEventListener('click', onDropClick);
  dropZone.addEventListener('dragover', onDragOver);
  dropZone.addEventListener('dragleave', onDragLeave);
  dropZone.addEventListener('drop', onDrop);
  dropZone.addEventListener('click', onDropClick);
}
function onDragOver(e){ e.preventDefault(); document.getElementById('pdf-drop').classList.add('drag-over'); }
function onDragLeave(){ var d=document.getElementById('pdf-drop'); if(d)d.classList.remove('drag-over'); }
function onDrop(e){
  e.preventDefault();
  var d=document.getElementById('pdf-drop'); if(d)d.classList.remove('drag-over');
  var f=e.dataTransfer.files[0];
  if(f) uploadGCFile(f);
}
function onDropClick(){
  ensureGCInput();
  var inp = document.getElementById('_gc-pdf-input');
  if(inp) inp.click();
}
function ensureGCInput() {
  var inp = document.getElementById('_gc-pdf-input');
  if (!inp) {
    inp = document.createElement('input');
    inp.type = 'file'; inp.id = '_gc-pdf-input'; inp.accept = '.pdf'; inp.style.display = 'none';
    document.body.appendChild(inp);
    inp.addEventListener('change', function() {
      if (this.files && this.files[0]) uploadGCFile(this.files[0]);
      // Replace with fresh input so same file can be re-selected
      var newInp = document.createElement('input');
      newInp.type = 'file'; newInp.accept = '.pdf'; newInp.style.display = 'none';
      newInp.id = '_gc-pdf-input';
      this.parentNode.replaceChild(newInp, this);
    });
  }
  return inp;
}

    html += '<div class="step-item"><div class="step-circle '+cls+'">'+icon+'</div><span class="step-label '+cls+'">'+labels[i-1]+'</span></div>';

// ── Wizard Navigation ─────────────────────────────────────────
function bindWizardFooter(isEdit) {
  // Remove existing footer if present (prevents double binding)
  var existing = document.querySelector('#modal-inner .modal-footer');
  if (existing) existing.remove();

  var footer = document.createElement('div');
  footer.className = 'modal-footer';
  footer.style.cssText = 'position:sticky;bottom:0;background:var(--bg-secondary);border-top:1px solid var(--border);padding:16px 24px;';

  var backBtn = _wizardStep > 1 && !isEdit
    ? '<button class="btn btn-ghost" onclick="wizardBack()">← 上一步</button>' : '';

  var nextLabel = _wizardStep === 3 ? '💾 保存赛事' : '下一步 →';
  footer.innerHTML = backBtn + '<button class="btn btn-ghost" onclick="closeModal(\'game-modal\')">取消</button><button class="btn btn-primary" id="btn-next-step" onclick="wizardNext('+!!isEdit+')">'+nextLabel+'</button>';
  document.getElementById('modal-inner').appendChild(footer);

  // Bind PDF drop zone (step 2) — only once per step
  if (_wizardStep === 2) {
    var dropZone = document.getElementById('pdf-drop');
    if (dropZone && !dropZone._bound) {
      dropZone._bound = true;
      dropZone.addEventListener('dragover', function(e){ e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('drag-over'); });
      dropZone.addEventListener('drop', function(e){
        e.preventDefault(); dropZone.classList.remove('drag-over');
        var f = e.dataTransfer.files[0];
        if (f) uploadGCFile(f);
      });
      dropZone.addEventListener('click', function(){
        var inp = document.getElementById('_gc-pdf-input');
        if (inp) inp.click();
      });

      // Hidden file input for click trigger
      var inp = document.createElement('input');
      inp.type = 'file';
      inp.id = '_gc-pdf-input';
      inp.accept = '.pdf';
      inp.style.display = 'none';
      inp.addEventListener('change', function(){
        if (inp.files[0]) uploadGCFile(inp.files[0]);
      });
      dropZone.parentNode.insertBefore(inp, dropZone.nextSibling);
    }
  }
}

function wizardBack() {
  _wizardStep--;
  renderAddModal();
}

function wizardNext(isEdit) {
  if (_wizardStep === 1) {
    // Only read fields that exist in simplified Step1
    _wizardGame.year = parseInt(document.getElementById('gf-year') && document.getElementById('gf-year').value) || new Date().getFullYear();
    _wizardGame.tournament = (document.getElementById('gf-tournament') && document.getElementById('gf-tournament').value) || '';
    _wizardGame.category = (document.getElementById('gf-cat') && document.getElementById('gf-cat').value) || '';
    // home/away/date/score/venue/status → already auto-filled from GC, or keep existing
    _wizardStep = 2;
    renderAddModal();
  } else if (_wizardStep === 2) {
    // Step 2 → Step 3: run auto-match
    autoMatchAllGCPlayers();
    _wizardStep = 3;
    renderAddModal();
  } else if (_wizardStep === 3) {
    // Save!
    saveGameBasic(_wizardGame, isEdit);
  }
}

// ── GC Player Matching ────────────────────────────────────────
function autoMatchAllGCPlayers() {
  var gc = _gcResult;
  if (!gc || !gc.success) return;
  var allGC = (gc.hk_batting||[]).concat(gc.hk_pitching||[]);
  console.log('[AutoMatch] Starting for', allGC.length, 'GC players,', allPlayers.length, 'library players');
  _wizardGame.roster = _wizardGame.roster || [];
  var existingIds = new Set(_wizardGame.roster.map(function(p){ return String(p.player_id||p.id); }));

  allGC.forEach(function(gcp) {
    if (existingIds.has(String(gcp.lib_id||''))) return; // already bound
    var match = findBestMatch(gcp.name||'');
    if (match) {
      _wizardGame.roster.push({
        player_id: match.id,
        name: match.name,
        number: match.number || gcp.number || '',
        position: gcp.position || '',
        ab: gcp.ab, r: gcp.r, h: gcp.h, rbi: gcp.rbi, bb: gcp.bb, so: gcp.so,
        ip: gcp.ip, er: gcp.er, so_p: gcp.so_p,
        lib_id: match.id
      });
      existingIds.add(String(match.id));
      gcp.lib_id = match.id;
      console.log('[AutoMatch] ✓', gcp.name, '→', match.name);
    } else {
      gcp.lib_id = null;
      console.log('[AutoMatch] ✗', gcp.name, '→ no match');
    }
  });
}

function findBestMatch(name) {
  if (!name) return null;
  if (!allPlayers || allPlayers.length === 0) return null;
  var n = name.toLowerCase().trim();
  var tokens = n.split(/\s+/);
  var best = null, bestScore = 0;

  for (var i = 0; i < allPlayers.length; i++) {
    var p = allPlayers[i];
    var pn = (p.name||'').toLowerCase().trim();
    var score = 0;

    if (pn === n) score = 100;
    else if (pn.includes(n) || n.includes(pn)) score = 80;
    else {
      var pt = pn.split(/\s+/);
      var matchedTok = tokens.filter(function(t){ return t.length > 1 && (pt.includes(t) || pn.includes(t)); });
      if (matchedTok.length > 0) score = 50 + matchedTok.length * 10;
      else {
        var last = tokens[tokens.length-1]||'';
        var pInit = (tokens[0]||'')[0]||'';
        var plLast = (pt[pt.length-1]||'');
        var plInit = (pt[0]||'')[0]||'';
        if (pInit && plInit && pInit === plInit && last && plLast && (last === plLast || plLast.includes(last) || last.includes(plLast))) score = 30;
      }
    }
    if (score > bestScore) { bestScore = score; best = p; }
  }
  return bestScore >= 30 ? best : null;
}

function findMatchSuggestions(name, limit) {
  limit = limit || 10;
  if (!name) return [];
  var pool = allPlayers;
  if (!Array.isArray(pool) || pool.length === 0) return [];
  var matches = [];
  var n = name.toLowerCase().trim();
  pool.forEach(function(p) {
    var pn = (p.name||'').toLowerCase();
    var score = 0;
    if (pn === n) score = 100;
    else if (pn.includes(n) || n.includes(pn)) score = 80;
    else {
      var nt = n.split(/\s+/), pt = pn.split(/\s+/);
      var mt = nt.filter(function(t){ return t.length > 1 && pt.includes(t); });
      if (mt.length > 0) score = 50 + mt.length * 10;
    }
    if (score > 0) matches.push({ p: p, s: score });
  });
  matches.sort(function(a,b){ return b.s - a.s; });
  return matches.slice(0, limit || 5).map(function(m){ return { id: m.p.id||m.p.player_id||'', name: m.p.name||'', number: m.p.number||'' }; });
}
