<html lang="zh-CN">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>权限与后台管理 — BaseAI</title>
<style>
:root{--bg:#0b0e14;--bg-card:#151923;--bg-secondary:#0f1319;--border:rgba(255,255,255,0.08);--border-light:rgba(255,255,255,0.04);--text:#e2e8f0;--text-muted:#64748b;--text-secondary:#94a3b8;--primary:#6366f1;--primary-light:#818cf8;--primary-glow:rgba(99,102,241,0.1);--success:#10b981;--success-bg:rgba(16,185,129,0.15);--warning:#f59e0b;--warning-bg:rgba(245,158,11,0.15);--danger:#ef4444;--danger-bg:rgba(239,68,68,0.15);--info:#3b82f6;--info-bg:rgba(14,165,233,0.15);--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'JetBrains Mono','Fira Code',ui-monospace,monospace;--radius:8px;--radius-lg:14px;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:28px 20px 20px;border-bottom:1px solid var(--border);text-align:center}
.logo-mark{font-size:32px;margin-bottom:8px}
.sidebar-logo h1{font-size:20px;font-weight:900;letter-spacing:2px}
.subtitle{font-size:9px;color:var(--text-muted);letter-spacing:3px;margin-top:2px}
.sidebar-section{padding:16px 12px 8px}
.sidebar-section-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;padding:0 8px 8px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.15s;border-left:3px solid transparent;margin-bottom:2px}
.nav-item:hover{background:var(--bg-secondary);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,0.12);color:var(--primary-light);border-left-color:var(--primary)}
.nav-item.ai-item.active{background:rgba(245,158,11,0.12);color:#fbbf24;border-left-color:#f59e0b}
.nav-icon{font-size:18px;width:24px;text-align:center}
.nav-badge{margin-left:auto;background:#f59e0b;color:#000;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:0.5px}
.sidebar-footer{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border)}
.topbar{height:60px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-left{display:flex;align-items:center;gap:12px;flex:1}
.topbar-title{font-size:15px;font-weight:700}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted)}
.user-avatar{width:30px;height:30px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.topbar-stats{display:flex;align-items:center;height:100%}
.topbar-stat{display:flex;flex-direction:column;justify-content:center;padding:0 16px;border-right:1px solid var(--border);min-width:70px;text-align:center}
.topbar-stat .num{font-size:18px;font-weight:800;font-family:var(--font-mono)}
.topbar-stat .label{font-size:10px;color:var(--text-muted);letter-spacing:0.5px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-content{padding:28px;flex:1;overflow-y:auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h2{font-size:22px;font-weight:800}
.page-header p{font-size:13px;color:var(--text-muted);margin-top:2px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.15s;font-family:inherit}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-light)}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}
.btn-ghost{background:none;color:var(--text-muted)}
.btn-ghost:hover{color:var(--text);background:var(--bg-secondary)}
.btn-sm{padding:6px 12px;font-size:12px}
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.dash-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center;position:relative;overflow:hidden}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dash-card.orange::before{background:linear-gradient(90deg,#f97316,#ea580c)}
.dash-card.blue::before{background:linear-gradient(90deg,#3b82f6,#2563eb)}
.dash-card.green::before{background:linear-gradient(90deg,#10b981,#059669)}
.dash-card.purple::before{background:linear-gradient(90deg,#8b5cf6,#7c3aed)}
.dash-card .icon{font-size:32px;margin-bottom:8px}
.dash-card .num{font-size:40px;font-weight:900;font-family:var(--font-mono)}
.dash-card .label{font-size:12px;color:var(--text-muted);margin-top:4px}
.admin-section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden}
.admin-section-header{padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.admin-section-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.admin-section-body{padding:20px}
.action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.action-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:12px}
.action-card:hover{border-color:rgba(99,102,241,0.4);transform:translateY(-2px)}
.action-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.action-info h4{font-size:14px;font-weight:700}
.action-info p{font-size:12px;color:var(--text-muted);margin-top:2px}
.log-list{max-height:300px;overflow-y:auto}
.log-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.log-item:last-child{border-bottom:none}
.log-time{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);min-width:140px}
.log-msg{flex:1;color:var(--text-secondary)}
.log-type{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.log-type.info{background:var(--info-bg);color:var(--info)}
.log-type.success{background:var(--success-bg);color:var(--success)}
.log-type.warning{background:var(--warning-bg);color:var(--warning)}
.log-type.danger{background:var(--danger-bg);color:var(--danger)}
.data-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.data-stat{background:var(--bg-secondary);padding:14px;border-radius:10px}
.data-stat .name{font-size:12px;color:var(--text-muted)}
.data-stat .count{font-size:24px;font-weight:800;font-family:var(--font-mono);color:var(--text-primary);margin-top:4px}
.data-stat .sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.user-list{overflow-x:auto}
.user-table{width:100%;border-collapse:collapse}
.user-table th{text-align:left;padding:10px 14px;font-size:11px;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.user-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border-light)}
.user-table tr:last-child td{border-bottom:none}
.user-table tr:hover td{background:rgba(255,255,255,0.02)}
.role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.role-admin{background:rgba(239,68,68,0.15);color:#f87171}
.role-coach{background:rgba(99,102,241,0.15);color:#818cf8}
.role-user{background:rgba(16,185,129,0.15);color:#34d399}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-dot.online{background:var(--success)}
.status-dot.offline{background:var(--text-muted)}
</style>
