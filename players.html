<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模块1 · 球员资料库 — BaseAI</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a42;
  --bg-input: #141a2e;
  --primary: #f97316;
  --primary-light: #fb923c;
  --accent: #3b82f6;
  --success: #10b981;
  --success-bg: rgba(16, 185, 129, 0.12);
  --warning: #f59e0b;
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.12);
  --info: #06b6d4;
  --purple: #8b5cf6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(255,255,255,0.08);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body { height: 100%; }
body { font-family: 'Space Grotesk','Noto Sans SC',system-ui,sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input,select,textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Layout */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
.logo-mark { font-size: 28px; margin-bottom: 8px; }
.sidebar-logo h1 { font-size: 18px; font-weight: 800; }
.sidebar-logo .subtitle { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; margin-top: 2px; }
.sidebar-section { padding: 12px 12px 0; }
.sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); font-size: 13px; font-weight: 500; color: var(--text-secondary); transition: all 0.15s; margin-bottom: 2px; cursor: pointer; }
.nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.nav-item.active { background: rgba(249,115,22,0.12); color: var(--primary); font-weight: 600; }
.nav-icon { font-size: 16px; }
.nav-badge { margin-left: auto; font-size: 9px; background: var(--purple); color: white; padding: 1px 6px; border-radius: 10px; font-weight: 700; }
.sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
.db-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }

.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { height: 60px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; padding: 0 24px; flex-shrink: 0; justify-content: space-between; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 15px; font-weight: 700; }
.topbar-subtitle { font-size: 11px; color: var(--text-muted); }
.topbar-stats { display: flex; }
.topbar-stat { padding: 0 16px; border-right: 1px solid var(--border); text-align: center; }
.topbar-stat:last-child { border-right: none; }
.topbar-stat .num { font-size: 18px; font-weight: 800; line-height: 1.2; }
.topbar-stat .label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; }

.content { padding: 24px; flex: 1; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; cursor: pointer; white-space: nowrap; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-secondary { background: var(--bg-card-hover); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { background: var(--danger-bg); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }
.btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: rgba(249,115,22,0.1); }

/* Page Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title-wrap h2 { font-size: 22px; font-weight: 800; }
.page-title-wrap p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* Filter Bar */
.filter-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.filter-bar input,.filter-bar select { padding: 7px 12px; font-size: 13px; min-width: 140px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius); outline: none; transition: border-color 0.2s; }
.filter-bar input:focus,.filter-bar select:focus { border-color: var(--primary); }
.filter-bar input::placeholder { color: var(--text-muted); }
.filter-search { flex: 1; min-width: 200px; }
.filter-label { font-size: 11px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }

/* Position chips in filter */
.pos-filter-wrap { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.pos-chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-muted); transition: all 0.15s; }
.pos-chip:hover { border-color: var(--primary); color: var(--primary); }
.pos-chip.active { border-color: var(--primary); background: rgba(249,115,22,0.15); color: var(--primary); }

/* Year range */
.year-range { display: flex; align-items: center; gap: 6px; }
.year-range input { width: 80px !important; min-width: 80px !important; }

/* Player Grid */
.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

/* Player Card */
.player-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.2s; cursor: pointer; }
.player-card:hover { transform: translateY(-3px); border-color: rgba(249,115,22,0.4); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.player-card-header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border-light); }
.player-avatar-wrap { position: relative; flex-shrink: 0; }
.player-avatar-lg { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: white; overflow: hidden; background: var(--primary); }
.player-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
.player-avatar-initial { line-height: 52px; text-align: center; }
.player-photo-badge { position: absolute; bottom: -2px; right: -2px; width: 16px; height: 16px; border-radius: 50%; background: var(--success); border: 2px solid var(--bg-card); display: none; font-size: 8px; color: white; align-items: center; justify-content: center; }
.player-avatar-wrap.has-photo .player-photo-badge { display: flex; }
.player-info h3 { font-size: 16px; font-weight: 700; }
.player-info .player-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.player-info .player-club { font-size: 11px; color: var(--accent); margin-top: 2px; }
.player-card-body { padding: 14px 20px; }
.player-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.player-stat { text-align: center; padding: 10px 8px; background: var(--bg-secondary); border-radius: 8px; }
.player-stat .val { font-size: 16px; font-weight: 700; color: var(--text-primary); }
.player-stat .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.player-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.player-extras { display: flex; gap: 8px; flex-wrap: wrap; }
.player-extra { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
.player-card-footer { padding: 10px 20px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; justify-content: flex-end; }

/* Badges */
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-primary { background: rgba(249,115,22,0.15); color: #fb923c; }
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-neutral { background: rgba(100,116,139,0.2); color: var(--text-muted); }
.badge-info { background: rgba(6,182,212,0.15); color: var(--info); }
.badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }
.badge-accent { background: rgba(59,130,246,0.15); color: var(--accent); }

/* Empty State */
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-card-hover); border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.2s; }
.modal-close:hover { background: var(--danger-bg); color: var(--danger); }
.modal-body { padding: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: span 2; }
.form-grid .wide { grid-column: span 1; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input,.form-group select,.form-group textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; }
.form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group .hint { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

/* Photo Upload in Form */
.photo-upload-area { display: flex; align-items: center; gap: 16px; }
.photo-preview-lg { width: 72px; height: 72px; border-radius: 14px; overflow: hidden; background: var(--bg-input); border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: border-color 0.2s; position: relative; }
.photo-preview-lg:hover { border-color: var(--primary); }
.photo-preview-lg img { width: 100%; height: 100%; object-fit: cover; }
.photo-preview-lg .initial { font-size: 28px; font-weight: 800; color: var(--text-muted); }
.photo-preview-lg input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-actions { display: flex; flex-direction: column; gap: 6px; }
.photo-actions .btn { padding: 6px 12px; font-size: 12px; }

/* Multi-select Position Chips */
.pos-selector { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); min-height: 44px; align-items: center; }
.pos-selector-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid; transition: all 0.15s; }
.pos-selector-chip.selected { opacity: 1; }
.pos-selector-chip.unselected { opacity: 0.4; }
.pos-selector-chip:hover { opacity: 1; }
.pos-selector-hint { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
.pos-selected-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.pos-selected-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }

/* View Overlay */
.view-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
.view-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); position: relative; }
.view-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 20px; background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary)); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.view-avatar { width: 80px; height: 80px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; color: white; flex-shrink: 0; overflow: hidden; background: var(--primary); }
.view-avatar img { width: 100%; height: 100%; object-fit: cover; }
.view-avatar .initial { line-height: 80px; text-align: center; }
.view-name { font-size: 24px; font-weight: 800; }
.view-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.view-body { padding: 24px; }
.view-section { margin-bottom: 24px; }
.view-section:last-child { margin-bottom: 0; }
.view-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); }
.view-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
.view-grid .full { grid-column: span 2; }
.view-item { padding: 10px 12px; background: var(--bg-secondary); border-radius: 8px; }
.view-item .v-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.view-item .v-value { font-size: 14px; font-weight: 600; margin-top: 3px; }
.view-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.close-btn { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border: none; background: var(--bg-card-hover); border-radius: 8px; color: var(--text-secondary); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.close-btn:hover { background: var(--danger-bg); color: var(--danger); }

/* Invite Link Section */
.invite-section { background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.2); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.invite-section .invite-icon { font-size: 28px; }
.invite-section .invite-text { flex: 1; }
.invite-section .invite-text h3 { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.invite-section .invite-text p { font-size: 12px; color: var(--text-muted); }

/* Toast */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; box-shadow: var(--shadow); animation: slideIn 0.3s ease; max-width: 320px; }
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }
.toast.warning { background: var(--warning); color: #1a1a1a; }
.toast.info { background: var(--accent); color: white; }
@keyframes slideIn { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }

/* Responsive */
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; }
  .sidebar-logo { display: none; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .full { grid-column: span 1; }
  .player-grid { grid-template-columns: 1fr; }
  .view-grid { grid-template-columns: 1fr; }
  .view-grid .full { grid-column: span 1; }
}
</style>
</head>
<body>
<div id="toast-container"></div>

<div class="app">
  <aside class="sidebar" id="app-sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title" id="topbar-title">球员资料库</div>
          <div class="topbar-subtitle" id="topbar-subtitle">Module 01 · Player Registry</div>
        </div>
      </div>
      <div class="topbar-stats" id="topbar-stats"></div>
    </div>

    <div class="content" id="page-content">
      <div class="page-header">
        <div class="page-title-wrap">
          <h2>球员资料库</h2>
          <p>管理所有注册球员信息 · 支持照片、多位置、俱乐部、会员编号</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-outline btn-sm" id="btn-share-link" title="生成球员邀请注册链接">🔗 生成邀请链接</button>
          <button class="btn btn-secondary btn-sm" id="btn-export">导出</button>
          <button class="btn btn-secondary btn-sm" id="btn-import">导入</button>
          <button class="btn btn-primary" id="btn-add">+ 新增球员</button>
        </div>
      </div>

      <!-- Invite Link Banner -->
      <div class="invite-section" id="invite-section" style="display:none;">
        <div class="invite-icon">🔗</div>
        <div class="invite-text">
          <h3>球员自主注册链接</h3>
          <p id="invite-link-text">复制以下链接发给球员家长填写</p>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-copy-link">复制链接</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('invite-section').style.display='none'">关闭</button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <input type="text" id="search-input" class="filter-search" placeholder="搜索姓名、学号、学校、俱乐部...">
        <select id="filter-gender">
          <option value="">全部性别</option><option value="M">男</option><option value="F">女</option>
        </select>
        <select id="filter-status">
          <option value="">全部状态</option><option value="active">活跃</option><option value="inactive">非活跃</option>
        </select>
        <div class="filter-label">位置</div>
        <div class="pos-filter-wrap" id="pos-filter-wrap"></div>
        <div class="filter-label">年份</div>
        <div class="year-range">
          <input type="number" id="filter-year-from" min="2010" max="2020" placeholder="从">
          <span style="color:var(--text-muted)">—</span>
          <input type="number" id="filter-year-to" min="2010" max="2020" placeholder="到">
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-reset">重置</button>
      </div>

      <div id="player-list"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
var ALL_POSITIONS = ['投手','捕手','一垒手','二垒手','三垒手','游击手','左外野','中外野','右外野','指定打击','总教练','教练'];
var POS_COLORS = {
  '投手':'#8b5cf6','捕手':'#f97316','一垒手':'#f59e0b','二垒手':'#06b6d4',
  '三垒手':'#ef4444','游击手':'#ec4899','左外野':'#10b981','中外野':'#22c55e',
  '右外野':'#14b8a6','指定打击':'#f97316','总教练':'#64748b','教练':'#64748b'
};
var GENDER_MAP = { 'M':'男','F':'女' };
var CONTACT_RELATIONS = ['父亲','母亲','监护人','其他'];

// ============================================================
//  IN-MEMORY DB WITH NEW FIELDS
// ============================================================
var _inMemoryDB = { players: [], teams: [], games: [] };

(function seedDemoData() {

  getMode: function() { return 'in-memory'; },
  getPlayers: function(filters) {
    var data = _inMemoryDB.players;
    return Promise.resolve({ data: data || [], error: null });
  },
  upsertPlayer: function(p) {
    var idx = _inMemoryDB.players.findIndex(function(x){ return x.id === p.id || x.player_id === p.player_id; });
    if (idx >= 0) { _inMemoryDB.players[idx] = Object.assign({}, _inMemoryDB.players[idx], p); }
    else {
      p.id = p.id || ('P' + String(_inMemoryDB.players.length + 1).padStart(3,'0'));
      p.player_id = p.player_id || p.id;
      p.positions = p.positions || [];
      p.status = p.status || 'active';
      _inMemoryDB.players.push(p);
    }
    return Promise.resolve({ data: [p], error: null });
  },
  deletePlayer: function(id) {
    _inMemoryDB.players = _inMemoryDB.players.filter(function(p){ return p.id !== id && p.player_id !== id; });
    return Promise.resolve({ data: null, error: null });
  }
};

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function calcAge(bd) { if(!bd) return '-'; var t=new Date(),b=new Date(bd); var a=t.getFullYear()-b.getFullYear(); if(t.getMonth()-b.getMonth()<0||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--; return a; }
function calcBirthYear(bd) { if(!bd) return null; return new Date(bd).getFullYear(); }
function getAvatarColor(n) { var c=['#f97316','#3b82f6','#10b981','#8b5cf6','#ec4899','#f59e0b','#06b6d4','#84cc16']; return c[(n||'A').charCodeAt(0)%c.length]; }
function getPosColor(p) { return POS_COLORS[p] || '#64748b'; }
function formatHand(h) { return h==='L'?'左手':h==='R'?'右手':h==='S'?'左右开':'-'; }
function getPositionsArray(p) { return Array.isArray(p.positions) ? p.positions : (p.position ? [p.position] : []); }
function showToast(msg,type) {
  type=type||'info';
  var tc=document.getElementById('toast-container');
  var t=document.createElement('div'); t.className='toast '+type; t.textContent=msg;
  tc.appendChild(t);

}

// ============================================================
//  FILTERING
// ============================================================
function applyFilters() {
  searchText=document.getElementById('search-input').value.trim().toLowerCase();
  filterGender=document.getElementById('filter-gender').value;
  filterStatus=document.getElementById('filter-status').value;
  filterYearFrom=parseInt(document.getElementById('filter-year-from').value)||null;
  filterYearTo=parseInt(document.getElementById('filter-year-to').value)||null;

  filteredPlayers=allPlayers.filter(function(p){
    if(filterGender && p.gender!==filterGender) return false;
    if(filterStatus && p.status!==filterStatus) return false;
    if(filterPositions.length>0){
      var pPositions=getPositionsArray(p);
      if(!filterPositions.some(function(fp){ return pPositions.indexOf(fp)>=0; })) return false;
    }
    var birthYear=calcBirthYear(p.birth_date);
    if(filterYearFrom && birthYear && birthYear<filterYearFrom) return false;
    if(filterYearTo && birthYear && birthYear>filterYearTo) return false;
    if(searchText){
      if(p.name&&p.name.toLowerCase().indexOf(searchText)>=0) return true;
      if(p.player_id&&p.player_id.toLowerCase().indexOf(searchText)>=0) return true;
      if(p.school&&p.school.toLowerCase().indexOf(searchText)>=0) return true;
      if(p.club&&p.club.toLowerCase().indexOf(searchText)>=0) return true;
      if(p.hkab_id&&p.hkab_id.toLowerCase().indexOf(searchText)>=0) return true;
      if(p.contact_name&&p.contact_name.toLowerCase().indexOf(searchText)>=0) return true;
      return false;
    }
    return true;
  });
  renderPlayers();
}

function resetFilters() {
  document.getElementById('search-input').value='';
  document.getElementById('filter-gender').value='';
  document.getElementById('filter-status').value='';
  document.getElementById('filter-year-from').value='';
  document.getElementById('filter-year-to').value='';
  filterPositions=[];
  document.querySelectorAll('.pos-chip').forEach(function(c){ c.classList.remove('active'); });
  applyFilters();
}

window._posSelections={};

window.togglePosSelector=function(btn,pos,maxSelect,containerId) {
  if(!_posSelections[containerId]) _posSelections[containerId]=[];
  var sel=_posSelections[containerId];
  var idx=sel.indexOf(pos);
  var c=getPosColor(pos);
  if(idx>=0){
    sel.splice(idx,1);
    btn.classList.remove('selected'); btn.classList.add('unselected');
    btn.style.background='transparent';
  } else {
    if(sel.length>=maxSelect){ showToast('最多选择 '+maxSelect+' 个位置','warning'); return; }
    sel.push(pos);
    btn.classList.remove('unselected'); btn.classList.add('selected');
    btn.style.background=c+'22';
  }
  updatePosTags(containerId, sel);
};

function updatePosTags(containerId, sel) {
  var tagsEl=document.getElementById(containerId+'-tags');
  if(!tagsEl) return;
  tagsEl.innerHTML=sel.map(function(pos){
    var c=getPosColor(pos);
    return '<span class="pos-selected-tag" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+escHtml(pos)+'</span>';
  }).join('');
}

function getSelectedPositions(containerId) {
  return _posSelections[containerId]||[];

          '<div class="full"><div class="form-group"><label>备注</label><textarea id="f-notes" placeholder="补充说明">'+(player.notes||'')+'</textarea></div></div>'+
        '</div>'+
      '</div>'+
      '<div class="modal-footer">'+
        '<button class="btn btn-ghost" onclick="closeModal(\'player-modal\')">取消</button>'+
        '<button class="btn btn-primary" id="btn-save-player">保存</button>'+
      '</div>'+
    '</div>'+
  '</div>';

  document.body.insertAdjacentHTML('beforeend', html);

  // Init position selector
  _posSelections['pos-selector-container']=selPositions.slice();
  buildPosSelector('pos-selector-container', selPositions, 3);

  // Init photo preview if exists
  if(player.photo){
    var img=document.getElementById('photo-img');
    var init=document.getElementById('photo-initial');
    img.src=player.photo; img.style.display='block'; init.style.display='none';
  }

  // Save handler
  document.getElementById('btn-save-player').onclick=function(){
    var name=document.getElementById('f-name').value.trim();
    if(!name){ showToast('请输入球员姓名','warning'); return; }
    var data={
      name:name,
      gender:document.getElementById('f-gender').value,
      birth_date:document.getElementById('f-birth').value,
      positions:getSelectedPositions('pos-selector-container'),
      height_cm:parseInt(document.getElementById('f-h').value)||null,
      weight_kg:parseInt(document.getElementById('f-w').value)||null,
      batting_hand:document.getElementById('f-bat').value,
      throwing_hand:document.getElementById('f-throw').value,
      school:document.getElementById('f-school').value.trim(),
      club:document.getElementById('f-club').value.trim(),
      hkab_id:document.getElementById('f-hkab').value.trim(),
      contact_name:document.getElementById('f-contact-name').value.trim(),
      contact_phone:document.getElementById('f-contact-phone').value.trim(),
      contact_relation:document.getElementById('f-contact-rel').value,
      status:document.getElementById('f-status').value,
      notes:document.getElementById('f-notes').value.trim(),
      photo:window._currentPhotoBase64||player.photo||null
    };
    if(isEdit){ data.id=player.id; data.player_id=player.player_id; }
    DB.upsertPlayer(data).then(function(){
      closeModal('player-modal');
      showToast(isEdit?'球员信息已更新':'球员已添加','success');
      loadPlayers();
    });
  };
}

// Photo handlers
window._currentPhotoBase64=null;

window.onPhotoSelected=function(file){
  if(!file) return;
  fileToBase64(file,function(base64){
    window._currentPhotoBase64=base64;
    var img=document.getElementById('photo-img');
    var init=document.getElementById('photo-initial');
    img.src=base64; img.style.display='block'; init.style.display='none';
  });
};

window.removePhoto=function(){
  window._currentPhotoBase64=null;
  document.getElementById('photo-img').src='';
  document.getElementById('photo-img').style.display='none';
  document.getElementById('photo-initial').style.display='block';
  document.getElementById('photo-input').value='';
};

window.editPlayer=function(id){ var p=allPlayers.find(function(x){return x.id===id;}); if(p) openAddModal(p); };

window.confirmDelete=function(id,name){
  if(!confirm('确定要删除球员 ['+name+'] 吗？此操作不可撤销。')) return;
  DB.deletePlayer(id).then(function(){ showToast('球员已删除','success'); loadPlayers(); });
};

// ============================================================
//  VIEW PLAYER DETAIL
// ============================================================
window.viewPlayer=function(id){
  var p=allPlayers.find(function(x){return x.id===id;});
  if(!p) return;
  var color=getAvatarColor(p.name);
  var positions=getPositionsArray(p);
  var posTags=positions.map(function(pos){
    var c=getPosColor(pos);
    return '<span class="badge" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+escHtml(pos)+'</span>';
  }).join('');
  if(positions.length===0) posTags='<span class="badge badge-neutral">未设定</span>';
  var initials=p.photo
    ? '<img src="'+escAttr(p.photo)+'" alt="'+escAttr(p.name)+'" style="width:100%;height:100%;object-fit:cover;border-radius:18px;">'
    : '<div style="line-height:80px;text-align:center;font-size:36px;font-weight:800;">'+(p.name||'?').charAt(0)+'</div>';

  var contactHtml='';
  if(p.contact_name||p.contact_phone||p.contact_relation){
    contactHtml='<div class="view-section"><div class="view-section-title">联系方式</div><div class="view-grid">'+
      (p.contact_name?'<div class="view-item"><div class="v-label">联系人</div><div class="v-value">'+escHtml(p.contact_name)+'</div></div>':'')+
      (p.contact_relation?'<div class="view-item"><div class="v-label">关系</div><div class="v-value">'+escHtml(p.contact_relation)+'</div></div>':'')+
      (p.contact_phone?'<div class="view-item"><div class="v-label">📞 电话</div><div class="v-value" style="color:var(--accent)">'+escHtml(p.contact_phone)+'</div></div>':'')+
      '</div></div>';
  }

  var html='<div class="view-overlay" id="view-modal">'+
    '<div class="view-card">'+
      '<button class="close-btn" onclick="closeModal(\'view-modal\')">✕</button>'+
      '<div class="view-header">'+
        '<div class="view-avatar" style="background:'+color+'">'+initials+'</div>'+
        '<div style="flex:1;">'+
          '<div class="view-name">'+escHtml(p.name)+'</div>'+
          '<div class="view-sub">'+(p.player_id||'')+' · '+calcAge(p.birth_date)+'岁 · '+GENDER_MAP[p.gender]+'</div>'+
          '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">'+posTags+' <span class="badge '+(p.status==="active"?"badge-success":"badge-neutral")+'">'+(p.status==="active"?"活跃":"非活跃")+'</span></div>'+
        '</div>'+
      '</div>'+
      '<div class="view-body">'+
        '<div class="view-section"><div class="view-section-title">基本信息</div><div class="view-grid">'+
          '<div class="view-item"><div class="v-label">出生日期</div><div class="v-value">'+(p.birth_date||'-')+'</div></div>'+
          '<div class="view-item"><div class="v-label">年龄</div><div class="v-value">'+(calcAge(p.birth_date)==="-"?"-":calcAge(p.birth_date)+"岁")+'</div></div>'+
          '<div class="view-item"><div class="v-label">身高</div><div class="v-value">'+(p.height_cm?p.height_cm+" cm":"-")+'</div></div>'+
          '<div class="view-item"><div class="v-label">体重</div><div class="v-value">'+(p.weight_kg?p.weight_kg+" kg":"-")+'</div></div>'+
          '<div class="view-item"><div class="v-label">打击</div><div class="v-value">'+formatHand(p.batting_hand)+'</div></div>'+
          '<div class="view-item"><div class="v-label">投球</div><div class="v-value">'+formatHand(p.throwing_hand)+'</div></div>'+
          '<div class="view-item"><div class="v-label">就读学校</div><div class="v-value">'+(p.school||'-')+'</div></div>'+
          '<div class="view-item"><div class="v-label">所属俱乐部</div><div class="v-value" style="color:var(--accent)">'+(p.club||'-')+'</div></div>'+
          (p.hkab_id?'<div class="view-item full"><div class="v-label">🏅 棒总会员编号</div><div class="v-value" style="color:var(--purple)">'+escHtml(p.hkab_id)+'</div></div>':'')+
          (p.notes?'<div class="view-item full"><div class="v-label">备注</div><div class="v-value" style="color:var(--text-secondary);font-weight:400">'+escHtml(p.notes)+'</div></div>':'')+
        '</div></div>'+
        contactHtml+
      '</div>'+
      '<div class="view-footer">'+
        '<button class="btn btn-ghost" onclick="closeModal(\'view-modal\')">关闭</button>'+
        '<button class="btn btn-primary" onclick="closeModal(\'view-modal\');editPlayer(\''+escAttr(p.id)+'\')">编辑</button>'+
      '</div>'+
    '</div>'+
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
};

// ============================================================
//  INVITE LINK GENERATION
// ============================================================
function generateInviteLink() {
  var base=window.location.origin+window.location.pathname.replace('players.html','')+'register.html';
  var data={};
  var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  var url=base+'?prefill='+encoded;
  document.getElementById('invite-link-text').textContent=url;
  document.getElementById('invite-section').style.display='flex';
  window._generatedInviteUrl=url;
}

document.getElementById('btn-share-link').addEventListener('click',generateInviteLink);
document.getElementById('btn-copy-link').addEventListener('click',function(){
  if(window._generatedInviteUrl){
    navigator.clipboard.writeText(window._generatedInviteUrl).then(function(){
      showToast('邀请链接已复制！发给球员家长填写','success');
    }).catch(function(){
      showToast('复制成功，请手动粘贴','success');
    });
  }
});

// ============================================================
//  AUTO-IMPORT FROM REGISTER PAGE
// ============================================================
function checkAutoImport() {
  var params=new URLSearchParams(window.location.search);
  var prefill=params.get('prefill');
  if(prefill){
    try{
      var data=JSON.parse(decodeURIComponent(escape(atob(prefill))));
      if(data.name){
        DB.upsertPlayer(Object.assign({
          status:'active', positions:[], batting_hand:'', throwing_hand:'',
          height_cm:null, weight_kg:null, photo:null, notes:''
        }, data)).then(function(){
          showToast('球员 ['+data.name+'] 已自动导入！','success');
          loadPlayers();
          // Clean URL
          window.history.replaceState({},'',window.location.pathname);
        });
      }
    }catch(e){ console.warn('Auto-import failed:',e); }
  }
}

// ============================================================
//  LOAD PLAYERS
// ============================================================
function loadPlayers() {
  console.log('[DEBUG] loadPlayers start');
  DB.getPlayers().then(function(result){
    console.log('[DEBUG] DB.getPlayers done, count='+(result.data||[]).length);
    allPlayers=result.data||[];
    filteredPlayers=allPlayers;
    console.log('[DEBUG] calling renderPlayers, filtered='+filteredPlayers.length);
    renderPlayers();
    console.log('[DEBUG] renderPlayers done');
    buildPosFilter();
    showToast('已加载 '+allPlayers.length+' 名球员','success');
    checkAutoImport();
  });
}

// ============================================================
//  EXPORT / IMPORT
// ============================================================
document.getElementById('btn-export').addEventListener('click',function(){
  var blob=new Blob([JSON.stringify(allPlayers,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='baseai_players_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('已导出 '+allPlayers.length+' 条记录','success');
});

document.getElementById('btn-import').addEventListener('click',function(){
  var i=document.createElement('input'); i.type='file'; i.accept='.json';
  i.onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        var arr=Array.isArray(data)?data:(data.players||[]);
        arr.forEach(function(p){
          p.status=p.status||'active';
          p.positions=p.positions||(p.position?[p.position]:[]);
        });
        Promise.all(arr.map(function(p){return DB.upsertPlayer(p);})).then(function(){
          showToast('导入 '+arr.length+' 条记录','success'); loadPlayers();
        });
      }catch(err){ showToast('导入失败: '+err.message,'error'); }
    };
    r.readAsText(f);
  };
  i.click();
});

document.getElementById('search-input').addEventListener('input',applyFilters);
document.getElementById('filter-gender').addEventListener('change',applyFilters);

document.getElementById('filter-year-to').addEventListener('change',applyFilters);
document.getElementById('btn-reset').addEventListener('click',resetFilters);
document.getElementById('btn-add').addEventListener('click',function(){ openAddModal(); });

// ============================================================
//  INIT
// ============================================================
initNav({ title:'球员资料库', subtitle:'Module 01 · Player Registry v3.0' });
console.log('[DEBUG] nav inited');
loadPlayers();
console.log('[DEBUG] loadPlayers called');
</script>
