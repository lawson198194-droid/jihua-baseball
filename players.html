  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.12);
  --info: #06b6d4;
  --info-bg: rgba(6, 182, 212, 0.12);
  --purple: #8b5cf6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.04);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);

}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {

::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar {

  border-right: 1px solid var(--border);

}
.sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }

.sidebar-section { padding: 12px 12px 0; }

.nav-item {

}
.nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }

.nav-icon { font-size: 16px; }

.topbar-stat .num { font-size: 18px; font-weight: 800; line-height: 1.2; }
.topbar-stat .label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; }

.content { padding: 24px; flex: 1; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; cursor: pointer; white-space: nowrap; }
.btn-primary { background: var(--primary); color: white; }

.btn-secondary { background: var(--bg-card-hover); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

.btn-danger { background: var(--danger-bg); color: var(--danger); }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }

.filter-bar input, .filter-bar select { padding: 7px 12px; font-size: 13px; min-width: 160px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius); outline: none; transition: border-color 0.2s; }

.filter-bar input::placeholder { color: var(--text-muted); }
.filter-search { flex: 1; min-width: 200px; }

.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

.player-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.2s; cursor: pointer; }
.player-card:hover { transform: translateY(-3px); border-color: rgba(249,115,22,0.4); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

.player-avatar-lg { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: white; flex-shrink: 0; }
.player-info h3 { font-size: 16px; font-weight: 700; }

.player-card-body { padding: 14px 20px; }
.player-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.player-stat { text-align: center; padding: 10px 8px; background: var(--bg-secondary); border-radius: 8px; }
.player-stat .val { font-size: 16px; font-weight: 700; color: var(--text-primary); }

.player-card-footer { padding: 10px 20px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; justify-content: flex-end; }

.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-primary { background: rgba(249,115,22,0.15); color: #fb923c; }
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-neutral { background: rgba(100,116,139,0.2); color: var(--text-muted); }
.badge-info { background: var(--info-bg); color: var(--info); }

.empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }

.modal-body { padding: 24px; }
.modal-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-form-grid .full { grid-column: span 2; }
.modal-form-grid label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-form-grid input, .modal-form-grid select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; }
.modal-form-grid input:focus, .modal-form-grid select:focus { border-color: var(--primary); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }

.view-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
.view-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); position: relative; }
.view-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 20px; background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary)); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.view-avatar { width: 72px; height: 72px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: white; flex-shrink: 0; }
.view-name { font-size: 24px; font-weight: 800; }
.view-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.view-body { padding: 24px; }
.view-section { margin-bottom: 24px; }
.view-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.view-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.view-item { padding: 10px 12px; background: var(--bg-secondary); border-radius: 8px; }
.view-item .v-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.view-item .v-value { font-size: 14px; font-weight: 600; margin-top: 3px; }
.view-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.close-btn { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border: none; background: var(--bg-card-hover); border-radius: 8px; color: var(--text-secondary); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.close-btn:hover { background: var(--danger-bg); color: var(--danger); }

#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; box-shadow: var(--shadow); animation: slideIn 0.3s ease; max-width: 300px; }
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }
.toast.warning { background: var(--warning); color: #1a1a1a; }
.toast.info { background: var(--accent); color: white; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>

<script>

    { id: 'P008', player_id: 'P008', name: '周俊杰', gender: 'M', birth_date: '2013-06-05', age: 12, position: '二垒手', batting_hand: 'R', throwing_hand: 'R', height_cm: 150, weight_kg: 44, school: '圣公会小学', status: 'active' }
  ];
})();

var DB = {
  isReady: function() { return true; },
  getMode: function() { return 'in-memory'; },
  getPlayers: function(filters) {
    var data = _inMemoryDB.players;
    if (filters) {
      Object.entries(filters).forEach(function(e) {
        if (e[1] != null) data = data.filter(function(r) { return r[e[0]] === e[1]; });
      });
    }
    return Promise.resolve({ data: data || [], error: null });
  },
  upsertPlayer: function(p) {
    var idx = _inMemoryDB.players.findIndex(function(x) { return x.id === p.id || x.player_id === p.player_id; });
    if (idx >= 0) _inMemoryDB.players[idx] = Object.assign({}, _inMemoryDB.players[idx], p);
    else { p.id = p.id || ('P' + String(_inMemoryDB.players.length + 1).padStart(3, '0')); p.player_id = p.player_id || p.id; _inMemoryDB.players.push(p); }
    return Promise.resolve({ data: [p], error: null });
  },
  deletePlayer: function(id) {
    _inMemoryDB.players = _inMemoryDB.players.filter(function(p) { return p.id !== id && p.player_id !== id; });
    return Promise.resolve({ data: null, error: null });
  }
};

/* NAV + HELPERS */

function showToast(msg, type) {
  type = type || 'info';
  var tc = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3000);
}

function formatHand(h) { return h === 'L' ? '左手' : h === 'R' ? '右手' : h === 'S' ? '左右开' : '-'; }
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function calcAge(bd) { if (!bd) return '-'; var t = new Date(), b = new Date(bd); var a = t.getFullYear() - b.getFullYear(); if (t.getMonth() - b.getMonth() < 0 || (t.getMonth() === b.getMonth() && t.getDate() < b.getDate())) a--; return a; }
function getAvatarColor(n) { var c = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ec4899','#f59e0b','#06b6d4','#84cc16']; return c[(n||'A').charCodeAt(0) % c.length]; }
function getPositionColor(p) { var m = { '投手':'#8b5cf6','捕手':'#f97316','内野':'#3b82f6','外野':'#10b981','游击手':'#ec4899','一垒手':'#f59e0b','三垒手':'#ef4444','二垒手':'#06b6d4','中外野':'#84cc16','左外野':'#84cc16' }; for (var k in m) if (p && p.indexOf(k) >= 0) return m[k]; return '#64748b'; }

/* APPLICATION */
var allPlayers = [], filteredPlayers = [], filterGender = '', filterStatus = '', searchText = '';

function getStats() {
  return { total: allPlayers.length, active: allPlayers.filter(function(p){ return p.status === 'active'; }).length, male: allPlayers.filter(function(p){ return p.gender === 'M'; }).length, female: allPlayers.filter(function(p){ return p.gender === 'F'; }).length };
}

function updateTopbarStats() {
  var s = getStats();
  document.getElementById('topbar-stats').innerHTML =
    '<div class="topbar-stat"><div class="num">' + s.total + '</div><div class="label">注册球员</div></div>' +
    '<div class="topbar-stat"><div class="num" style="color:#10b981">' + s.active + '</div><div class="label">活跃球员</div></div>' +
    '<div class="topbar-stat"><div class="num">' + s.male + '</div><div class="label">男生</div></div>' +
    '<div class="topbar-stat"><div class="num" style="color:#ec4899">' + s.female + '</div><div class="label">女生</div></div>';
}

function renderPlayers() {
  var list = document.getElementById('player-list');
  updateTopbarStats();
  if (filteredPlayers.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><h3>暂无球员数据</h3><p>点击右上角新增球员添加记录</p></div>';
    return;
  }
  var html = '<div class="player-grid">';
  filteredPlayers.forEach(function(p) {
    var color = getAvatarColor(p.name), posColor = getPositionColor(p.position);
    html += '<div class="player-card">' +
      '<div class="player-card-header" onclick="viewPlayer(\'' + p.id + '\')">' +
        '<div class="player-avatar-lg" style="background:' + color + '">' + (p.name||'?').charAt(0) + '</div>' +
        '<div class="player-info"><h3>' + escHtml(p.name) + '</h3><div class="player-meta">' + (p.player_id||'') + ' · ' + calcAge(p.birth_date) + '岁 · ' + (p.gender==='M'?'男':'女') + '</div></div>' +
      '</div>' +
      '<div class="player-card-body">' +
        '<div class="player-stats">' +
          '<div class="player-stat"><div class="val">' + (p.height_cm||'-') + '</div><div class="lbl">身高(cm)</div></div>' +
          '<div class="player-stat"><div class="val">' + (p.weight_kg||'-') + '</div><div class="lbl">体重(kg)</div></div>' +
          '<div class="player-stat"><div class="val" style="font-size:13px">' + formatHand(p.batting_hand) + '</div><div class="lbl">打击</div></div>' +
        '</div>' +
        '<div class="player-tags">' +
          '<span class="badge" style="background:' + posColor + '20;color:' + posColor + '">' + (p.position||'未设定') + '</span>' +
          '<span class="badge badge-success">活跃</span>' +
          '<span class="badge badge-info">' + formatHand(p.throwing_hand) + '投</span>' +
        '</div>' +
      '</div>' +
      '<div class="player-card-footer">' +
        '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editPlayer(\'' + p.id + '\')">编辑</button>' +
        '<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="event.stopPropagation();confirmDelete(\'' + p.id + '\',\'' + escHtml(p.name) + '\')">删除</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  list.innerHTML = html;
}

function applyFilters() {
  searchText = document.getElementById('search-input').value.trim().toLowerCase();
  filterGender = document.getElementById('filter-gender').value;
  filterStatus = document.getElementById('filter-status').value;
  filteredPlayers = allPlayers.filter(function(p) {
    if (filterGender && p.gender !== filterGender) return false;
    if (filterStatus && p.status !== filterStatus) return false;
    if (searchText) {
      if (p.name && p.name.toLowerCase().indexOf(searchText) >= 0) return true;
      if (p.player_id && p.player_id.toLowerCase().indexOf(searchText) >= 0) return true;
      if (p.school && p.school.toLowerCase().indexOf(searchText) >= 0) return true;
      return false;
    }
    return true;
  });
  renderPlayers();
}

function resetFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-gender').value = '';
  document.getElementById('filter-status').value = '';
  searchText = ''; filterGender = ''; filterStatus = '';
  filteredPlayers = allPlayers;
  renderPlayers();
}

function closeModal(id) { var m = document.getElementById(id); if (m) m.remove(); }

function openAddModal(player) {
  player = player || {};
  var isEdit = !!player.id;
  var posOptions = ['投手','捕手','内野','游击手','一垒手','二垒手','三垒手','外野','中外野','左外野'];
  var posHtml = posOptions.map(function(o){ return '<option value="'+o+'"' + (player.position===o?' selected':'') + '>'+o+'</option>'; }).join('');
  var html = '<div class="modal-overlay" id="player-modal">' +
    '<div class="modal">' +
      '<div class="modal-header"><div class="modal-title">' + (isEdit ? '编辑球员' : '新增球员') + '</div><button class="modal-close" onclick="closeModal(\'player-modal\')">✕</button></div>' +
      '<div class="modal-body"><div class="modal-form-grid">' +
        '<div class="full"><label>姓名 *</label><input id="f-name" value="' + escHtml(player.name||'') + '" placeholder="输入球员姓名"></div>' +
        '<div><label>性别</label><select id="f-gender"><option value="">请选择</option><option value="M"' + (player.gender==='M'?' selected':'') + '>男</option><option value="F"' + (player.gender==='F'?' selected':'') + '>女</option></select></div>' +
        '<div><label>出生日期</label><input type="date" id="f-birth" value="' + (player.birth_date||'') + '"></div>' +
        '<div><label>位置</label><select id="f-pos"><option value="">请选择</option>' + posHtml + '</select></div>' +
        '<div><label>身高(cm)</label><input type="number" id="f-h" value="' + (player.height_cm||'') + '" placeholder="140"></div>' +
        '<div><label>体重(kg)</label><input type="number" id="f-w" value="' + (player.weight_kg||'') + '" placeholder="40"></div>' +
        '<div><label>打击</label><select id="f-bat"><option value="">请选择</option><option value="L"' + (player.batting_hand==='L'?' selected':'') + '>左手</option><option value="R"' + (player.batting_hand==='R'?' selected':'') + '>右手</option><option value="S"' + (player.batting_hand==='S'?' selected':'') + '>左右开</option></select></div>' +
        '<div><label>投球</label><select id="f-throw"><option value="">请选择</option><option value="L"' + (player.throwing_hand==='L'?' selected':'') + '>左手</option><option value="R"' + (player.throwing_hand==='R'?' selected':'') + '>右手</option></select></div>' +
        '<div class="full"><label>学校</label><input id="f-school" value="' + escHtml(player.school||'') + '" placeholder="就读学校"></div>' +
      '</div></div>' +
      '<div class="modal-footer">' +
        '<button class="btn btn-ghost" onclick="closeModal(\'player-modal\')">取消</button>' +
        '<button class="btn btn-primary" id="btn-save">保存</button>' +
      '</div>' +
    '</div>' +
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('btn-save').onclick = function() {
    var name = document.getElementById('f-name').value.trim();
    if (!name) { showToast('请输入球员姓名', 'warning'); return; }
    var data = {
      name: name, gender: document.getElementById('f-gender').value, birth_date: document.getElementById('f-birth').value,
      position: document.getElementById('f-pos').value, height_cm: parseInt(document.getElementById('f-h').value) || null,
      weight_kg: parseInt(document.getElementById('f-w').value) || null, batting_hand: document.getElementById('f-bat').value,
      throwing_hand: document.getElementById('f-throw').value, school: document.getElementById('f-school').value.trim(), status: 'active'
    };
    if (isEdit) { data.id = player.id; data.player_id = player.player_id; }
    DB.upsertPlayer(data).then(function() { closeModal('player-modal'); showToast(isEdit ? '球员信息已更新' : '球员已添加', 'success'); loadPlayers(); });
  };
}

window.editPlayer = function(id) { var p = allPlayers.find(function(x){ return x.id === id; }); if (p) openAddModal(p); };
window.confirmDelete = function(id, name) { if (!confirm('确定要删除球员「' + name + '」吗？此操作不可撤销。')) return; DB.deletePlayer(id).then(function() { showToast('球员已删除', 'success'); loadPlayers(); }); };

window.viewPlayer = function(id) {
  var p = allPlayers.find(function(x){ return x.id === id; });
  if (!p) return;
  var color = getAvatarColor(p.name), posColor = getPositionColor(p.position);
  var html = '<div class="view-overlay" id="view-modal">' +
    '<div class="view-card">' +
      '<button class="close-btn" onclick="closeModal(\'view-modal\')">✕</button>' +
      '<div class="view-header">' +
        '<div class="view-avatar" style="background:' + color + '">' + (p.name||'?').charAt(0) + '</div>' +
        '<div><div class="view-name">' + escHtml(p.name) + '</div><div class="view-sub">' + (p.player_id||'') + ' · ' + calcAge(p.birth_date) + '岁 · ' + (p.gender==='M'?'男':'女') + '</div>' +
          '<div style="margin-top:8px;display:flex;gap:6px;"><span class="badge" style="background:' + posColor + '20;color:' + posColor + '">' + (p.position||'未设定') + '</span><span class="badge badge-success">活跃</span></div></div>' +
      '</div>' +
      '<div class="view-body">' +
        '<div class="view-section"><div class="view-section-title">基本信息</div><div class="view-grid">' +
          '<div class="view-item"><div class="v-label">出生日期</div><div class="v-value">' + (p.birth_date||'-') + '</div></div>' +
          '<div class="view-item"><div class="v-label">年龄</div><div class="v-value">' + (calcAge(p.birth_date)==='-'?'-':calcAge(p.birth_date)+'岁') + '</div></div>' +
          '<div class="view-item"><div class="v-label">身高</div><div class="v-value">' + (p.height_cm?p.height_cm+' cm':'-') + '</div></div>' +
          '<div class="view-item"><div class="v-label">体重</div><div class="v-value">' + (p.weight_kg?p.weight_kg+' kg':'-') + '</div></div>' +
          '<div class="view-item"><div class="v-label">打击</div><div class="v-value">' + formatHand(p.batting_hand) + '</div></div>' +
          '<div class="view-item"><div class="v-label">投球</div><div class="v-value">' + formatHand(p.throwing_hand) + '</div></div>' +
          '<div class="view-item" style="grid-column:span 2"><div class="v-label">就读学校</div><div class="v-value">' + (p.school||'-') + '</div></div>' +
        '</div></div>' +
      '</div>' +
      '<div class="view-footer">' +
        '<button class="btn btn-ghost" onclick="closeModal(\'view-modal\')">关闭</button>' +
        '<button class="btn btn-primary" onclick="closeModal(\'view-modal\');editPlayer(\'' + p.id + '\')">编辑</button>' +
      '</div>' +
    '</div>' +
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
};

function loadPlayers() {
  DB.getPlayers().then(function(result) {
    allPlayers = result.data || [];
    filteredPlayers = allPlayers;
    renderPlayers();
    showToast('已加载 ' + allPlayers.length + ' 名球员', 'success');
  });
}

document.getElementById('btn-export').onclick = function() {
  var blob = new Blob([JSON.stringify(allPlayers, null, 2)], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'baseai_players_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('已导出 ' + allPlayers.length + ' 条记录', 'success');
};

document.getElementById('btn-import').onclick = function() {
  var i = document.createElement('input');
  i.type = 'file'; i.accept = '.json';
  i.onchange = function(e) {
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        var arr = Array.isArray(data) ? data : (data.players || []);
        arr.forEach(function(p) { p.status = p.status || 'active'; });
        Promise.all(arr.map(function(p) { return DB.upsertPlayer(p); })).then(function() { showToast('导入 ' + arr.length + ' 条记录', 'success'); loadPlayers(); });
      } catch(err) { showToast('导入失败: ' + err.message, 'error'); }
    };
    r.readAsText(f);
  };
  i.click();
};

document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('filter-gender').addEventListener('change', applyFilters);
document.getElementById('filter-status').addEventListener('change', applyFilters);
document.getElementById('btn-reset').addEventListener('click', resetFilters);
document.getElementById('btn-add').addEventListener('click', function() { openAddModal(); });

initNav({ title: '球员资料库', subtitle: 'Module 01 · Player Registry' });
loadPlayers();
</script>
</body>
</html>
