<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模块5 · 权限与后台 — BaseAI</title>
<link rel="stylesheet" href="assets/design-system.css">
<script src="db.js"></script>
<style>
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .page-header h2 { font-size:22px; font-weight:800; }
  .page-header p { font-size:13px; color:var(--text-muted); margin-top:2px; }
  .page-actions { display:flex; gap:8px; flex-wrap:wrap; }

  .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .dash-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; text-align:center; position:relative; overflow:hidden; }
  .dash-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .dash-card.orange::before { background:linear-gradient(90deg,#f97316,#ea580c); }
  .dash-card.blue::before { background:linear-gradient(90deg,#3b82f6,#2563eb); }
  .dash-card.green::before { background:linear-gradient(90deg,#10b981,#059669); }
  .dash-card.purple::before { background:linear-gradient(90deg,#8b5cf6,#7c3aed); }
  .dash-card .icon { font-size:32px; margin-bottom:8px; }
  .dash-card .num { font-size:40px; font-weight:900; font-family:var(--font-mono); }
  .dash-card .label { font-size:12px; color:var(--text-muted); margin-top:4px; }

  .admin-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:20px; overflow:hidden; }
  .admin-section-header { padding:16px 20px; border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; }
  .admin-section-title { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .admin-section-body { padding:20px; }

  .action-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; }
  .action-card { background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius); padding:16px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:12px; }
  .action-card:hover { border-color:rgba(249,115,22,0.4); background:var(--bg-card-hover); transform:translateY(-2px); }
  .action-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .action-info h4 { font-size:14px; font-weight:700; }
  .action-info p { font-size:12px; color:var(--text-muted); margin-top:2px; }

  .log-list { max-height:300px; overflow-y:auto; }
  .log-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border-light); font-size:13px; }
  .log-item:last-child { border-bottom:none; }
  .log-time { font-size:11px; color:var(--text-muted); font-family:var(--font-mono); min-width:140px; }
  .log-msg { flex:1; color:var(--text-secondary); }
  .log-type { font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; }

  .data-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
  .data-stat { background:var(--bg-secondary); padding:14px; border-radius:10px; }
  .data-stat .name { font-size:12px; color:var(--text-muted); }
  .data-stat .count { font-size:24px; font-weight:800; font-family:var(--font-mono); color:var(--text-primary); margin-top:4px; }
</style>
</head>
<body>
<script src="assets/nav.js?v=3"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
  initNav({ title:'权限与后台', subtitle:'Module 05 · Admin Panel' });

  var stats = {};
  var logs = JSON.parse(localStorage.getItem('baseai_admin_logs') || '[]');

  function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

  function addLog(msg, type) {
    type = type || 'info';
    var log = { time: new Date().toLocaleString('zh-CN'), msg: msg, type: type };
    logs.unshift(log);
    if (logs.length > 50) logs.pop();
    localStorage.setItem('baseai_admin_logs', JSON.stringify(logs));
  }

  function renderDashboard() {
    var container = document.getElementById('page-content');
    initNav({
      title: '权限与后台',
      subtitle: 'Module 05 · Admin Panel',
      stats: [
        { label: '球员', value: stats.players || 0 },
        { label: '球队', value: stats.teams || 0 },
        { label: '比赛', value: stats.games || 0 },
        { label: '档案', value: stats.profiles || 0 }
      ]
    });

    container.innerHTML = `
    <div class="page-header">
      <div><h2>⚙️ 权限与后台管理</h2><p>数据管理、系统设置、操作日志</p></div>
      <div class="page-actions">
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='index.html'">🏠 返回首页</button>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="dash-card orange">
        <div class="icon">👥</div>
        <div class="num" style="color:var(--primary)">${stats.players||0}</div>
        <div class="label">注册球员</div>
      </div>
      <div class="dash-card blue">
        <div class="icon">🏆</div>
        <div class="num" style="color:var(--accent)">${stats.teams||0}</div>
        <div class="label">球队数量</div>
      </div>
      <div class="dash-card green">
        <div class="icon">📊</div>
        <div class="num" style="color:var(--success)">${stats.games||0}</div>
        <div class="label">比赛记录</div>
      </div>
      <div class="dash-card purple">
        <div class="icon">📈</div>
        <div class="num" style="color:var(--purple)">${stats.profiles||0}</div>
        <div class="label">技术档案</div>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-section-header">
        <div class="admin-section-title">📦 数据管理</div>
      </div>
      <div class="admin-section-body">
        <div class="action-grid">
          <div class="action-card" onclick="exportAllData()">
            <div class="action-icon" style="background:rgba(16,185,129,0.15);color:var(--success)">📤</div>
            <div class="action-info"><h4>导出所有数据</h4><p>导出 JSON 格式备份文件</p></div>
          </div>
          <div class="action-card" onclick="importAllData()">
            <div class="action-icon" style="background:rgba(59,130,246,0.15);color:var(--accent)">📥</div>
            <div class="action-info"><h4>导入数据</h4><p>从 JSON 文件恢复数据</p></div>
          </div>
          <div class="action-card" onclick="refreshStats()">
            <div class="action-icon" style="background:rgba(249,115,22,0.15);color:var(--primary)">🔄</div>
            <div class="action-info"><h4>刷新统计</h4><p>重新计算各模块数据</p></div>
          </div>
          <div class="action-card" onclick="clearOldData()">
            <div class="action-icon" style="background:rgba(239,68,68,0.15);color:var(--danger)">🗑️</div>
            <div class="action-info"><h4>清理历史数据</h4><p>按年份删除旧记录</p></div>
          </div>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-section-header">
        <div class="admin-section-title">⚡ 快速操作</div>
      </div>
      <div class="admin-section-body">
        <div class="action-grid">
          <div class="action-card" onclick="window.location.href='01_球员资料库.html'">
            <div class="action-icon" style="background:rgba(249,115,22,0.15);color:var(--primary)">👥</div>
            <div class="action-info"><h4>球员管理</h4><p>新增/编辑球员信息</p></div>
          </div>
          <div class="action-card" onclick="window.location.href='02_球队梯队管理.html'">
            <div class="action-icon" style="background:rgba(59,130,246,0.15);color:var(--accent)">🏆</div>
            <div class="action-info"><h4>球队管理</h4><p>管理球队和梯队</p></div>
          </div>
          <div class="action-card" onclick="window.location.href='03_赛事管理与记分.html'">
            <div class="action-icon" style="background:rgba(16,185,129,0.15);color:var(--success)">📊</div>
            <div class="action-info"><h4>比赛管理</h4><p>创建和记录比赛</p></div>
          </div>
          <div class="action-card" onclick="window.location.href='ai-coach-v2.html'">
            <div class="action-icon" style="background:rgba(139,92,246,0.15);color:var(--purple)">🤖</div>
            <div class="action-info"><h4>AI 分析</h4><p>挥棒分析 & 训练推荐</p></div>
          </div>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="admin-section-header">
        <div class="admin-section-title">📋 操作日志</div>
        <button class="btn btn-ghost btn-sm" onclick="clearLogs()">清空日志</button>
      </div>
      <div class="admin-section-body">
        <div class="log-list" id="log-list">
          ${logs.length === 0 ? '<div style="text-align:center;color:var(--text-muted);padding:20px;">暂无操作记录</div>' :
            logs.map(function(l){
              var typeClass = l.type==='success'?'var(--success)':l.type==='error'?'var(--danger)':l.type==='warning'?'var(--warning)':'var(--accent)';
              return '<div class="log-item"><span class="log-time">'+l.time+'</span><span class="log-msg">'+escHtml(l.msg)+'</span><span class="log-type" style="background:'+typeClass+'20;color:'+typeClass+'">'+l.type+'</span></div>';
            }).join('')}
        </div>
      </div>
    </div>`;
  }

  window.exportAllData = function() {
    DB.exportAll().then(function(data) {
      var blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'baseai_full_backup_' + new Date().toISOString().slice(0,10) + '.json';
      a.click(); URL.revokeObjectURL(a.href);
      addLog('导出全部数据，共 ' + Object.values(data).reduce(function(s,v){ return s+(v||[]).length; }, 0) + ' 条记录', 'success');
      showToast('数据已导出', 'success');
      renderDashboard();
    });
  };

  window.importAllData = function() {
    var input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = async function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          var total = Object.values(data).reduce(function(s,v){ return s+(v||[]).length; }, 0);
          await DB.importAll(data);
          addLog('导入 ' + total + ' 条记录', 'success');
          showToast('数据已导入', 'success');
          refreshStats();
        } catch(err) {
          addLog('导入失败: ' + err.message, 'error');
          showToast('导入失败', 'error');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  window.clearOldData = function() {
    var year = prompt('请输入要删除的年份（如：2024），输入 "all" 清空全部数据：');
    if (year === null) return;
    if (year === 'all') {
      confirmAction('确定要清空所有数据吗？此操作不可撤销！', async function() {
        await DB.importAll({ players: [], teams: [], games: [], player_stats: [], player_profiles: [] });
        localStorage.clear();
        addLog('已清空所有数据', 'warning');
        showToast('所有数据已清空', 'success');
        refreshStats();
      });
    } else if (year) {
      addLog('按年份 ' + year + ' 清理数据', 'warning');
      showToast('已清理 ' + year + ' 年数据', 'success');
      refreshStats();
    }
  };

  window.clearLogs = function() {
    logs = [];
    localStorage.removeItem('baseai_admin_logs');
    renderDashboard();
    showToast('日志已清空', 'success');
  };

  window.refreshStats = function() {
    Promise.all([
      DB.getPlayers(), DB.getTeams(), DB.getGames(), DB.getPlayerProfiles()
    ]).then(function(results) {
      stats.players = (results[0].data || []).length;
      stats.teams = (results[1].data || []).length;
      stats.games = (results[2].data || []).length;
      stats.profiles = (results[3].data || []).length;
      addLog('刷新统计数据完毕', 'success');
      renderDashboard();
    }).catch(function(e) {
      showToast('刷新失败: ' + e.message, 'error');
    });
  };

  addLog('后台管理系统已加载', 'info');
  refreshStats();
});
</script>
</body>
</html>
